    <main class="card">
        <div class="card-content">
            <h1>Select Gender</h1>
            <p class="lead">Conquer radio button selection! Precisely target and select the "Male" option to demonstrate element interaction mastery.</p>

            <ul class="radio-list">
                <li>
                    <label>
                        <input type="radio" name="gender" value="male">
                        Male
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="gender" value="female">
                        Female
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="gender" value="other">
                        Other
                    </label>
                </li>
            </ul>

            <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! You selected the right option.</div>
            <div class="message failure" id="failureMessage" role="status" aria-live="polite">
                Incorrect! You selected the wrong option.
                <div class="detail">Expected: Male | Selected: <span id="actualValue"></span></div>
            </div>
        </div>
    </main>
</div>

    <div id="footer-placeholder"></div>

    <script>
        const radioOptions = document.querySelectorAll('input[name="gender"]');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const actualValue = document.getElementById('actualValue');

        // Hide messages initially
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.style.display = 'none';
        failureMessage.classList.remove('failure');

        radioOptions.forEach(radio => {
            radio.addEventListener('change', function() {
                const selected = this.value;
                if (selected === 'male') {
                    successMessage.style.display = 'flex';
                    failureMessage.style.display = 'none';
                    actualValue.textContent = '';
                } else {
                    successMessage.style.display = 'none';
                    failureMessage.style.display = 'flex';
                    actualValue.textContent = selected.charAt(0).toUpperCase() + selected.slice(1);
                }
            });
        });
    </script>
