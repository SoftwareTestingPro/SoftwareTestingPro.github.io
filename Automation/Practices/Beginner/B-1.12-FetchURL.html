        <main class="card">
            <div class="card-content">
                <h1>URL Matching</h1>
                <p class="lead">Conquer URL extraction! Capture and input the complete webpage URL to demonstrate your automation can read browser address information.</p>

                <div class="horizontal-form">
                    <label for="urlInput">Enter the URL of this webpage:</label>
                    <input type="text" id="urlInput" placeholder="Enter URL here">
                </div>

                <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! The entered URL is correct.</div>
                <div class="message failure" id="failureMessage" role="status" aria-live="polite">
                    Incorrect! The URL does not match.
                    <div class="detail">Expected: <span id="expectedValue"></span> | Entered: <span id="actualValue"></span></div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const inputField = document.getElementById('urlInput');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedValueDisplay = document.getElementById('expectedValue');
        const actualValueDisplay = document.getElementById('actualValue');

        const currentUrl = window.location.href;
        expectedValueDisplay.textContent = currentUrl;

        function validateInput() {
            const userInput = inputField.value.trim();

            if (userInput === '') {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'none';
                actualValueDisplay.textContent = '';
            } else if (userInput === currentUrl) {
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
                actualValueDisplay.textContent = userInput;
            }
        }

        inputField.addEventListener('input', validateInput);
        inputField.addEventListener('blur', validateInput);
    </script>
