    <style>
        .color-palette {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            justify-items: center;
            margin: 2.5rem auto;
            width: 100%;
            max-width: 600px;
        }

        .color-option {
            width: 130px;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.1rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 4px solid white;
        }

        .color-option:hover {
            transform: translateY(-12px) scale(1.08);
            box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.15);
        }

        .color-option:active {
            transform: translateY(-4px) scale(0.98);
        }

        .color-option[data-color="red"] { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); }
        .color-option[data-color="blue"] { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .color-option[data-color="green"] { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .color-option[data-color="yellow"] { 
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); 
            color: #1e293b; 
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }
        .color-option[data-color="purple"] { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .color-option[data-color="orange"] { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }

        #successMessage, #failureMessage {
            margin-top: 2rem;
            width: 100%;
            max-width: 500px;
        }
    </style>

    <main class="card">
        <div class="card-content">
            <h1>Color Validation</h1>
            <p class="lead">Master color selection automation! Precisely identify and click the "Green" color from the vibrant palette below.</p>

            <div class="color-palette">
                <div class="color-option" data-color="red">Red</div>
                <div class="color-option" data-color="blue">Blue</div>
                <div class="color-option" data-color="green">Green</div>
                <div class="color-option" data-color="yellow">Yellow</div>
                <div class="color-option" data-color="purple">Purple</div>
                <div class="color-option" data-color="orange">Orange</div>
            </div>

            <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! You selected the Green color.</div>
            <div class="message failure" id="failureMessage" role="status" aria-live="polite">
                Incorrect! Color does not match.
                <div class="detail">Expected: Green | Selected: <span id="selectedColor"></span></div>
            </div>
        </div>
    </main>
</div>

    <div id="footer-placeholder"></div>

    <script>
        const colorOptions = document.querySelectorAll('.color-option');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const selectedColorSpan = document.getElementById('selectedColor');

        // Hide messages initially
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';

        colorOptions.forEach(option => {
            option.addEventListener('click', function() {
                const selectedColor = this.getAttribute('data-color');
                if (selectedColor === 'green') {
                    successMessage.style.display = 'flex';
                    failureMessage.style.display = 'none';
                } else {
                    selectedColorSpan.textContent = selectedColor.charAt(0).toUpperCase() + selectedColor.slice(1);
                    successMessage.style.display = 'none';
                    failureMessage.style.display = 'flex';
                }
            });
        });
    </script>
