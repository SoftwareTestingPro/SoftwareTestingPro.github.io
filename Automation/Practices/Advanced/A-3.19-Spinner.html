    <main class="card">
      <div class="card-content">
      <h1>Spinner Challenge</h1>
      <p class="lead">Master spinner interaction! Spin the wheel and input the selected name to demonstrate your random element handling skills.</p>

      <div class="wheel-container">
          <canvas id="wheelCanvas" width="350" height="350"></canvas>
          <div class="pointer"></div>
          <button id="spinButton">SPIN</button>
      </div>
  
      <div class="vertical-form">
          <div class="input-group">
              <label for="nameInput">Enter the selected name:</label>
              <input type="text" id="nameInput" class="form-control" placeholder="Type name here">
          </div>
      </div>

      <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! You entered the correct name.</div>
      <div class="message failure" id="failureMessage" role="status" aria-live="polite">
          Incorrect! The name does not match.
          <div class="detail">Expected: <span id="expectedName"></span> | Entered: <span id="actualName"></span></div>
      </div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>
    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinButton = document.getElementById('spinButton');
        const nameInput = document.getElementById('nameInput');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        const names = ['Sushil', 'Deepika', 'Kavya', 'Jyoti', 'Avinash', 'Riddhima', 'Saroj', 'Rivansh'];
        const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#FF5722', '#8BC34A', '#FFC107', '#673AB7', '#E91E63'];

        function shuffle(array) {
          for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
          }
          return array;
        }

        const shuffledNames = shuffle([...names]);
        const shuffledColors = shuffle([...colors]);

        const numberOfSegments = shuffledNames.length;
        const anglePerSegment = (2 * Math.PI) / numberOfSegments;
        let currentRotation = 0;
        let selectedName = '';

        function drawWheel() {
          let startAngle = currentRotation;
          for (let i = 0; i < numberOfSegments; i++) {
            const endAngle = startAngle + anglePerSegment;
            ctx.beginPath();
            ctx.moveTo(175, 175);
            ctx.arc(175, 175, 175, startAngle, endAngle);
            ctx.closePath();
            ctx.fillStyle = shuffledColors[i];
            ctx.fill();

            ctx.save();
            ctx.translate(175, 175);
            ctx.rotate(startAngle + anglePerSegment / 2);
            ctx.textAlign = 'right';
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 15px Arial';
            ctx.fillText(shuffledNames[i], 160, 5);
            ctx.restore();

            startAngle = endAngle;
          }
        }

        drawWheel();

        spinButton.addEventListener('click', () => {
          let spinSpeed = 10;
          const spin = setInterval(() => {
            ctx.clearRect(0, 0, 350, 350);
            currentRotation += spinSpeed * (Math.PI / 180);
            drawWheel();
            spinSpeed *= 0.98;

            if (spinSpeed < 0.5) {
              clearInterval(spin);

              const endAngle = (2 * Math.PI - currentRotation % (2 * Math.PI)) % (2 * Math.PI);
              const pointerAngle = (endAngle - Math.PI / 2 + 2 * Math.PI) % (2 * Math.PI);
              const selectedSegment = Math.floor(pointerAngle / anglePerSegment) % numberOfSegments;
              selectedName = shuffledNames[selectedSegment];

              successMessage.style.display = 'none';
              failureMessage.style.display = 'none';
              nameInput.value = '';
            }
          }, 10);
        });

        nameInput.addEventListener('input', () => {
          const inputValue = nameInput.value.trim().toLowerCase();
          const selectedValue = selectedName.toLowerCase();

          if (inputValue === '') {
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';
            return;
          }

          if (!selectedName) {
            successMessage.style.display = 'none';
            failureMessage.style.display = 'flex';
            document.getElementById('expectedName').textContent = "Spin required";
            document.getElementById('actualName').textContent = "No spin yet";
            return;
          }

          if (inputValue === selectedValue) {
            successMessage.style.display = 'flex';
            failureMessage.style.display = 'none';
          } else {
            successMessage.style.display = 'none';
            failureMessage.style.display = 'flex';
            document.getElementById('expectedName').textContent = selectedName;
            document.getElementById('actualName').textContent = nameInput.value;
          }
        });
    </script>
