    <div class="content-wrapper">

        <main class="card">
            <div class="card-content">
            <h1>Image to Text Challenge</h1>
            <p class="lead">Master OCR extraction! Extract and input the exact text from the displayed image to demonstrate your optical character recognition skills.</p>
                <img src="../../img/shopping.jpg" alt="Image" id="Image">
                <div class="input-group-parent">
                    <div class="input-group-left">
                        <label for="user-input">Fetch displayed text from above image:</label>
                    </div>
                    <div class="input-group-right">
                        <input type="text" id="user-input" name="user-input" placeholder="Enter fetched text here...">
                    </div>
                </div>
                <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! The text matches.</div>
                <div class="message failure" id="failureMessage" role="status" aria-live="polite">
                    Incorrect! The text does not match.
                    <div class="detail">Expected: <span id="expectedText"></span> | Entered: <span id="actualText"></span></div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userInput = document.getElementById('user-input');
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');

            // Hide messages on load
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';

            userInput.addEventListener('input', () => {
                const value = userInput.value;

                if (value === 'amazon') {
                    successMessage.style.display = 'flex';
                    failureMessage.style.display = 'none';
                } else if (value.trim() === '') {
                    successMessage.style.display = 'none';
                    failureMessage.style.display = 'none';
                } else {
                    successMessage.style.display = 'none';
                    failureMessage.style.display = 'flex';
                    document.getElementById('expectedText').textContent = 'amazon';
                    document.getElementById('actualText').textContent = value;
                }
            });
        });
    </script>
