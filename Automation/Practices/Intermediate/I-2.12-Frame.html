    <main class="card">
        <div class="card-content">
            <h1>Button within a Frame</h1>
            <p class="lead">Master frame navigation! Switch to the iframe context and click the button inside to demonstrate your cross-frame interaction skills.</p>

            <div class="iframe-container">
                <iframe src="about:blank" id="button-frame"></iframe>
            </div>

            <div class="message success" id="message" role="status" aria-live="polite">Correct! You clicked the button within a frame.</div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        // Create content for the iframe
        const iframe = document.getElementById('button-frame');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

        iframeDoc.open();
        iframeDoc.write(`
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <style>
                    body {
                        margin: 0;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        height: 100vh;
                        background: #f8fafc;
                        font-family: 'Inter', sans-serif;
                    }
                    button {
                        background-color: #6366f1;
                        color: white;
                        border: none;
                        padding: 12px 24px;
                        font-size: 1rem;
                        font-weight: 600;
                        border-radius: 8px;
                        cursor: pointer;
                        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                        transition: all 0.2s ease;
                    }
                    button:hover {
                        background-color: #4f46e5;
                        transform: translateY(-2px);
                        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                    }
                    button:active {
                        transform: translateY(0);
                    }
                </style>
            </head>
            <body class="iframe-body">
                <button class="frame-button" id="action-button" type="button">Click Me</button>
            </body>
            </html>
        `);
        iframeDoc.close();

        // Add event listener for the button inside the iframe
        iframeDoc.getElementById('action-button').addEventListener('click', function() {
            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'flex';
        });
    </script>
