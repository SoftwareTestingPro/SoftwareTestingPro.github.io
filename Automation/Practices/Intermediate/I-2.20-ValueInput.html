        <main class="card">
            <div class="card-content">
                <h1>Input Fields Example</h1>
                <p class="lead">Master text replication! Copy the exact text from the source input field to demonstrate your data transfer and validation skills.</p>

                <div class="horizontal-form">
                    <label for="inputField1">Copy text from following Input Field:</label>
                    <input type="text" id="inputField1" readonly>
                </div>
                <div class="horizontal-form">
                    <label for="inputField2">Paste copied text in following Input Field:</label>
                    <input type="text" id="inputField2">
                </div>
                <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! The entered text matches the source.</div>
                <div class="message failure" id="failureMessage" role="status" aria-live="polite">
                    Incorrect! The text does not match.
                    <div class="detail">Expected: <span id="expectedValue"></span> | Entered: <span id="actualValue"></span></div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputField1 = document.getElementById('inputField1');
            const inputField2 = document.getElementById('inputField2');
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');
            const expectedValue = document.getElementById('expectedValue');
            const actualValue = document.getElementById('actualValue');

            inputField1.value = Math.random().toString(36).substring(3);

            inputField2.addEventListener('input', () => {
                const val2 = inputField2.value;
                const val1 = inputField1.value;
                if (val2 === '') {
                    successMessage.style.display = 'none';
                    failureMessage.style.display = 'none';
                } else if (val2 === val1) {
                    successMessage.style.display = 'flex';
                    failureMessage.style.display = 'none';
                } else {
                    successMessage.style.display = 'none';
                    failureMessage.style.display = 'flex';
                    expectedValue.textContent = val1;
                    actualValue.textContent = val2;
                }
            });
        });
    </script>
