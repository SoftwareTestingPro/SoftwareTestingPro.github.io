                <h1>Sentence Input Validation</h1>
                <p class="lead">Master word segmentation! Split the displayed sentence into individual words and input them in correct sequence to prove your parsing skills.</p>
                <div class="sentence" id="sentence"></div>
                <div class="input-container" id="inputContainer"></div>
                <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! You've entered all words in the correct sequence.</div>
                <div class="message failure" id="failureMessage" role="status" aria-live="polite">Incorrect! Please check the sequence of words.</div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

<script>
    const sentences = [
        "This is a test sentence",
        "HTML5 container box example",
        "Random sentence for validation",
        "Check your input carefully",
        "Please enter words correctly",
        "How is this learning platform",
        "Give me some feedback",
        "Are you enjoying this platform"
    ];

    function getRandomSentence() {
        return sentences[Math.floor(Math.random() * sentences.length)];
    }

    function createSentenceWithInputs() {
        const sentenceElement = document.getElementById('sentence');
        const inputContainer = document.getElementById('inputContainer');
        const sentence = getRandomSentence();
        const words = sentence.split(" ");
        
        sentenceElement.textContent = sentence;
        inputContainer.innerHTML = "";

        words.forEach((word, index) => {
            const inputField = document.createElement('input');
            inputField.type = 'text';
            inputField.maxLength = 20;
            inputField.placeholder = `Word ${index + 1}`;
            inputField.addEventListener('input', () => validateInput(words));

            inputContainer.appendChild(inputField);
        });
    }

    function validateInput(correctWords) {
        const inputs = document.querySelectorAll('.input-container input');
        let isCorrect = true;

        inputs.forEach((input, index) => {
            if (input.value.trim() !== correctWords[index]) {
                isCorrect = false;
            }
        });

        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        const allFilled = Array.from(inputs).every(input => input.value.trim() !== "");

        if (allFilled) {
            if (isCorrect) {
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
            }
        } else {
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';
        }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', createSentenceWithInputs);
</script>
