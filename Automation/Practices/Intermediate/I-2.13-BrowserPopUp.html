        <main class="card">
            <div class="card-content">
                <h1>Random Life Quote</h1>
                <p class="lead">Master window handling! Click to fetch a random quote from popup window, then input the displayed text to prove your cross-window skills.</p>

                <div class="button-enabled">
                    <button onclick="openQuoteWindow()">Get a Random Life Quote</button>
                </div>

                <div class="horizontal-form">
                    <label for="userInput">Enter the quote:</label>
                    <input type="text" id="userInput" placeholder="Enter the quote here" disabled>
                </div>

                <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! The entered text matches the quote.</div>
                <div class="message failure" id="failureMessage" role="status" aria-live="polite">
                    Incorrect! The entered text does not match.
                    <div class="detail">Expected: <span id="expectedQuote"></span> | Entered: <span id="actualQuote"></span></div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        let displayedQuote = "";

        function openQuoteWindow() {
    const quotes = [
        "Life is short. – Unknown",
        "Be happy. – Dalai Lama",
        "Live simply. – Unknown",
        "Dream big. – Unknown",
        "Stay positive. – Unknown"
    ];

    displayedQuote = quotes[Math.floor(Math.random() * quotes.length)];
    const quoteWindow = window.open("", "quoteWindow", "width=400,height=200");

    const htmlContent = `
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <title>Life Quote</title>
            <style>
                body {
                    font-family: Arial, sans-serif;
                    background-color: #f9f9f9;
                    margin: 0;
                    padding: 20px;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    height: 100vh;
                }
                p {
                    font-size: 1.2em;
                    color: #333;
                    text-align: center;
                }
            </style>
        </head>
        <body>
            <p>${displayedQuote}</p>
        </body>
        </html>
    `;

    quoteWindow.document.open();
    quoteWindow.document.write(htmlContent);
    quoteWindow.document.close();

    const inputField = document.getElementById('userInput');
    inputField.disabled = false;
    inputField.value = '';
    inputField.focus();

    const successMessage = document.getElementById('successMessage');
    const failureMessage = document.getElementById('failureMessage');
    successMessage.style.display = 'none';
    failureMessage.style.display = 'none';
}
        document.getElementById('userInput').addEventListener('input', function() {
            const userInput = document.getElementById('userInput').value;
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');

            if (userInput === displayedQuote) {
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else if (userInput) {
                document.getElementById('expectedQuote').textContent = displayedQuote;
                document.getElementById('actualQuote').textContent = userInput;
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'none';
            }
        });
    </script>
