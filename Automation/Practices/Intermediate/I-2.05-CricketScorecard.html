    <main class="card">
        <div class="card-content">
            <h1>Top 5 Indian Batsmen</h1>
            <p class="lead">Master sports data analysis! Identify the top scorer and find Sachin's runs from the cricket statistics to prove your data extraction skills.</p>

            <div class="table-responsive">
                <table class="data-table compact">
                    <thead>
                        <tr>
                            <th>Player Name</th>
                            <th>Runs Scored</th>
                        </tr>
                    </thead>
                    <tbody id="batsmenBody">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>

            <div class="horizontal-form">
                <label for="inputField1">Enter name of top scorer:</label>
                <input type="text" id="inputField1" name="user-input-name" placeholder="Type your name...">
            </div>

            <div class="message success" id="successMessage1" role="status" aria-live="polite">Correct! The top scorer is correctly identified.</div>
            <div class="message failure" id="failureMessage1" role="status" aria-live="polite">
                Incorrect! Please try again.
                <div class="detail" id="topScorerError"></div>
            </div>

            </div>
    </main>
</div>

<div id="footer-placeholder"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const batsmen = [
        'Sachin Tendulkar',
        'Virat Kohli',
        'Sourav Ganguly',
        'Rahul Dravid',
        'MS Dhoni'
      ];

      const batsmenBody = document.getElementById('batsmenBody');
        const inputField1 = document.getElementById('inputField1');
        const successMessage1 = document.getElementById('successMessage1');
        const failureMessage1 = document.getElementById('failureMessage1');
        const topScorerError = document.getElementById('topScorerError');

        // Hide messages initially
        successMessage1.style.display = 'none';
        failureMessage1.style.display = 'none';

      let scores = {};

      batsmen.forEach((batsman, index) => {
        const randomScore = Math.floor(Math.random() * 200) + 1;
        scores[batsman] = randomScore;

        const row = document.createElement('tr');
        row.innerHTML = `
                <td>${batsman}</td>
                <td style="font-weight: 700; color: var(--accent);">${randomScore}</td>
            `;

            batsmenBody.appendChild(row);
      });

      function validateInputs() {
            const topScorer = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            const enteredTopScorer = inputField1.value.trim();

            // Validate top scorer
            if (enteredTopScorer === topScorer) {
                successMessage1.style.display = 'flex';
                failureMessage1.style.display = 'none';
            } else if (enteredTopScorer) {
                topScorerError.innerHTML = `Expected: ${topScorer} (${scores[topScorer]} runs) | Selected: ${enteredTopScorer}`;
                successMessage1.style.display = 'none';
                failureMessage1.style.display = 'flex';
            }
        }

      inputField1.addEventListener('input', validateInputs);
    });
  </script>
