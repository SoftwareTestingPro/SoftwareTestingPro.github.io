<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Bar Example</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="I-2.10-Alerts.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="I-2.12-Frame.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Progress Bar Example</h1>
            <p class="lead">Watch the progress bar complete</p>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar">0%</div>
            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite">
                <span class="icon">✓</span>
                <span>Success! The progress bar is complete.</span>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const progressBar = document.getElementById('progress-bar');
            const successMessage = document.getElementById('successMessage');
            const duration = Math.floor(Math.random() * (30000 - 10000 + 1)) + 10000; // Random duration between 10 to 30 seconds
            
            // Hide message initially
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');
            
            let start = null;

            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = Math.min((timestamp - start) / duration, 1);
                progressBar.style.width = (progress * 100) + '%';
                progressBar.textContent = Math.floor(progress * 100) + '%';

                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    successMessage.style.display = 'flex';
                    successMessage.classList.add('success');
                }
            }

            requestAnimationFrame(step);
        });
    </script>
</body>
</html>
