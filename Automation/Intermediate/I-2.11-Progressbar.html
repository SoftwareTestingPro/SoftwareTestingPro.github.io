        <div class="card-content">
            <h1>Progress Bar Example</h1>
            <p class="lead">Master progress monitoring! Wait for the progress bar to complete and verify the success message to prove your synchronization skills.</p>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar">0%</div>
            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite">
                <span class="icon">✓</span>
                <span>Success! The progress bar is complete.</span>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const progressBar = document.getElementById('progress-bar');
            const successMessage = document.getElementById('successMessage');
            const duration = Math.floor(Math.random() * (30000 - 10000 + 1)) + 10000; // Random duration between 10 to 30 seconds
            
            // Hide message initially
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');
            
            let start = null;

            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = Math.min((timestamp - start) / duration, 1);
                progressBar.style.width = (progress * 100) + '%';
                progressBar.textContent = Math.floor(progress * 100) + '%';

                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    successMessage.style.display = 'flex';
                    successMessage.classList.add('success');
                }
            }

            requestAnimationFrame(step);
        });
    </script>
