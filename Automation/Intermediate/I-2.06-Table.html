<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Data Table</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="I-2.05-CricketScorecard.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="I-2.07-Rubix.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Employee Data Table</h1>
            <p class="lead">Select employee with highest salary and verify message</p>

            <div class="table-wrapper">
                <table id="employeeTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Position</th>
                            <th>Salary (INR)</th>
                        </tr>
                    </thead>
                    <tbody id="employeeBody">
                        <!-- Data will be inserted here dynamically -->
                    </tbody>
                </table>
            </div>
            <div class="message" id="successMessage" role="status" aria-live="polite"><span>Congratulations! You clicked on employee with highest salary.</span></div>
            <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Sorry! The employee you clicked does not have highest salary.</span></div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        function generateUniqueNames(count) {
            const names = [
                'Aarav Sharma', 'Vivaan Patel', 'Aditya Kumar', 'Vihaan Singh', 
                'Arjun Mehta', 'Reyansh Gupta', 'Sai Patel', 'Ayaan Joshi', 
                'Ishaan Rao', 'Kartik Jain', 'Kabir Verma', 'Rohan Agarwal'
            ];
            const usedNames = new Set();
            while (usedNames.size < count) {
                const randomIndex = Math.floor(Math.random() * names.length);
                usedNames.add(names[randomIndex]);
            }
            return Array.from(usedNames);
        }

        function generateUniqueSalaries(count) {
            const salaries = [];
            while (salaries.length < count) {
                let newSalary = Math.floor(Math.random() * (100000 - 50000 + 1)) + 50000;
                if (!salaries.includes(newSalary)) {
                    salaries.push(newSalary);
                }
            }
            return salaries;
        }

        function generateRandomEmployees() {
            const numberOfRows = Math.floor(Math.random() * (10 - 8 + 1)) + 8;
            const names = generateUniqueNames(numberOfRows);
            const positions = ['Software Engineer', 'Marketing Manager', 'HR Specialist', 'Sales Representative', 'Financial Analyst'];
            const salaries = generateUniqueSalaries(numberOfRows);

            const employees = names.map((name, index) => ({
                name,
                position: positions[Math.floor(Math.random() * positions.length)],
                salary: salaries[index]
            }));

            return employees;
        }

        function populateTable() {
            const employees = generateRandomEmployees();
            const tableBody = document.getElementById('employeeBody');
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');
            let highestSalary = 0;
            let highestSalaryIndex = -1;

            // Hide messages initially
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.style.display = 'none';
            failureMessage.classList.remove('failure');

            tableBody.innerHTML = ''; // Clear existing data

            employees.forEach((employee, index) => {
                if (employee.salary > highestSalary) {
                    highestSalary = employee.salary;
                    highestSalaryIndex = index;
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${employee.name}</td>
                    <td>${employee.position}</td>
                    <td>${employee.salary.toLocaleString('en-IN')} INR</td>
                `;
                row.addEventListener('click', () => {
                    if (index === highestSalaryIndex) {
                        successMessage.style.display = 'flex';
                        successMessage.classList.add('success');
                        failureMessage.style.display = 'none';
                        failureMessage.classList.remove('failure');
                    } else {
                        failureMessage.style.display = 'flex';
                        failureMessage.classList.add('failure');
                        successMessage.style.display = 'none';
                        successMessage.classList.remove('success');
                    }
                });

                tableBody.appendChild(row);
            });
        }

        // Populate table on page load
        document.addEventListener('DOMContentLoaded', populateTable);
    </script>
</body>
</html>
