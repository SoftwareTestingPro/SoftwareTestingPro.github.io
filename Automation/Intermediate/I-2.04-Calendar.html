<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calendar</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
    <style>
        .calendar-container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 90%;
            max-width: 90%;
            overflow-x: auto;
            text-align: center;
            font-size: 1.2em;
        }
        .calendar-header {
            font-size: 1.5em;
            margin-bottom: 15px;
        }
        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .calendar-table th, .calendar-table td {
            text-align: center;
            padding: 6px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 0.85em;
        }
        .calendar-table th {
            background-color: #f8f9fa;
        }
        .calendar-table td {
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .calendar-table td:hover {
            background-color: #e9ecef;
        }
        .selected {
            background-color: #28a745;
            color: white;
        }
        .info-message {
            margin-top: 15px;
            font-size: 1.2em;
        }
        .tick-cross {
            font-size: 1.2em;
            margin-left: 8px;
        }
        .calendar-container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            padding: 15px;
            width: 85%;
            max-width: 350px;
            overflow-x: auto;
            margin: 0 auto;
            text-align: center;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="I-2.03-Train.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="I-2.05-CricketScorecard.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Modern Calendar</h1>
            <p class="lead">Click the date on the first Wednesday</p>

            <div class="calendar-container">
                <div id="calendar"></div>
                <div class="info-message">
                    <span id="message1">Click the date on the first Wednesday <span id="result1" class="tick-cross"></span></span>
                </div>
            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite">
                <span class="icon">✓</span>
                <span>Correct! You clicked the first Wednesday.</span>
            </div>

            <div class="message" id="failureMessage" role="status" aria-live="polite">
                <span class="icon">✗</span>
                <span>Incorrect. Please try the first Wednesday.</span>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var message1 = document.getElementById('message1');
            var result1 = document.getElementById('result1');
            var successMessage = document.getElementById('successMessage');
            var failureMessage = document.getElementById('failureMessage');

            // Hide messages initially
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.style.display = 'none';
            failureMessage.classList.remove('failure');

            var today = new Date();
            var randomMonth = Math.floor(Math.random() * 12);
            var randomYear = 2022 + Math.floor(Math.random() * 10);
            var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            var monthName = months[randomMonth];
            var year = randomYear;

            var header = '<div class="calendar-header">' + monthName + ' ' + year + '</div>';
            var calendar = '<table class="calendar-table">';
            calendar += '<thead><tr>';
            calendar += '<th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>';
            calendar += '</tr></thead><tbody>';

            var firstDay = new Date(year, randomMonth, 1);
            var startIndex = (firstDay.getDay() === 0) ? 7 : firstDay.getDay();
            var daysInMonth = new Date(year, randomMonth + 1, 0).getDate();
            var numRows = Math.ceil((daysInMonth + startIndex - 1) / 7);
            var day = 1;
            var firstWednesdayDate = null;

            for (var i = 0; i < numRows; i++) {
                calendar += '<tr>';
                for (var j = 0; j < 7; j++) {
                    if (i === 0 && j < startIndex - 1) {
                        calendar += '<td></td>';
                    } else if (day <= daysInMonth) {
                        var dateStr = day < 10 ? '0' + day : day;
                        var fullDate = dateStr + '/' + (randomMonth + 1) + '/' + year;
                        var cellContent = day;
                        if (j === 3 && !firstWednesdayDate) { // Wednesday
                            firstWednesdayDate = day;
                        }
                        calendar += `<td data-date="${fullDate}" class="calendar-date">${cellContent}</td>`;
                        day++;
                    } else {
                        calendar += '<td></td>';
                    }
                }
                calendar += '</tr>';
            }
            calendar += '</tbody></table>';
            calendarEl.innerHTML = header + calendar;

            document.querySelectorAll('.calendar-date').forEach(function(cell) {
                cell.addEventListener('click', function() {
                    // Remove previous selection
                    document.querySelectorAll('.calendar-date').forEach(function(cell) {
                        cell.classList.remove('selected');
                    });

                    var clickedDate = parseInt(this.textContent);
                    var clickedDateStr = this.getAttribute('data-date');

                    // Highlight selected date
                    this.classList.add('selected');

                    // Check for 1st Wednesday
                    if (clickedDate === firstWednesdayDate) {
                        result1.innerHTML = '&#10004;'; // Green tick
                        successMessage.style.display = 'flex';
                        successMessage.classList.add('success');
                        failureMessage.style.display = 'none';
                        failureMessage.classList.remove('failure');
                    } else {
                        result1.innerHTML = '&#10008;'; // Red cross
                        successMessage.style.display = 'none';
                        successMessage.classList.remove('success');
                        failureMessage.style.display = 'flex';
                        failureMessage.classList.add('failure');
                    }
                });
            });
        });
    </script>
</body>
</html>
