    <main class="card">
        <div class="card-content">
            <h1>Modern Calendar</h1>
            <p class="lead">Click the date on the first Wednesday</p>
            <div class="calendar-container">
                <div id="calendar"></div>
            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite"><span>Correct! You clicked the first Wednesday.</span></div>
            <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Incorrect. <span style="color: black;">Expected:</span> <span id="expectedDate"></span> <span style="color: black;">Selected:</span> <span id="enteredDate"></span></span></div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var message1 = document.getElementById('message1');
            var successMessage = document.getElementById('successMessage');
            var failureMessage = document.getElementById('failureMessage');
            var expectedDate = document.getElementById('expectedDate');
            var enteredDate = document.getElementById('enteredDate');

            // Hide messages initially
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.style.display = 'none';
            failureMessage.classList.remove('failure');

            var today = new Date();
            var randomMonth = Math.floor(Math.random() * 12);
            var randomYear = 2022 + Math.floor(Math.random() * 10);
            var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            var monthName = months[randomMonth];
            var year = randomYear;

            var header = '<div class="calendar-header">' + monthName + ' ' + year + '</div>';
            var calendar = '<table class="calendar-table">';
            calendar += '<thead><tr>';
            calendar += '<th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>';
            calendar += '</tr></thead><tbody>';

            var firstDay = new Date(year, randomMonth, 1);
            var startIndex = (firstDay.getDay() === 0) ? 7 : firstDay.getDay();
            var daysInMonth = new Date(year, randomMonth + 1, 0).getDate();
            var numRows = Math.ceil((daysInMonth + startIndex - 1) / 7);
            var day = 1;
            var firstWednesdayDate = null;

            for (var i = 0; i < numRows; i++) {
                calendar += '<tr>';
                for (var j = 0; j < 7; j++) {
                    if (i === 0 && j < startIndex - 1) {
                        calendar += '<td></td>';
                    } else if (day <= daysInMonth) {
                        var dateStr = day < 10 ? '0' + day : day;
                        var fullDate = dateStr + '/' + (randomMonth + 1) + '/' + year;
                        var cellContent = day;
                        if (j === 3 && !firstWednesdayDate) { // Wednesday
                            firstWednesdayDate = day;
                        }
                        calendar += `<td data-date="${fullDate}" class="calendar-date">${cellContent}</td>`;
                        day++;
                    } else {
                        calendar += '<td></td>';
                    }
                }
                calendar += '</tr>';
            }
            calendar += '</tbody></table>';
            calendarEl.innerHTML = header + calendar;

            document.querySelectorAll('.calendar-date').forEach(function(cell) {
                cell.addEventListener('click', function() {
                    // Remove previous selection
                    document.querySelectorAll('.calendar-date').forEach(function(cell) {
                        cell.classList.remove('selected');
                    });

                    var clickedDate = parseInt(this.textContent);
                    var clickedDateStr = this.getAttribute('data-date');

                    // Highlight selected date
                    this.classList.add('selected');

                    // Check for 1st Wednesday
                    if (clickedDate === firstWednesdayDate) {
                        successMessage.style.display = 'flex';
                        successMessage.classList.add('success');
                        failureMessage.style.display = 'none';
                        failureMessage.classList.remove('failure');
                    } else {
                        expectedDate.textContent = firstWednesdayDate;
                        enteredDate.textContent = clickedDate;
                        successMessage.style.display = 'none';
                        successMessage.classList.remove('success');
                        failureMessage.style.display = 'flex';
                        failureMessage.classList.add('failure');
                    }
                });
            });
        });
    </script>
