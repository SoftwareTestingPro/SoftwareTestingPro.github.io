<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Hover and Click a Link</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
    <style>
        .image-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            margin: 0 auto 20px;
        }
        .image-container img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            transition: transform 0.3s ease;
        }
        .image-container:hover img {
            transform: scale(1.1);
        }
        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            color: #fff;
            padding: 10px 0;
            background-color: rgba(0, 0, 0, 0.5);
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .image-container:hover .image-overlay {
            opacity: 1;
        }
    </style>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="I-2.01-DragAndDropText.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="I-2.03-Train.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Mouse Hover and Click a Link</h1>
            <p class="lead">Mouse hover over image and click on the link</p>

            <div class="image-container" id="imageContainer">
                <img id="flagImage" src="https://img1.hscicdn.com/image/upload/f_auto,t_ds_square_w_640,q_50/lsci/db/PICTURES/CMS/316400/316486.png" alt="Sachin Tendulkar">
                <div class="image-overlay" id="imageOverlay"></div>
            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite">
                <span class="icon">✓</span>
                <span>This is Sachin Tendulkar, an Indian cricketer.</span>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

<script>
    const imageContainer = document.getElementById('imageContainer');
    const imageOverlay = document.getElementById('imageOverlay');
    const successMessage = document.getElementById('successMessage');

    // Hide success message initially
    successMessage.style.display = 'none';
    successMessage.classList.remove('success');

    imageContainer.addEventListener('mouseenter', () => {
        const link = document.createElement('a');
        link.href = '#';
        link.style.color = 'white';
        link.textContent = 'Who is He ?';
        link.onclick = displaySuccessMessage;
        imageOverlay.innerHTML = ''; // clear previous
        imageOverlay.appendChild(link);
    });

    imageContainer.addEventListener('mouseleave', () => {
        imageOverlay.innerHTML = ''; // hide link on mouse out
    });

    function displaySuccessMessage(event) {
        event.preventDefault();
        successMessage.style.display = 'flex';
        successMessage.classList.add('success');
    }
</script>
</body>
</html>
