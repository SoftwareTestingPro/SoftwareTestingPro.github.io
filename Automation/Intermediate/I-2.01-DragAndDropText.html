    <main class="card">
        <div class="card-content">
            <h1>Drag and Drop Centered</h1>
            <p class="lead">Drag and Drop the button 'Drag Me' to other container</p>

            <div class="container-wrapper">
                <div class="container" id="container1">
                    <div class="draggable" id="draggableText" draggable="true">Drag Me</div>
                </div>
                <div class="container dropzone" id="container2">
                    Drop Here
                </div>
            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite"><span>Success! The square box has been dropped.</span></div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

<script>
    const draggableText = document.getElementById('draggableText');
    const container2 = document.getElementById('container2');
    const successMessage = document.getElementById('successMessage');

    // Hide success message initially
    successMessage.style.display = 'none';
    successMessage.classList.remove('success');

    draggableText.addEventListener('dragstart', (event) => {
        event.dataTransfer.setData('text/plain', event.target.id);
    });

    container2.addEventListener('dragover', (event) => {
        event.preventDefault();
    });

    container2.addEventListener('drop', (event) => {
        event.preventDefault();
        const data = event.dataTransfer.getData('text/plain');
        const dragged = document.getElementById(data);

        // Hide "Drop Here" text
        container2.textContent = '';

        // Rename "Drag Me" to "Dropped"
        dragged.textContent = 'Dropped';

        container2.appendChild(dragged);

        // Show success message
        successMessage.style.display = 'flex';
        successMessage.classList.add('success');
    });
</script>
