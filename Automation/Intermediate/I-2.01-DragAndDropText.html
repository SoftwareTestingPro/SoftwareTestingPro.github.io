<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop Centered</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="I-2.00-Overview.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="I-2.02-HoverLink.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Drag and Drop Centered</h1>
            <p class="lead">Drag and Drop the button 'Drag Me' to other container</p>

            <div class="container-wrapper" style="display: flex; gap: 20px; justify-content: center;">
                <div class="container" id="container1" style="border: 1px solid #ddd; padding: 20px; border-radius: 8px; background: #f9f9f9; width: 200px; text-align: center;">
                    <div class="draggable" id="draggableText" draggable="true" style="background: #4caf50; color: white; padding: 10px; border-radius: 5px; cursor: move;">Drag Me</div>
                </div>
                <div class="container dropzone" id="container2" style="border: 1px solid #ddd; padding: 20px; border-radius: 8px; background: #e3f2fd; width: 200px; text-align: center;">
                    Drop Here
                </div>
            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite"><span>Success! The text has been dropped.</span></div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

<script>
    const draggableText = document.getElementById('draggableText');
    const container2 = document.getElementById('container2');
    const successMessage = document.getElementById('successMessage');

    // Hide success message initially
    successMessage.style.display = 'none';
    successMessage.classList.remove('success');

    draggableText.addEventListener('dragstart', (event) => {
        event.dataTransfer.setData('text/plain', event.target.id);
    });

    container2.addEventListener('dragover', (event) => {
        event.preventDefault();
    });

    container2.addEventListener('drop', (event) => {
        event.preventDefault();
        const data = event.dataTransfer.getData('text/plain');
        const dragged = document.getElementById(data);

        container2.appendChild(dragged);

        // Show success message
        successMessage.style.display = 'flex';
        successMessage.classList.add('success');
    });
</script>
</body>
</html>
