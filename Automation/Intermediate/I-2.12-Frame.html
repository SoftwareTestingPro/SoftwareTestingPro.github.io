<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button within a Frame</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="I-2.11-Progressbar.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="I-2.13-BrowserPopUp.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Button within a Frame</h1>
            <p class="lead">Click the button inside the frame</p>

            <div class="iframe-container">
                <iframe src="about:blank" id="button-frame"></iframe>
            </div>

            <div class="message" id="message" role="status" aria-live="polite">
                <span class="icon">✓</span>
                <span>Success! You clicked the button within a frame.</span>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        // Create content for the iframe
        const iframe = document.getElementById('button-frame');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

        iframeDoc.open();
        iframeDoc.write(`
            <style>
                body {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    height: 100%;
                    margin: 0;
                    background-color: #fff;
                }
                .button {
                    padding: 12px 24px;
                    font-size: 18px;
                    color: #fff;
                    background-color: #007bff;
                    border: none;
                    border-radius: 6px;
                    cursor: pointer;
                    transition: background-color 0.3s, transform 0.3s;
                }
                .button:hover {
                    background-color: #0056b3;
                    transform: scale(1.05);
                }
            </style>
            <button class="button" id="action-button" type="button">Click Me</button>
        `);
        iframeDoc.close();

        // Add event listener for the button inside the iframe
        iframe.onload = function() {
            iframeDoc.getElementById('action-button').addEventListener('click', function() {
                document.getElementById('message').innerHTML = `<div class="success">Success! You clicked the button within a frame.</div>`;
            });
        };
    </script>
</body>
</html>
