<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button within a Frame</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Intermediate/styles-I-2.12.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="I-2.11-Progressbar.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="I-2.13-BrowserPopUp.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Button within a Frame</h1>
            <p class="lead">Click the button inside the frame</p>

            <div class="iframe-container">
                <iframe src="about:blank" id="button-frame"></iframe>
            </div>

            <div class="message" id="message" role="status" aria-live="polite">
                <span>Success! You clicked the button within a frame.</span>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        // Create content for the iframe
        const iframe = document.getElementById('button-frame');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

        iframeDoc.open();
        iframeDoc.write(`
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <link rel="stylesheet" href="../assets/css/Intermediate/styles-I-2.12.css">
            </head>
            <body class="iframe-body">
                <button class="frame-button" id="action-button" type="button">Click Me</button>
            </body>
            </html>
        `);
        iframeDoc.close();

        // Add event listener for the button inside the iframe
        iframeDoc.getElementById('action-button').addEventListener('click', function() {
            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'flex';
            messageDiv.classList.add('success');
        });
    </script>
</body>
</html>
