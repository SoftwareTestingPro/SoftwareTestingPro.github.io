<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Fields Example</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Intermediate/styles-I-2.20.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>

    <div id="header-placeholder"></div>
    <div class="content-wrapper">
        <div class="card-nav">
            <a href="I-2.19-FetchDate.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="I-2.21-ScrollableList.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Input Fields Example</h1>
                <p class="lead">Copy text from below Input Field</p>

                <div class="input-group">
                    <label for="inputField1">Copy text from below Input Field:</label>
                    <input type="text" id="inputField1" readonly>
                </div>

                <div class="input-group">
                    <label for="inputField2">Enter text copied from above Input Field:</label>
                    <input type="text" id="inputField2">
                </div>

                <div id="message" class="message" role="alert"></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputField1 = document.getElementById('inputField1');
            const inputField2 = document.getElementById('inputField2');
            const message = document.getElementById('message');

            inputField1.value = Math.random().toString(36).substring(3);

            inputField2.addEventListener('input', () => {
                if (inputField2.value === inputField1.value) {
                    message.textContent = 'Success: The values match!';
                    message.className = 'message success';
                    message.style.display = 'block';
                } else {
                    message.textContent = 'Failure: The values do not match.';
                    message.className = 'message failure';
                    message.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
