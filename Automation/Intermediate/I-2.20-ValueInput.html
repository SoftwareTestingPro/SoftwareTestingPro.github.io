        <main class="card">
            <div class="card-content">
                <h1>Input Fields Example</h1>
                <p class="lead">Copy text from below Input Field</p>

                <div class="input-group">
                    <label for="inputField1">Copy text from below Input Field:</label>
                    <input type="text" id="inputField1" readonly>
                </div>

                <div class="input-group">
                    <label for="inputField2">Enter text copied from above Input Field:</label>
                    <input type="text" id="inputField2">
                </div>

                <div id="message" class="message" role="alert"></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputField1 = document.getElementById('inputField1');
            const inputField2 = document.getElementById('inputField2');
            const message = document.getElementById('message');

            inputField1.value = Math.random().toString(36).substring(3);

            inputField2.addEventListener('input', () => {
                if (inputField2.value === inputField1.value) {
                    message.textContent = 'Success: The values match!';
                    message.className = 'message success';
                    message.style.display = 'block';
                } else {
                    message.textContent = 'Failure: The values do not match.';
                    message.className = 'message failure';
                    message.style.display = 'block';
                }
            });
        });
    </script>
