<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Example</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="content-wrapper">
        <div class="card-nav">
            <a href="I-2.07-Rubix.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="I-2.09-RandomButtons.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Slider Example</h1>
                <p class="lead">Move the slider to value 8</p>
                <div class="slider-container">
                    <input type="range" min="1" max="10" value="5" class="slider" id="valueSlider">
                    <div class="slider-value" id="sliderValue">5</div>
                </div>
                <div class="success-message" id="successMessage">
                    Congratulations! You selected the value 8!
                </div>
                <div class="failure-message" id="failureMessage">
                    Try again! The selected value was not 8.
                </div>
            </div>
        </main>
    </div>
    <div id="footer-placeholder"></div>

    <script>
        const slider = document.getElementById('valueSlider');
        const sliderValue = document.getElementById('sliderValue');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        function updateMessages() {
            const value = parseInt(slider.value, 10);
            sliderValue.textContent = value;
            if (value === 8) {
                successMessage.style.display = 'block'; // Show success message
                failureMessage.style.display = 'none'; // Hide failure message
            } else {
                successMessage.style.display = 'none'; // Hide success message
                failureMessage.style.display = 'block'; // Show failure message
            }
        }

        slider.addEventListener('input', updateMessages);
    </script>
</body>
</html>
