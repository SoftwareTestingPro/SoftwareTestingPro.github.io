        <main class="card">
            <div class="card-content">
                <h1>Slider Example</h1>
                <p class="lead">Move the slider to value 8</p>
                <div class="slider-container">
                    <input type="range" min="1" max="10" value="5" class="slider" id="valueSlider">
                    <div class="slider-value" id="sliderValue">5</div>
                </div>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>Congratulations! You selected the value 8!</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Try again! The selected value is not 8.</span></div>
            </div>
        </main>
    </div>
    <div id="footer-placeholder"></div>

    <script>
        const slider = document.getElementById('valueSlider');
        const sliderValue = document.getElementById('sliderValue');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        function updateMessages() {
            const value = parseInt(slider.value, 10);
            sliderValue.textContent = value;
            if (value === 8) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
            }
        }

        slider.addEventListener('input', updateMessages);
    </script>
