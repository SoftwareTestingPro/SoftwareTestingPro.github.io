<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Life Quote</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="content-wrapper">
        <div class="card-nav">
            <a href="I-2.12-Frame.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="I-2.14-JSInput.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Random Life Quote</h1>
                <p class="lead">Click below button to fetch a quote and enter the displayed quote in the input field:</p>

                <div class="button-enabled">
                    <button onclick="openQuoteWindow()">Get a Random Life Quote</button>
                </div>

                <div class="input-group-parent">
                    <div class="input-group-left">
                        <label for="userInput" class="label-left">Enter the quote:</label>
                    </div>

                    <div class="input-group-right" style="width: 900px;">
                        <input type="text" id="userInput" placeholder="Enter the quote here" disabled>
                    </div>
                </div>

                <div class="message" id="result"></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        let displayedQuote = "";

        function openQuoteWindow() {
    const quotes = [
        "Life is short. – Unknown",
        "Be happy. – Dalai Lama",
        "Live simply. – Unknown",
        "Dream big. – Unknown",
        "Stay positive. – Unknown"
    ];

    displayedQuote = quotes[Math.floor(Math.random() * quotes.length)];
    const quoteWindow = window.open("", "quoteWindow", "width=400,height=200");

    const htmlContent = `
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <title>Life Quote</title>
            <style>
                body {
                    font-family: Arial, sans-serif;
                    background-color: #f9f9f9;
                    margin: 0;
                    padding: 20px;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    height: 100vh;
                }
                p {
                    font-size: 1.2em;
                    color: #333;
                    text-align: center;
                }
            </style>
        </head>
        <body>
            <p>${displayedQuote}</p>
        </body>
        </html>
    `;

    quoteWindow.document.open();
    quoteWindow.document.write(htmlContent);
    quoteWindow.document.close();

    const inputField = document.getElementById('userInput');
    inputField.disabled = false;
    inputField.value = '';
    inputField.focus();

    const resultDiv = document.getElementById('result');
    resultDiv.textContent = '';
    resultDiv.className = 'message';
}
        document.getElementById('userInput').addEventListener('input', function() {
            const userInput = document.getElementById('userInput').value;
            const resultDiv = document.getElementById('result');

            if (userInput === displayedQuote) {
                resultDiv.textContent = `Success! The entered text matches the quote.`;
                resultDiv.className = 'message success';
            } else if (userInput) {
                resultDiv.textContent = `Failure! You entered "${userInput}", but the quote is "${displayedQuote}".`;
                resultDiv.className = 'message failure';
            } else {
                resultDiv.textContent = '';
                resultDiv.className = 'message';
            }
        });
    </script>
</body>
</html>
