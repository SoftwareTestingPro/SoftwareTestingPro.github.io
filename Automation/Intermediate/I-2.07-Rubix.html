<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Cube</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="content-wrapper">
        <div class="card-nav">
            <a href="I-2.06-Table.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="I-2.08-Slider.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Rubik's Cube</h1>
                <p class="lead">Click the unique block to complete this task.</p>
                <div id="rubiks-cube"></div>

                <div class="message" id="successMessage" role="status" aria-live="polite"><span>Congratulations! You clicked the unique block!</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Try again!</span></div>
            </div>
        </main>
    </div>
    <div id="footer-placeholder"></div>

    <script src="../../components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rubiksCube = document.getElementById('rubiks-cube');
            const distinctIndex = Math.floor(Math.random() * 9);

            function getRandomColor() {
                const letters = '0123456789ABCDEF';
                let color = '#';
                for (let i = 0; i < 6; i++) {
                    color += letters[Math.floor(Math.random() * 16)];
                }
                return color;
            }

            const distinctColor = getRandomColor();
            const commonColor = getRandomColor();

            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');

            for (let i = 0; i < 9; i++) {
                const block = document.createElement('div');
                block.classList.add('block');
                const color = (i === distinctIndex) ? distinctColor : commonColor;
                block.style.backgroundColor = color;

                block.addEventListener('click', () => {
                    if (i === distinctIndex) {
                        successMessage.style.display = 'block'; // Show success message
                        successMessage.classList.add('success');
                        failureMessage.style.display = 'none'; // Hide failure message
                        failureMessage.classList.remove('failure');
                    } else {
                        successMessage.style.display = 'none'; // Hide success message
                        successMessage.classList.remove('success');
                        failureMessage.style.display = 'block'; // Show failure message
                        failureMessage.classList.add('failure');
                    }
                });
                rubiksCube.appendChild(block);
            }
        });
    </script>
</body>
</html>
