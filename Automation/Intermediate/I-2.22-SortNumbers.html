        <main class="card">
            <div class="card-content">
                <h1>Number Sorting Game</h1>
                <p class="lead">Master number sorting! Arrange the displayed numbers in ascending order and input them correctly to prove your logical sequencing skills.</p>

                <div class="number-boxes" id="numberBoxes"></div>

                <div class="input-boxes">
                    <div class="input-box"><input type="text" maxlength="2" /></div>
                    <div class="input-box"><input type="text" maxlength="2" /></div>
                    <div class="input-box"><input type="text" maxlength="2" /></div>
                    <div class="input-box"><input type="text" maxlength="2" /></div>
                    <div class="input-box"><input type="text" maxlength="2" /></div>
                </div>

                <div class="message" id="successMessage">Success! The numbers are in ascending order.</div>
                <div class="message" id="failureMessage">Failure! Please enter the correct numbers in ascending order.</div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

<script>
    function generateRandomNumbers(count, min, max) {
        const numbers = [];
        while (numbers.length < count) {
            const num = Math.floor(Math.random() * (max - min + 1)) + min;
            if (!numbers.includes(num)) {
                numbers.push(num);
            }
        }
        return numbers;
    }

    function displayRandomNumbers() {
        const numberBoxes = document.getElementById('numberBoxes');
        const randomNumbers = generateRandomNumbers(5, 1, 99);
        randomNumbers.forEach(num => {
            const div = document.createElement('div');
            div.classList.add('number-box');
            div.textContent = num;
            numberBoxes.appendChild(div);
        });
        return randomNumbers;
    }

    function checkSortedOrder(userInput, originalNumbers) {
        const sortedOriginal = [...originalNumbers].sort((a, b) => a - b);
        return userInput.every((num, index) => num === sortedOriginal[index]);
    }

    function addInputEventListeners(randomNumbers) {
        const inputBoxes = document.querySelectorAll('.input-box input');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        // Hide messages initially
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';

        inputBoxes.forEach(input => {
            input.addEventListener('input', () => {
                const userInput = Array.from(inputBoxes).map(input => parseInt(input.value));
                const allInputsFilled = userInput.every(num => !isNaN(num));
                
                if (allInputsFilled) {
                    // Check if all numbers are from the original set
                    const validNumbers = userInput.every(num => randomNumbers.includes(num));
                    // Check if numbers are in ascending order
                    const correctOrder = checkSortedOrder(userInput, randomNumbers);
                    
                    if (validNumbers && correctOrder) {
                        successMessage.style.display = 'block';
                        failureMessage.style.display = 'none';
                        // Disable all input fields
                        inputBoxes.forEach(input => input.disabled = true);
                    } else {
                        successMessage.style.display = 'none';
                        failureMessage.style.display = 'block';
                    }
                } else {
                    successMessage.style.display = 'none';
                    failureMessage.style.display = 'none';
                }
            });
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const randomNumbers = displayRandomNumbers();
        addInputEventListeners(randomNumbers);
    });
</script>
