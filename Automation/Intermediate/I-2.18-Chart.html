<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Volume of a company</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Intermediate/styles-I-2.18.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>

    <div id="header-placeholder"></div>
    <div class="content-wrapper">
        <div class="card-nav">
            <a href="I-2.17-LoadingResults.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="I-2.19-FetchDate.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Sales per Month FY 2023-24</h1>
                <p class="lead">Enter Month with Highest Sales</p>

                <canvas id="salesChart"></canvas>

                <div class="input-container">
                    <label for="monthInput">Enter Month with Highest Sales:</label>
                    <input type="text" id="monthInput">
                    <div id="message" class="message"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <!-- Include Chart.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function getRandomSalesData() {
            const data = [];
            for (let i = 0; i < 12; i++) {
                data.push(Math.floor(Math.random() * 2000) + 500); // Random sales volume between 500 and 2500
            }
            return data;
        }

        const monthNames = ['April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December', 'January', 'February', 'March'];
        const salesData = getRandomSalesData();
        const maxSalesIndex = salesData.indexOf(Math.max(...salesData));
        const monthWithMaxSales = monthNames[maxSalesIndex];

        const ctx = document.getElementById('salesChart').getContext('2d');
        const salesChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: monthNames,
                datasets: [{
                    label: 'Sales Volume',
                    data: salesData,
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Sales Volume'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Month'
                        }
                    }
                }
            }
        });

        document.getElementById('monthInput').addEventListener('input', function() {
            const userInput = this.value.trim();
            const messageElement = document.getElementById('message');

            if (userInput.toLowerCase() === monthWithMaxSales.toLowerCase()) {
                messageElement.textContent = 'Success! You entered the correct month.';
                messageElement.style.color = 'green';
            } else {
                messageElement.textContent = `Failure! The correct month is ${monthWithMaxSales}.`;
                messageElement.style.color = 'red';
            }
        });
    </script>
</body>
</html>
