        <main class="card">
            <div class="card-content">
                <h1>Sales per Month FY 2023-24</h1>
                <p class="lead">Enter Month with Highest Sales</p>

                <canvas id="salesChart"></canvas>
                <div class="input-group-parent">
                    <div class="input-group-left">
                        <label for="monthInput" class="label-left">Enter Month with Highest Sales:</label>
                    </div>

                    <div class="input-group-right">
                        <input type="text" id="monthInput" name="user-input-month" placeholder="Month Name">
                    </div>
                </div>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>Correct — the entered text matches the source.</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Does not match. <span style="color: black;">Expected:</span> <span id="expectedValue"></span> <span style="color: black;">Selected:</span> <span id="selectedValue"></span></span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <!-- Include Chart.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function getRandomSalesData() {
            const data = [];
            for (let i = 0; i < 12; i++) {
                data.push(Math.floor(Math.random() * 2000) + 500); // Random sales volume between 500 and 2500
            }
            return data;
        }

        const monthNames = ['April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December', 'January', 'February', 'March'];
        const salesData = getRandomSalesData();
        const maxSalesIndex = salesData.indexOf(Math.max(...salesData));
        const monthWithMaxSales = monthNames[maxSalesIndex];

        const ctx = document.getElementById('salesChart').getContext('2d');
        const salesChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: monthNames,
                datasets: [{
                    label: 'Sales Volume',
                    data: salesData,
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Sales Volume'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Month'
                        }
                    }
                }
            }
        });

        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedValue = document.getElementById('expectedValue');
        const selectedValue = document.getElementById('selectedValue');

        // Hide messages initially
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.style.display = 'none';
        failureMessage.classList.remove('failure');

        document.getElementById('monthInput').addEventListener('input', function() {
            const userInput = this.value.trim();

            if (userInput.toLowerCase() === monthWithMaxSales.toLowerCase()) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                expectedValue.textContent = monthWithMaxSales;
                selectedValue.textContent = userInput;
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
            }
        });
    </script>
