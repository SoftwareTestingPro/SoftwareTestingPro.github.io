        <main class="card">
            <div class="card-content">
                <h1>Color Picker Challenge</h1>
                <p class="lead">Master color selection! Match the displayed hex color precisely using the color picker to prove your color recognition and selection skills.</p>

                <div id="target-color-display">#RRGGBB</div>

                <input type="color" id="color-input" value="#ffffff">

                <div id="message-display"></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const colorInput = document.getElementById('color-input');
        const targetColorDisplay = document.getElementById('target-color-display');
        const messageDisplay = document.getElementById('message-display');

        let expectedColorHex = '';

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function generateRandomHexColor() {
            const randomColor = Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
            return "#" + randomColor.toUpperCase();
        }

        function initializeChallenge() {
            expectedColorHex = generateRandomHexColor();

            if (Math.random() < 0.5) {
                targetColorDisplay.textContent = expectedColorHex;
            } else {
                targetColorDisplay.textContent = hexToRgb(expectedColorHex);
            }

            colorInput.value = "#ffffff";
            messageDisplay.textContent = '';
        }

        function checkAnswer() {
            const selectedColorHex = colorInput.value.toUpperCase();

            if (selectedColorHex === expectedColorHex) {
                messageDisplay.textContent = 'Success! You matched the color.';
                messageDisplay.className = 'message-display success';
            } else {
                let yourChoiceDisplay = selectedColorHex;
                // If the challenge was in RGB, show the user's choice in RGB too
                if (targetColorDisplay.textContent.startsWith('rgb')) {
                    yourChoiceDisplay = hexToRgb(selectedColorHex);
                }
                messageDisplay.textContent = `Failure! Expected: ${targetColorDisplay.textContent}, Your choice: ${yourChoiceDisplay}`;
                messageDisplay.className = 'message-display failure';
            }
        }

        colorInput.addEventListener('change', checkAnswer);
        window.addEventListener('load', initializeChallenge);
    </script>
