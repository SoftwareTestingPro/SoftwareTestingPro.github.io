<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top 5 Indian Batsmen</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="../assets/components/components.js"></script>
</head>
<body>
  <div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="I-2.04-Calendar.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="I-2.06-Table.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Top 5 Indian Batsmen</h1>
            <p class="lead">Identify the top scorer and Sachin's runs</p>

            <ul class="list-group batsmen-grid" id="batsmenList">
                <!-- Populated by JavaScript -->
            </ul>

            <div class="input-group-parent">
                <div class="input-group-left">
                    <label for="inputField1" class="label-left">Enter name of top scorer:</label>
                </div>

                <div class="input-group-right">
                    <input type="text" id="inputField1" name="user-input-name" placeholder="Type your name...">
                </div>
            </div>

            <div class="message" id="successMessage1" role="status" aria-live="polite">
                <span>Correct! The top scorer is correctly identified.</span>
            </div>

            <div class="message" id="failureMessage1" role="status" aria-live="polite">
                <span id="topScorerError">Incorrect! Please try again.</span>
            </div>

            <div class="input-group-parent">
                <div class="input-group-left">
                    <label for="inputField2" class="label-left">Runs Scored by Sachin Tendulkar:</label>
                </div>

                <div class="input-group-right">
                    <input type="text" id="inputField2" name="user-input-name" placeholder="Type your name...">
                </div>
            </div>

            <div class="message" id="successMessage2" role="status" aria-live="polite">
                <span id="sachinSuccess">Correct! Sachin Tendulkar scored the right amount.</span>
            </div>

            <div class="message" id="failureMessage2" role="status" aria-live="polite">
                <span id="sachinError">Incorrect! Please try again.</span>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const batsmen = [
        'Sachin Tendulkar',
        'Virat Kohli',
        'Sourav Ganguly',
        'Rahul Dravid',
        'MS Dhoni'
      ];

      const batsmenList = document.getElementById('batsmenList');
        const inputField1 = document.getElementById('inputField1');
        const inputField2 = document.getElementById('inputField2');
        const successMessage1 = document.getElementById('successMessage1');
        const failureMessage1 = document.getElementById('failureMessage1');
        const successMessage2 = document.getElementById('successMessage2');
        const failureMessage2 = document.getElementById('failureMessage2');
        const topScorerError = document.getElementById('topScorerError');
        const sachinSuccess = document.getElementById('sachinSuccess');
        const sachinError = document.getElementById('sachinError');

        // Hide messages initially
        successMessage1.style.display = 'none';
        successMessage1.classList.remove('success');
        failureMessage1.style.display = 'none';
        failureMessage1.classList.remove('failure');
        successMessage2.style.display = 'none';
        successMessage2.classList.remove('success');
        failureMessage2.style.display = 'none';
        failureMessage2.classList.remove('failure');

      let scores = {};
      let sachinScore = 0;

      batsmen.forEach((batsman, index) => {
        const randomScore = Math.floor(Math.random() * 200) + 1;
        scores[batsman] = randomScore;

        const listItem = document.createElement('li');
        listItem.className = 'list-group-item';

        listItem.innerHTML = `
                <span class="player-name">${batsman}</span>
                <span class="player-score">${randomScore}</span>
            `;

            batsmenList.appendChild(listItem);

        if (batsman === 'Sachin Tendulkar') {
          sachinScore = randomScore;
        }
      });

      function validateInputs() {
            const topScorer = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            const enteredTopScorer = inputField1.value.trim();
            const enteredSachinScore = inputField2.value.trim();

            // Validate top scorer
            if (enteredTopScorer === topScorer) {
                successMessage1.style.display = 'flex';
                successMessage1.classList.add('success');
                failureMessage1.style.display = 'none';
                failureMessage1.classList.remove('failure');
            } else if (enteredTopScorer) {
                topScorerError.textContent = `Incorrect! The top scorer is ${topScorer} with ${scores[topScorer]} runs.`;
                successMessage1.style.display = 'none';
                successMessage1.classList.remove('success');
                failureMessage1.style.display = 'flex';
                failureMessage1.classList.add('failure');
            }

            // Validate Sachin's score
            if (enteredSachinScore == sachinScore) {
                sachinSuccess.textContent = `Correct! Sachin Tendulkar scored ${sachinScore}.`;
                successMessage2.style.display = 'flex';
                successMessage2.classList.add('success');
                failureMessage2.style.display = 'none';
                failureMessage2.classList.remove('failure');
            } else if (enteredSachinScore) {
                sachinError.textContent = `Incorrect! Sachin Tendulkar scored ${sachinScore}.`;
                successMessage2.style.display = 'none';
                successMessage2.classList.remove('success');
                failureMessage2.style.display = 'flex';
                failureMessage2.classList.add('failure');
            }
        }

      inputField1.addEventListener('input', validateInputs);
      inputField2.addEventListener('input', validateInputs);
    });
  </script>
</body>
</html>
