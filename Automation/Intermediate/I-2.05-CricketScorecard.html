    <main class="card">
        <div class="card-content">
            <h1>Top 5 Indian Batsmen</h1>
            <p class="lead">Master sports data analysis! Identify the top scorer and find Sachin's runs from the cricket statistics to prove your data extraction skills.</p>

            <ul class="list-group batsmen-grid" id="batsmenList">
                <!-- Populated by JavaScript -->
            </ul>

            <div class="input-group-parent">
                <div class="input-group-left">
                    <label for="inputField1" class="label-left">Enter name of top scorer:</label>
                </div>

                <div class="input-group-right">
                    <input type="text" id="inputField1" name="user-input-name" placeholder="Type your name...">
                </div>
            </div>

            <div class="message" id="successMessage1" role="status" aria-live="polite">
                <span>Correct! The top scorer is correctly identified.</span>
            </div>

            <div class="message" id="failureMessage1" role="status" aria-live="polite">
                <span id="topScorerError">Incorrect! Please try again.</span>
            </div>

            </div>
    </main>
</div>

<div id="footer-placeholder"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const batsmen = [
        'Sachin Tendulkar',
        'Virat Kohli',
        'Sourav Ganguly',
        'Rahul Dravid',
        'MS Dhoni'
      ];

      const batsmenList = document.getElementById('batsmenList');
        const inputField1 = document.getElementById('inputField1');
        const successMessage1 = document.getElementById('successMessage1');
        const failureMessage1 = document.getElementById('failureMessage1');
        const topScorerError = document.getElementById('topScorerError');

        // Hide messages initially
        successMessage1.style.display = 'none';
        successMessage1.classList.remove('success');
        failureMessage1.style.display = 'none';
        failureMessage1.classList.remove('failure');

      let scores = {};

      batsmen.forEach((batsman, index) => {
        const randomScore = Math.floor(Math.random() * 200) + 1;
        scores[batsman] = randomScore;

        const listItem = document.createElement('li');
        listItem.className = 'list-group-item';

        listItem.innerHTML = `
                <span class="player-name">${batsman}</span>
                <span class="player-score">${randomScore}</span>
            `;

            batsmenList.appendChild(listItem);
      });

      function validateInputs() {
            const topScorer = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            const enteredTopScorer = inputField1.value.trim();

            // Validate top scorer
            if (enteredTopScorer === topScorer) {
                successMessage1.style.display = 'flex';
                successMessage1.classList.add('success');
                failureMessage1.style.display = 'none';
                failureMessage1.classList.remove('failure');
            } else if (enteredTopScorer) {
                topScorerError.textContent = `Incorrect! The top scorer is ${topScorer} with ${scores[topScorer]} runs.`;
                successMessage1.style.display = 'none';
                successMessage1.classList.remove('success');
                failureMessage1.style.display = 'flex';
                failureMessage1.classList.add('failure');
            }
        }

      inputField1.addEventListener('input', validateInputs);
    });
  </script>
