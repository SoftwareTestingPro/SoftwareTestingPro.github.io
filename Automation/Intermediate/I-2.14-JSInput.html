      <div class="card-content">
        <h1>Javascript Input Field</h1>
        <p class="lead">Master JavaScript injection! Bypass automation protections by using JavaScript execution to input text in this secured field.</p>

          <div class="input-group-parent">
              <div class="input-group-left">
                  <label for="secureInput" class="label-left">Enter Your Country Name:</label>
              </div>

              <div class="input-group-right">
                  <input type="text" id="secureInput" class="protected-input" name="user-input-name" placeholder="Type your country name...">
                  <div class="shield" id="shield"></div>
              </div>
          </div>
          
        <div class="message success" id="successMessage" role="status" aria-live="polite" style="display: none;">
            <span>You typed: </span>
        </div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    const input = document.getElementById("secureInput");
    const shield = document.getElementById("shield");
    const successMessage = document.getElementById("successMessage");

    // Block all key events unless shield is removed
    input.addEventListener("keydown", (e) => {
      if (shield.style.display !== "none") {
        e.preventDefault();
      }
    });

    // Remove shield on real mouse interaction
    shield.addEventListener("mouseenter", () => {
      shield.style.display = "none";
      input.focus();
    });

    input.addEventListener("input", () => {
      if (input.value) {
        const span = successMessage.querySelector('span');
        span.textContent = `Country name entered: ${input.value}`;
        successMessage.style.display = 'flex';
      } else {
        successMessage.style.display = 'none';
      }
    });
  </script>
