<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>

    <div id="header-placeholder"></div>
    <div class="content-wrapper">
        <div class="card-nav">
            <a href="I-2.18-Chart.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="I-2.20-ValueInput.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Date</h1>
                <p class="lead">Enter today's date in YYYY-MM-DD</p>

                <input type="text" id="dateInput" placeholder="Enter date here">

                <div class="message success" id="successMessage">
                    Success! The date matches. ✅
                </div>

                <div class="message failure" id="failureMessage">
                    Incorrect date. Please try again. ❌
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const inputField = document.getElementById('dateInput');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const today = new Date().toISOString().split('T')[0]; // Get today's date in YYYY-MM-DD format

        inputField.addEventListener('input', () => {
            if (inputField.value.trim() === today) {
                successMessage.style.display = 'block';
                failureMessage.style.display = 'none';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
