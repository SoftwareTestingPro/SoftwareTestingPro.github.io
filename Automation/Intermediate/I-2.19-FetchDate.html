        <main class="card">
            <div class="card-content">
                <h1>Date</h1>
                <p class="lead">Master date formatting! Input today's date in precise YYYY-MM-DD format to demonstrate your date handling and validation skills.</p>

                <div class="input-group-parent">
                    <div class="input-group-left">
                        <label for="dateInput" class="label-left">Enter current date in YYYY-MM-DD Format:</label>
                    </div>

                    <div class="input-group-right">
                        <input type="text" id="dateInput" placeholder="Enter date here">
                    </div>
                </div>

                <div class="message success" id="successMessage">
                    Success! The date matches.
                </div>

                <div class="message failure" id="failureMessage">
                    Incorrect date. Please try again.
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const inputField = document.getElementById('dateInput');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const today = new Date().toISOString().split('T')[0]; // Get today's date in YYYY-MM-DD format

        // Hide messages initially
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';

        inputField.addEventListener('input', () => {
            if (inputField.value.trim() === today) {
                successMessage.style.display = 'block';
                failureMessage.style.display = 'none';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'block';
            }
        });
    </script>
