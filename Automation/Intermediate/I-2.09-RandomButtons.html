    <main class="card">
        <div class="card-content">
            <h1>Random Buttons</h1>
            <p class="lead">Count total buttons and enter value in Input Field</p>

            <div class="button-container" id="buttonContainer">
                <!-- Buttons will be added here dynamically -->
            </div>

            <div class="input-group-parent">
                <div class="input-group-left">
                    <label for="inputField" class="label-left">Enter total number of buttons:</label>
                </div>

                <div class="input-group-right">
                    <input type="text" id="inputField" placeholder="Enter number of buttons..." maxlength="10">
                </div>
            </div>

            <div class="input-group">

            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite">
                <span>Correct! The count of buttons match the input value.</span>
            </div>

            <div class="message" id="failureMessage" role="status" aria-live="polite">
                <span>Incorrect. <span style="color: black;">Expected:</span> <span id="expectedCount"></span> <span style="color: black;">Entered:</span> <span id="enteredCount"></span></span>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

<script>
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getRandomName(usedNames) {
        const names = ['Giraffe', 'Pyramid', 'Volcano', 'Rainforest', 'Desert', 'Oasis', 'Tornado', 'Coral Reef', 'Aurora', 'Canyon'];
        let uniqueName;
        do {
            uniqueName = names[Math.floor(Math.random() * names.length)];
        } while (usedNames.has(uniqueName));
        usedNames.add(uniqueName);
        return uniqueName;
    }

    window.onload = function() {
        const container = document.getElementById('buttonContainer');
        const inputField = document.getElementById('inputField');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedCount = document.getElementById('expectedCount');
        const enteredCount = document.getElementById('enteredCount');

        // Hide messages initially
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.style.display = 'none';
        failureMessage.classList.remove('failure');

        const numberOfButtons = getRandomInt(4, 10);
        const usedNames = new Set();
        let buttonCount = numberOfButtons;

        expectedCount.textContent = buttonCount;

        function setGridColumns() {
            const screenWidth = window.innerWidth;
            let maxColumns;
            if (screenWidth > 1024) maxColumns = 4;
            else if (screenWidth > 768) maxColumns = 3;
            else if (screenWidth > 480) maxColumns = 2;
            else maxColumns = 1;

            let rows, columns;
            switch (buttonCount) {
                case 4: rows = 2; columns = 2; break;
                case 5: rows = 2; columns = 3; break;
                case 6: rows = 2; columns = 3; break;
                case 7: rows = 2; columns = 4; break;
                case 8: rows = 2; columns = 4; break;
                case 9: rows = 3; columns = 3; break;
                case 10: rows = 3; columns = 4; break;
            }
            columns = Math.min(columns, maxColumns);
            container.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
        }

        for (let i = 1; i <= buttonCount; i++) {
            const button = document.createElement('button');
            button.textContent = getRandomName(usedNames);
            button.id = 'button' + i;
            container.appendChild(button);
        }

        setGridColumns();
        window.addEventListener('resize', setGridColumns);

        inputField.addEventListener('input', () => {
            // Remove non-digit characters
            inputField.value = inputField.value.replace(/\D/g, '');

            const userInput = parseInt(inputField.value, 10);

            if (Number.isInteger(userInput) && userInput === buttonCount) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                enteredCount.textContent = isNaN(userInput) ? '(none)' : userInput;
            }
        });
    };
</script>
