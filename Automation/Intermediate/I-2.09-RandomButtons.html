<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Buttons</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
    <style>
        .button-container {
            margin-bottom: 20px;
        }

        button {
            margin: 5px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        input[type="text"] {
            padding: 10px;
            width: 100%;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            max-width: 220px; /* Set a maximum width */
            text-align: center; /* Center-align text inside input field */
        }

        .success-message, .failure-message {
            display: none;
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            font-size: 1em;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .failure-message {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="I-2.08-Slider.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="I-2.10-Alerts.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Random Buttons</h1>
            <p class="lead">Count total buttons and enter value in Input Field</p>

            <div class="button-container" id="buttonContainer">
                <!-- Buttons will be added here dynamically -->
            </div>

            <div class="input-group">
                <label for="inputField">Enter the number of buttons:</label>
                <input type="text" id="inputField" placeholder="Enter number of buttons..." maxlength="10">
            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite">
                <span class="icon">✓</span>
                <span>Correct! The number of buttons matches the input value.</span>
            </div>

            <div class="message" id="failureMessage" role="status" aria-live="polite">
                <span class="icon">✗</span>
                <span>Incorrect. The number of buttons does not match the input value.</span>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

<script>
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getRandomName(usedNames) {
        const names = ['Giraffe', 'Pyramid', 'Volcano', 'Rainforest', 'Desert', 'Oasis', 'Tornado', 'Coral Reef', 'Aurora', 'Canyon'];
        let uniqueName;
        do {
            uniqueName = names[Math.floor(Math.random() * names.length)];
        } while (usedNames.has(uniqueName));
        usedNames.add(uniqueName);
        return uniqueName;
    }

    window.onload = function() {
        const container = document.getElementById('buttonContainer');
        const inputField = document.getElementById('inputField');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        // Hide messages initially
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.style.display = 'none';
        failureMessage.classList.remove('failure');

        const numberOfButtons = getRandomInt(4, 10);
        const usedNames = new Set();
        let buttonCount = numberOfButtons;

        for (let i = 1; i <= buttonCount; i++) {
            const button = document.createElement('button');
            button.textContent = getRandomName(usedNames);
            button.id = 'button' + i;
            container.appendChild(button);
        }

        inputField.addEventListener('input', () => {
            // Remove non-digit characters
            inputField.value = inputField.value.replace(/\D/g, '');

            const userInput = parseInt(inputField.value, 10);

            if (Number.isInteger(userInput) && userInput === buttonCount) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
            }
        });
    };
</script>

</body>
</html>
