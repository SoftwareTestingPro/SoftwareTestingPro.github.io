    <main class="card">
      <div class="card-content">
        <h1>Image Comparison</h1>
        <p class="lead">Master image comparison! Analyze both images carefully and determine if they are identical to prove your visual inspection skills.</p>

        <div class="images">
          <canvas id="canvas1" width="100" height="100"></canvas>
          <canvas id="canvas2" width="100" height="100"></canvas>
        </div>

        <div class="buttons">
          <button onclick="checkAnswer(true)">Yes</button>
          <button onclick="checkAnswer(false)">No</button>
        </div>

        <div class="message" id="message"></div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    const imagePool = [
      '../../img/img1.jpg',
      '../../img/img2.jpg',
      '../../img/img5.jpg',
      '../../img/img6.jpg',
      '../../img/img7.jpg'
    ];

    let areSame = false;

    function loadImageToCanvas(src, canvasId) {
      const img = new Image();
      img.onload = () => {
        const ctx = document.getElementById(canvasId).getContext('2d');
        ctx.clearRect(0, 0, 100, 100);
        ctx.drawImage(img, 0, 0, 100, 100);
      };
      img.src = src;
    }

    function displayImages() {
      const rand = Math.random();

      if (rand < 0.5) {
        const index = Math.floor(Math.random() * imagePool.length);
        loadImageToCanvas(imagePool[index], 'canvas1');
        loadImageToCanvas(imagePool[index], 'canvas2');
        areSame = true;
      } else {
        let index1 = Math.floor(Math.random() * imagePool.length);
        let index2;
        do {
          index2 = Math.floor(Math.random() * imagePool.length);
        } while (index1 === index2);
        loadImageToCanvas(imagePool[index1], 'canvas1');
        loadImageToCanvas(imagePool[index2], 'canvas2');
        areSame = false;
      }

      document.getElementById('message').textContent = '';
    }

    function checkAnswer(userSaysSame) {
      const message = document.getElementById('message');
      if (userSaysSame === areSame) {
        message.textContent = 'Success! You got it right.';
        message.classList.add('success');
        message.classList.remove('failure');
      } else {
        message.textContent = 'Failure! That was incorrect.';
        message.classList.add('failure');
        message.classList.remove('success');
      }
    }

    window.onload = displayImages;
  </script>
