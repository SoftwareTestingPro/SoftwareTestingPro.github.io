<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Swap Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
            max-width: 90vw;
            width: auto;
            box-sizing: border-box;
        }
        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .text {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .images {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .images img {
            width: 200px;
            height: 200px;
            margin: 0 10px;
            border-radius: 10px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        .radio-group {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .radio-group label {
            margin: 0 10px; /* Reduced margin for closer buttons */
            font-size: 16px;
        }
        .radio-group span {
            margin-right: 10px; /* Space between label and radio buttons */
        }
        .message {
            font-size: 18px;
            font-weight: bold;
        }
        .success {
            color: green;
        }
        .failure {
            color: red;
        }
        @media (max-width: 768px) {
            .container {
                max-width: 95vw;
            }
            .images img {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Image Swap Game</div>
        <div class="text">Identify which image is displayed on the left.</div>
        <div class="images">
            <img id="image1" src="" alt="Image 1">
            <img id="image2" src="" alt="Image 2">
        </div>
        <div class="radio-group">
            <span>Select Image displayed on left:</span>
            <label>
                <input type="radio" name="imageChoice" value="Image 1">
                Image 1
            </label>
            <label>
                <input type="radio" name="imageChoice" value="Image 2">
                Image 2
            </label>
        </div>
        <div id="message" class="message"></div>
    </div>

    <script>
        // Function to randomly swap images
        function swapImages() {
            const imageMap = [
                { name: 'Image 1', src: '../../img/img3.jpg' },
                { name: 'Image 2', src: '../../img/img4.jpg' }
            ];

            // Shuffle the array of image objects
            const shuffledImages = imageMap.sort(() => Math.random() - 0.5);

            const imgElem1 = document.getElementById('image1');
            const imgElem2 = document.getElementById('image2');

            imgElem1.src = shuffledImages[0].src;
            imgElem1.dataset.name = shuffledImages[0].name;

            imgElem2.src = shuffledImages[1].src;
            imgElem2.dataset.name = shuffledImages[1].name;

             // Clear any previous selection
            const radioButtons = document.querySelectorAll('input[name="imageChoice"]');
            radioButtons.forEach(radio => radio.checked = false);

            // Clear any previous message
            document.getElementById('message').textContent = '';
        }

        // Function to check user's answer
        function checkAnswer() {
            const selectedValue = document.querySelector('input[name="imageChoice"]:checked')?.value;
            const leftImageName = document.getElementById('image1').dataset.name;
            const messageElement = document.getElementById('message');

            if (selectedValue) {
                if (selectedValue === leftImageName) {
                    messageElement.textContent = 'Success! You identified the image correctly.';
                    messageElement.className = 'message success';
                } else {
                    messageElement.textContent = 'Failure! You identified the image incorrectly.';
                    messageElement.className = 'message failure';
                }
            } else {
                messageElement.textContent = ''; // Clear message if no selection
            }
        }

        // Initialize images on page load
        window.onload = swapImages;

        // Check answer when a radio button is selected
        const radioButtons = document.querySelectorAll('input[name="imageChoice"]');
        radioButtons.forEach(radio => {
            radio.addEventListener('change', checkAnswer);
        });
    </script>
</body>
</html>
