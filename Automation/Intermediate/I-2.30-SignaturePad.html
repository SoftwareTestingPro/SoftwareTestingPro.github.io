<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Pad</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .container { text-align: center; padding: 20px; border: 1px solid #ccc; border-radius: 8px; background-color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        canvas { border: 2px solid #000; cursor: crosshair; background-color: #fff; }
        .controls { margin-top: 10px; }
        button { padding: 8px 16px; font-size: 14px; margin: 0 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Signature Pad</h2>
        <p>Draw your signature below:</p>
        <canvas id="signature-pad" width="400" height="200"></canvas>
        <div class="controls">
            <button id="clear-btn">Clear</button>
        </div>
        <div id="message" style="margin-top: 10px; color: green; font-weight: bold; min-height: 20px;"></div>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        const message = document.getElementById('message');
        let isDrawing = false;
        let hasDrawn = false;

        function getPos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: evt.clientX - rect.left,
                y: evt.clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPos(canvas, e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (isDrawing) {
                const pos = getPos(canvas, e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();

                if (!hasDrawn) {
                    hasDrawn = true;
                    message.textContent = "Success! Signature captured.";
                }
            }
        }

        function stopDrawing() {
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        document.getElementById('clear-btn').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            message.textContent = "";
            hasDrawn = false;
        });
    </script>
</body>
</html>
