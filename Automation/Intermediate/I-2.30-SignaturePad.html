<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Pad</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>

    <div id="header-placeholder"></div>
    <div class="content-wrapper">
        <div class="card-nav">
            <a href="I-2.29-ColorPicker.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="I-2.31-TextCompare.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Signature Pad</h1>
                <p class="lead">Draw your signature below:</p>

                <canvas id="signature-pad" width="400" height="200"></canvas>

                <div class="controls">
                    <button id="clear-btn">Clear</button>
                </div>

                <div id="message" style="margin-top: 10px; color: green; font-weight: bold; min-height: 20px;"></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        const message = document.getElementById('message');
        let isDrawing = false;
        let hasDrawn = false;

        function getPos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: evt.clientX - rect.left,
                y: evt.clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPos(canvas, e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (isDrawing) {
                const pos = getPos(canvas, e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();

                if (!hasDrawn) {
                    hasDrawn = true;
                    message.textContent = "Success! Signature captured.";
                }
            }
        }

        function stopDrawing() {
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        document.getElementById('clear-btn').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            message.textContent = "";
            hasDrawn = false;
        });
    </script>
</body>
</html>
