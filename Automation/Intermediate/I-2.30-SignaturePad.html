<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Pad</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Intermediate/styles-I-2.30.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>

    <div id="header-placeholder"></div>
    <div class="content-wrapper">
        <div class="card-nav">
            <a href="I-2.29-ColorPicker.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="I-2.31-TextCompare.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Signature Pad</h1>
                <p class="lead">Draw your signature below:</p>
                <canvas id="signature-pad" width="800" height="400" style="width: 800px; height: 400px; border: 2px solid #000;"></canvas>
                <div id="message" style="margin-top: 10px; color: green; font-weight: bold; min-height: 20px;"></div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        const message = document.getElementById('message');
        let isDrawing = false;
        let hasDrawn = false;

        function getPos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPos(canvas, e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (isDrawing) {
                const pos = getPos(canvas, e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();

                if (!hasDrawn) {
                    hasDrawn = true;
                    message.textContent = "Success! Signature captured.";
                }
            }
        }

        function stopDrawing() {
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
    </script>
</body>
</html>
