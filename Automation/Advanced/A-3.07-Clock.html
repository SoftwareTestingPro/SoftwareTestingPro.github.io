    <main class="card">
      <div class="card-content">
      <h1>Analog Clock Challenge</h1>
      <p class="lead">Master time reading! Read the analog clock precisely and input the exact time in HH:MM:SS format to prove your observation skills.</p>

        <div class="clock">
          <div class="hand hour" id="hour"></div>
          <div class="hand minute" id="minute"></div>
          <div class="hand second" id="second"></div>
          <div class="center-point"></div>
        </div>

        <div class="input-container">
          <label for="user-input">Enter time in HH:MM:SS format (12-hour)</label>
          <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="HH:MM:SS" maxlength="8" />
            <button id="submit-btn">Submit</button>
          </div>
          <div id="successMessage" class="message" style="display: none;"></div>
          <div id="failureMessage" class="message" style="display: none;"></div>
        </div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    let currentHours = Math.floor(Math.random() * 12) + 1;
    let currentMinutes = Math.floor(Math.random() * 60);
    let currentSeconds = Math.floor(Math.random() * 60);

    function updateClock() {
      const secDeg = (currentSeconds / 60) * 360;
      const minDeg = (currentMinutes / 60) * 360 + (currentSeconds / 60) * 6;
      const hourDeg = ((currentHours % 12) / 12) * 360 + (currentMinutes / 60) * 30;

      document.getElementById('second').style.transform = `rotate(${secDeg}deg)`;
      document.getElementById('minute').style.transform = `rotate(${minDeg}deg)`;
      document.getElementById('hour').style.transform = `rotate(${hourDeg}deg)`;
    }

    function validateInput() {
      const input = document.getElementById('user-input');
      const successMessage = document.getElementById('successMessage');
      const failureMessage = document.getElementById('failureMessage');

      // Hide messages
      successMessage.style.display = 'none';
      failureMessage.style.display = 'none';
      successMessage.classList.remove('success');
      failureMessage.classList.remove('failure');

      const [hhStr, mmStr, ssStr] = input.value.split(':');
      const hh = parseInt(hhStr, 10);
      const mm = parseInt(mmStr, 10);
      const ss = parseInt(ssStr, 10);

      // Basic format validation
      if (
        !/^\d{2}:\d{2}:\d{2}$/.test(input.value) ||
        !(hh >= 1 && hh <= 12 &&
        mm >= 0 && mm <= 59 &&
        ss >= 0 && ss <= 59)
      ) {
        failureMessage.style.display = 'flex';
        failureMessage.classList.add('failure');
        failureMessage.textContent = "Invalid format! Use HH:MM:SS where HH is 01–12 and MM/SS are 00–59.";
        return;
      }

      // Compare with clock time
      const expectedHH = String(currentHours).padStart(2, '0');
      const expectedMM = String(currentMinutes).padStart(2, '0');
      const expectedSS = String(currentSeconds).padStart(2, '0');
      const expectedTime = `${expectedHH}:${expectedMM}:${expectedSS}`;

      if (input.value === expectedTime) {
        successMessage.style.display = 'flex';
        successMessage.classList.add('success');
        successMessage.textContent = "✅ Correct! You entered the right time.";
      } else {
        failureMessage.style.display = 'flex';
        failureMessage.classList.add('failure');
        failureMessage.textContent = `Incorrect! The actual time is ${expectedTime}`;
      }
    }

    const inputField = document.getElementById('user-input');

    // Auto-format input with colons
    inputField.addEventListener('input', function(e) {
      // Get current cursor position to handle editing in middle
      // (Simple implementation: just strip and reformat)
      let value = e.target.value.replace(/[^0-9]/g, '');

      if (value.length > 2) {
        value = value.substring(0, 2) + ':' + value.substring(2);
      }
      if (value.length > 5) {
        value = value.substring(0, 5) + ':' + value.substring(5);
      }

      // Prevent entering more than HH:MM:SS
      if (value.length > 8) {
        value = value.substring(0, 8);
      }

      e.target.value = value;
    });

    document.getElementById('submit-btn').addEventListener('click', validateInput);

    // Allow pressing Enter to submit
    inputField.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        validateInput();
      }
    });

    updateClock();
  </script>
