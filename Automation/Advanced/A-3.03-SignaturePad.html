            <div class="card-content">
                <h1>Signature Pad</h1>
                <p class="lead">Master canvas automation! Create a signature on the digital pad to demonstrate your drawing and canvas interaction skills.</p>
                <canvas id="signature-pad"></canvas>
                <div id="message"></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        const message = document.getElementById('message');
        let isDrawing = false;
        let hasDrawn = false;

        // Set canvas resolution based on display size
        function setCanvasSize() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            
            // Set actual resolution
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            
            // Scale the context to match device pixel ratio
            ctx.scale(dpr, dpr);
            
            // Set drawing styles
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function getPos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            return {
                x: (evt.clientX - rect.left),
                y: (evt.clientY - rect.top)
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPos(canvas, e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (isDrawing) {
                const pos = getPos(canvas, e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();

                if (!hasDrawn) {
                    hasDrawn = true;
                    message.textContent = "Success! Signature captured.";
                }
            }
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // Touch events for mobile
        function getTouchPos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: evt.touches[0].clientX - rect.left,
                y: evt.touches[0].clientY - rect.top
            };
        }

        function startTouchDrawing(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getTouchPos(canvas, e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function touchDraw(e) {
            e.preventDefault();
            if (isDrawing) {
                const pos = getTouchPos(canvas, e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();

                if (!hasDrawn) {
                    hasDrawn = true;
                    message.textContent = "Success! Signature captured.";
                }
            }
        }

        // Initialize canvas size
        setCanvasSize();

        // Handle window resize
        window.addEventListener('resize', () => {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.drawImage(canvas, 0, 0);
            
            setCanvasSize();
            ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height);
        });

        // Mouse events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch events for mobile
        canvas.addEventListener('touchstart', startTouchDrawing);
        canvas.addEventListener('touchmove', touchDraw);
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);
    </script>
