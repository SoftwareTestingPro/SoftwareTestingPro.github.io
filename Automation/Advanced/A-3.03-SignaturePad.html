        <main class="card">
            <div class="card-content">
                <h1>Signature Pad</h1>
                <p class="lead">Master canvas automation! Create a signature on the digital pad to demonstrate your drawing and canvas interaction skills.</p>
                <canvas id="signature-pad" width="800" height="400" style="width: 800px; height: 400px; border: 2px solid #000;"></canvas>
                <div id="message" style="margin-top: 10px; color: green; font-weight: bold; min-height: 20px;"></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        const message = document.getElementById('message');
        let isDrawing = false;
        let hasDrawn = false;

        function getPos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPos(canvas, e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (isDrawing) {
                const pos = getPos(canvas, e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();

                if (!hasDrawn) {
                    hasDrawn = true;
                    message.textContent = "Success! Signature captured.";
                }
            }
        }

        function stopDrawing() {
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
    </script>
