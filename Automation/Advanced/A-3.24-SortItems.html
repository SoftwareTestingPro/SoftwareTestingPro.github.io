<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sortable List Example</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="A-3.23-XLSReadData.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="A-3.25-DragableItemsXY.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
        <h1>Sortable List Challenge</h1>
        <p class="lead">Drag and drop the items to sort them alphabetically.</p>

        <ul id="animalList" class="list-container">
            <!-- List items will be inserted here by JavaScript -->
        </ul>
        <div id="successMessage" class="message success">Success! List is sorted.</div>
    </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <!-- Load SortableJS from the new CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const allItems = ["Elephant", "Tiger", "Zebra", "Giraffe", "Lion", "Monkey", "Panda", "Koala", "Kangaroo", "Penguin"];
            
            // Shuffle and select 5 random items
            const shuffledItems = allItems.sort(() => Math.random() - 0.5).slice(0, 5);
            
            // Create list items
            const list = document.getElementById('animalList');
            shuffledItems.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                li.className = 'list-item';
                list.appendChild(li);
            });

            const successMessage = document.getElementById('successMessage');

            // Hide message on load
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');

            // Initialize SortableJS
            const sortable = Sortable.create(list, {
                animation: 150,
                onEnd: function(evt) {
                    // Check if list is sorted
                    const items = Array.from(list.children).map(li => li.textContent);
                    const sortedItems = [...items].sort();
                    if (JSON.stringify(items) === JSON.stringify(sortedItems)) {
                        successMessage.style.display = 'flex';
                        successMessage.classList.add('success');
                        sortable.option("disabled", true); // Disable dragging and sorting
                    }
                }
            });
        });
    </script>

</body>
</html>
