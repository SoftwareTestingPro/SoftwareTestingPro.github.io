        <h1>Geolocation Challenge</h1>
        <p class="lead">Click the button to access your location and verify the displayed information.</p>

        <button onclick="getLocation()">Click Here</button>
        <div id="location-info"></div>
        <div id="successMessage" class="message success"></div>
        <div id="failureMessage" class="message failure"></div>
    </div>

<div id="footer-placeholder"></div>

    <script>
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        // Hide messages on load
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.classList.remove('failure');

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                failureMessage.textContent = 'Geolocation is not supported by this browser.';
            }
        }

        function showPosition(position) {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            document.getElementById("location-info").innerHTML = `
                <p>Latitude: ${latitude}</p>
                <p>Longitude: ${longitude}</p>
            `;

            getCountryInfo(latitude, longitude);

            // Update label, remove button, and display success message
            document.getElementById('location-label').textContent = 'Below are your location details';
            document.querySelector('button').remove();
            successMessage.style.display = 'flex';
            successMessage.classList.add('success');
            failureMessage.style.display = 'none';
            failureMessage.classList.remove('failure');
            successMessage.textContent = 'Success! Location details have been retrieved.';
        }

        function showError(error) {
            failureMessage.style.display = 'flex';
            failureMessage.classList.add('failure');
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');

            switch(error.code) {
                case error.PERMISSION_DENIED:
                    failureMessage.textContent = 'User denied the request for Geolocation.';
                    break;
                case error.POSITION_UNAVAILABLE:
                    failureMessage.textContent = 'Location information is unavailable.';
                    break;
                case error.TIMEOUT:
                    failureMessage.textContent = 'The request to get user location timed out.';
                    break;
                case error.UNKNOWN_ERROR:
                    failureMessage.textContent = 'An unknown error occurred.';
                    break;
            }
        }

        function getCountryInfo(lat, lon) {
            const apiKey = 'YOUR_API_KEY'; // Use your API key from a geolocation service
            const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    document.getElementById("location-info").innerHTML += `
                        <p>Country: ${data.countryName}</p>
                        <p>City: ${data.city}</p>
                        <p>Principal Subdivision: ${data.principalSubdivision}</p>
                    `;
                })
                .catch(error => {
                    document.getElementById("location-info").innerHTML += "<p>Unable to retrieve country information.</p>";
                });
        }
    </script>
