        <main class="card">
            <div class="card-content">
                <h1>Email OTP Challenge</h1>
                <p class="lead">Master email automation! Enter your email to receive an OTP code and verify it to demonstrate your communication testing skills.</p>

                <div class="input-group-parent">
                    <div class="input-group-left">
                        <label for="emailInput" class="label-left">Enter your email address:</label>
                    </div>
                    <div class="input-group-right">
                        <input type="email" id="emailInput" placeholder="Enter your email">
                    </div>
                </div>
                <div class="button-enabled">
                </div>
                <div class="button-enabled">
                    <button id="submitEmail">Send OTP</button>
                </div>

                <div class="message send-success" id="sendSuccessMessage">
                    OTP sent successfully! Check your email for the code.
                </div>

                <div class="otp-input" id="otpSection" style="display: none;">
                    <div class="otp-flex">
                        <input type="text" id="otpInput" placeholder="Enter OTP">
                        <button id="submitOTP">Verify OTP</button>
                    </div>
                </div>

                <div class="message" id="successMessage">
                    Success! The OTP matches. 
                </div>
                <div class="message" id="failureMessage">
                    Incorrect OTP. Please try again. 
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        console.log('Script start');

        emailjs.init("zdoh6O0VE2D3_ifLq");

        let generatedOTP = '';
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const sendSuccessMessage = document.getElementById('sendSuccessMessage');

        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
        sendSuccessMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.classList.remove('failure');
        sendSuccessMessage.classList.remove('send-success');

        function generateOTP() {
            return Math.floor(100000 + Math.random() * 900000).toString(); // 6-digit OTP
        }

        // Generate OTP on page load
        window.addEventListener('load', () => {
            generatedOTP = generateOTP();
            console.log('Generated OTP:', generatedOTP);
        });

        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        document.getElementById('submitEmail').addEventListener('click', () => {
            const email = document.getElementById('emailInput').value;
            if (!email || !validateEmail(email)) {
                alert('Please enter a valid email address.');
                return;
            }
            generatedOTP = generateOTP();
            // Send OTP email using EmailJS
            emailjs.send("service_7z2h26s", "template_svo6wdd", {
                to_email: email,
                otp: generatedOTP,
            }).then(function(response) {
                console.log('Email sent successfully:', response);
                // Show OTP input field
                document.getElementById('otpSection').style.display = 'block';
                // Show send success message
                sendSuccessMessage.style.display = 'block';
                sendSuccessMessage.classList.add('send-success');
            }, function(error) {
                console.log('Failed to send email:', error);
                alert('Failed to send OTP email. Please check your email address and try again.');
            });
        });

        document.getElementById('submitOTP').addEventListener('click', () => {
            const enteredOTP = document.getElementById('otpInput').value;
            if (enteredOTP === generatedOTP) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
            }
        });
    </script>
