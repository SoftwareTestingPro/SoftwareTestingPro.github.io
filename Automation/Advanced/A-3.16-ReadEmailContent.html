<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email OTP Verification</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Advanced/styles-A-3.16.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="A-3.15-ContextMenu.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="A-3.17-SpeechToText.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <p class="lead">Enter your email to receive an OTP and verify it.</p>

                <label for="emailInput">Enter your email address:</label>
                <input type="email" id="emailInput" placeholder="Enter your email">
                <button id="submitEmail">Submit</button>

                <div class="otp-input" id="otpSection">
                    <label for="otpInput">Enter the OTP sent to your email:</label>
                    <input type="text" id="otpInput" placeholder="Enter OTP">
                    <button id="submitOTP">Verify OTP</button>
                </div>

                <div class="message" id="successMessage">
                    Success! The OTP matches. 
                </div>
                <div class="message" id="failureMessage">
                    Incorrect OTP. Please try again. 
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        let generatedOTP = '';
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        // Hide messages on load
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.classList.remove('failure');

        function generateOTP() {
            return Math.floor(100000 + Math.random() * 900000).toString(); // 6-digit OTP
        }

        document.getElementById('submitEmail').addEventListener('click', () => {
            const email = document.getElementById('emailInput').value;
            if (email) {
                generatedOTP = generateOTP();
                // Simulate sending email
                console.log(`Sending OTP ${generatedOTP} to ${email}`);
                
                // Show OTP input field
                document.getElementById('otpSection').style.display = 'block';
            } else {
                alert('Please enter a valid email address.');
            }
        });

        document.getElementById('submitOTP').addEventListener('click', () => {
            const enteredOTP = document.getElementById('otpInput').value;
            if (enteredOTP === generatedOTP) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
            }
        });
    </script>
</body>
</html>
