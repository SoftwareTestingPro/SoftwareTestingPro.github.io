    <main class="card">
        <div class="card-content">
            <h1>PDF File Reader</h1>
            <p class="lead">Master PDF content validation! Download and examine the countries PDF, then verify if the displayed country appears in the document to prove your document processing skills.</p>

            <div class="button-group">
                <button id="downloadBtn" onclick="generateAndDownloadPDF()">Download Countries PDF</button>
            </div>

            <div class="validation-section" id="validationSection">
                <div class="country-display">
                    <div class="country-name" id="randomCountry"></div>
                </div>

                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="yes" name="verification" value="yes">
                        <label for="yes">Yes, country is in the PDF</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="no" name="verification" value="no">
                        <label for="no">No, country is not in the PDF</label>
                    </div>
                </div>

                <div class="message" id="successMessage"></div>
                <div class="message" id="failureMessage"></div>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

<script>
    const allCountries = [
        'United States', 'United Kingdom', 'Canada', 'Australia', 'Germany',
        'France', 'Japan', 'China', 'India', 'Brazil',
        'Mexico', 'Italy', 'Spain', 'Russia', 'South Korea',
        'Netherlands', 'Switzerland', 'Sweden', 'Norway', 'Denmark',
        'Belgium', 'Austria', 'New Zealand', 'Singapore', 'Israel',
        'Ireland', 'Portugal', 'Greece', 'Finland', 'Poland',
        'Czech Republic', 'Hungary', 'Romania', 'Bulgaria', 'Croatia',
        'Slovakia', 'Slovenia', 'Estonia', 'Latvia', 'Lithuania',
        'Turkey', 'Egypt', 'South Africa', 'Argentina', 'Chile',
        'Colombia', 'Peru', 'Venezuela', 'Malaysia', 'Thailand',
        'Indonesia', 'Philippines', 'Vietnam', 'Pakistan', 'Bangladesh',
        'Sri Lanka', 'Myanmar', 'Cambodia', 'Laos', 'Nepal'
    ];

    let selectedCountry = '';
    let pdfCountries = []; // Store the countries used in current PDF

    function generateAndDownloadPDF() {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(16);
            doc.text('Countries List', 105, 15, { align: 'center' });

            doc.setFontSize(12);
            let yPosition = 30;

            // Pick 10 random countries and sort them alphabetically
            pdfCountries = [...allCountries].sort(() => Math.random() - 0.5).slice(0, 10).sort();
            
            pdfCountries.forEach((country, index) => {
                if (yPosition > 280) {
                    doc.addPage();
                    yPosition = 20;
                }
                doc.text(`${index + 1}. ${country}`, 20, yPosition);
                yPosition += 8;
            });

            doc.save('countries_list.pdf');

            // hide the download button after user triggers the download
            const dlBtn = document.getElementById('downloadBtn');
            if (dlBtn) {
                dlBtn.style.display = 'none';
                dlBtn.disabled = true;
            }

            showValidationSection();
        } catch (error) {
            console.error('PDF generation error:', error);
            alert('Error generating PDF. Please try again.');
        }
    }

    function showValidationSection() {
        const isInPDF = Math.random() > 0.5;

        if (isInPDF) {
            selectedCountry = pdfCountries[Math.floor(Math.random() * pdfCountries.length)];
        } else {
            const countriesNotInPDF = allCountries.filter(c => !pdfCountries.includes(c));
            selectedCountry = countriesNotInPDF[Math.floor(Math.random() * countriesNotInPDF.length)];
        }

        document.getElementById('randomCountry').textContent = `Is ${selectedCountry} displayed in downloaded PDF file?`;
        document.getElementById('validationSection').classList.add('active');
        
        // Hide messages on page load
        document.getElementById('successMessage').style.display = 'none';
        document.getElementById('failureMessage').style.display = 'none';
        document.getElementById('successMessage').classList.remove('success');
        document.getElementById('failureMessage').classList.remove('failure');
        
        // Clear radio button selections
        document.querySelectorAll('input[name="verification"]').forEach(radio => radio.checked = false);
        
        // Add radio button change listeners to directly validate
        document.querySelectorAll('input[name="verification"]').forEach(radio => {
            radio.addEventListener('change', function() {
                validateAnswer();
            });
        });
    }

    function validateAnswer() {
        const selectedOption = document.querySelector('input[name="verification"]:checked');

        if (!selectedOption) {
            return;
        }

        const isInPDF = pdfCountries.includes(selectedCountry);
        const userSaidYes = selectedOption.value === 'yes';
        const isCorrect = isInPDF === userSaidYes;

        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        if (isCorrect) {
            successMessage.style.display = 'block';
            successMessage.classList.add('success');
            if (isInPDF) {
                successMessage.textContent = 'Correct! The country is in the PDF.';
            } else {
                successMessage.textContent = 'Correct! The country is not in the PDF.';
            }
            failureMessage.style.display = 'none';
            failureMessage.classList.remove('failure');
        } else {
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.style.display = 'block';
            failureMessage.classList.add('failure');
            if (isInPDF) {
                failureMessage.textContent = 'Incorrect! The country is actually in the PDF.';
            } else {
                failureMessage.textContent = 'Incorrect! The country is actually not in the PDF.';
            }
        }
        
        // Disable radio buttons after selection
        document.querySelectorAll('input[name="verification"]').forEach(radio => radio.disabled = true);
    }
</script>
