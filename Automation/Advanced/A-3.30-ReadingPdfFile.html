<body>

<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="A-3.29-DynamicProgressBar.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>

        <a href="A-3.30-ReadingPdfFile.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>

    </div>

    <main class="card">
        <div class="card-content">
            <h1>PDF File Reader</h1>
            <p class="lead">Enter your country name and verify if it matches the PDF content.</p>

            <div class="button-group">
                <button id="downloadBtn" onclick="generateAndDownloadPDF()">Download Countries PDF</button>
            </div>

            <div class="validation-section" id="validationSection">
                <div class="country-display">
                    <p>Verify if this country is in the downloaded PDF:</p>
                    <div class="country-name" id="randomCountry"></div>
                </div>

                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="yes" name="verification" value="yes">
                        <label for="yes">Yes, country is in the PDF</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="no" name="verification" value="no">
                        <label for="no">No, country is not in the PDF</label>
                    </div>
                </div>

                <button id="validateBtn" class="validate-btn" onclick="validateAnswer()">Validate</button>

                <div class="message success" id="successMessage"></div>
                <div class="message failure" id="failureMessage"></div>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

<script>
    const countries = [
        'Afghanistan', 'Albania', 'Algeria', 'Andorra', 'Angola',
        'Antigua and Barbuda', 'Argentina', 'Armenia', 'Australia', 'Austria',
        'Azerbaijan', 'Bahamas', 'Bahrain', 'Bangladesh', 'Barbados',
        'Belarus', 'Belgium', 'Belize', 'Benin', 'Bhutan',
        'Bolivia', 'Bosnia and Herzegovina', 'Botswana', 'Brazil', 'Brunei',
        'Bulgaria', 'Burkina Faso', 'Burundi', 'Cambodia', 'Cameroon',
        'Canada', 'Cape Verde', 'Central African Republic', 'Chad', 'Chile',
        'China', 'Colombia', 'Comoros', 'Congo', 'Costa Rica',
        'Croatia', 'Cuba', 'Cyprus', 'Czech Republic', 'Denmark',
        'Djibouti', 'Dominica', 'Dominican Republic', 'Ecuador', 'Egypt'
    ];

    let selectedCountry = '';

    function generateAndDownloadPDF() {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(16);
            doc.text('Countries List', 105, 15, { align: 'center' });

            doc.setFontSize(12);
            let yPosition = 30;

            countries.forEach((country, index) => {
                if (yPosition > 280) {
                    doc.addPage();
                    yPosition = 20;
                }
                doc.text(`${index + 1}. ${country}`, 20, yPosition);
                yPosition += 8;
            });

            doc.save('countries_list.pdf');

            // hide the download button after user triggers the download
            const dlBtn = document.getElementById('downloadBtn');
            if (dlBtn) {
                dlBtn.style.display = 'none';
                dlBtn.disabled = true;
            }

            showValidationSection();
        } catch (error) {
            console.error('PDF generation error:', error);
            alert('Error generating PDF. Please try again.');
        }
    }

    function showValidationSection() {
        const allCountries = [
            'Afghanistan', 'Albania', 'Algeria', 'Andorra', 'Angola', 'Antigua and Barbuda',
            'Argentina', 'Armenia', 'Australia', 'Austria', 'Azerbaijan', 'Bahamas', 'Bahrain',
            'Bangladesh', 'Barbados', 'Belarus', 'Belgium', 'Belize', 'Benin', 'Bhutan',
            'Bolivia', 'Bosnia and Herzegovina', 'Botswana', 'Brazil', 'Brunei', 'Bulgaria',
            'Burkina Faso', 'Burundi', 'Cambodia', 'Cameroon', 'Canada', 'Cape Verde',
            'Central African Republic', 'Chad', 'Chile', 'China', 'Colombia', 'Comoros',
            'Congo', 'Costa Rica', 'Croatia', 'Cuba', 'Cyprus', 'Czech Republic', 'Denmark',
            'Djibouti', 'Dominica', 'Dominican Republic', 'Ecuador', 'Egypt',
            'France', 'Germany', 'India', 'Japan', 'Mexico'
        ];

        const isInPDF = Math.random() > 0.5;

        if (isInPDF) {
            selectedCountry = countries[Math.floor(Math.random() * countries.length)];
        } else {
            const countriesNotInPDF = allCountries.filter(c => !countries.includes(c));
            selectedCountry = countriesNotInPDF[Math.floor(Math.random() * countriesNotInPDF.length)];
        }

        document.getElementById('randomCountry').textContent = selectedCountry;
        document.getElementById('validationSection').classList.add('active');
        document.getElementById('successMessage').style.display = 'none';
        document.getElementById('failureMessage').style.display = 'none';
        document.querySelectorAll('input[name="verification"]').forEach(radio => radio.checked = false);
    }

    function validateAnswer() {
        const selectedOption = document.querySelector('input[name="verification"]:checked');

        if (!selectedOption) {
            alert('Please select Yes or No');
            return;
        }

        // disable validate button so user cannot submit multiple times
        const validateBtn = document.getElementById('validateBtn');
        if (validateBtn) validateBtn.disabled = true;

        const isInPDF = countries.includes(selectedCountry);
        const userSaidYes = selectedOption.value === 'yes';
        const isCorrect = isInPDF === userSaidYes;

        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        if (isCorrect) {
            successMessage.style.display = 'block';
            failureMessage.style.display = 'none';
        } else {
            successMessage.style.display = 'none';
            failureMessage.style.display = 'block';
        }
    }
</script>
</body>
</html>
