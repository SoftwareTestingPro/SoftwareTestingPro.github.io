        <main class="card">
            <div class="card-content">
            <h1>Resizable Element Challenge</h1>
            <p class="lead">Resize the element to 256px x 256px using the handle.</p>

                <div class="size-display" id="sizeDisplay">Size: 200px x 200px</div>

                <div id="resizable">
                    <div class="resize-handle" id="resizeHandle"></div>
                </div>

                <div class="message success" id="successMessage">
                    Success! The element size is 256px x 256px.
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const resizable = document.getElementById('resizable');
        const resizeHandle = document.getElementById('resizeHandle');
        const sizeDisplay = document.getElementById('sizeDisplay');
        const successMessage = document.getElementById('successMessage');

        // Hide message on load
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');

        function updateSizeDisplay() {
            const width = resizable.offsetWidth;
            const height = resizable.offsetHeight;
            sizeDisplay.textContent = `Size: ${width}px x ${height}px`;
            const isTargetSize = width === 256 && height === 256;
            successMessage.style.display = isTargetSize ? 'flex' : 'none';
            if (isTargetSize) {
                successMessage.classList.add('success');
            } else {
                successMessage.classList.remove('success');
            }
        }

        new ResizeObserver(updateSizeDisplay).observe(resizable);
        window.addEventListener('load', updateSizeDisplay);

        resizeHandle.addEventListener('mousedown', function (e) {
            const currentWidth = resizable.offsetWidth;
            const currentHeight = resizable.offsetHeight;
            if (currentWidth === 256 && currentHeight === 256) {
                return; // Disable resizing when target size is reached
            }
            e.preventDefault();
            const startX = e.clientX;
            const startY = e.clientY;
            const startWidth = resizable.offsetWidth;
            const startHeight = resizable.offsetHeight;

            function onMouseMove(e) {
                resizable.style.width = `${startWidth + (e.clientX - startX)}px`;
                resizable.style.height = `${startHeight + (e.clientY - startY)}px`;
            }

            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
    </script>
