<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Progress Bar Challenge</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Advanced/styles-A-3.29.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="A-3.28-DragAndDropWithFrames.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="A-3.30-ReadingPdfFile.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Dynamic Progress Bar</h1>
                <p class="lead">Click the button to start the progress bar and complete it.</p>

                <h4>Click on below button once progress bar completes</h4>
                <div id="status"></div>
                <div id="progress-bar-container">
                    <div id="progress-bar"></div>
                </div>
                <button id="action-button">Click Me!</button>
                <div id="successMessage" class="message success"></div>
                <div id="failureMessage" class="message failure"></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const actionButton = document.getElementById('action-button');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        let progress = 0;
        let intervalId;
        let buttonClicked = false;

        // Hide messages on load
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.classList.remove('failure');

        const randomDuration = Math.floor(Math.random() * (30000 - 10000 + 1)) + 10000;
        const updateInterval = 100; // Check progress every 100ms

        // Dynamically create and inject the CSS animation
        const animationName = 'progress-animation';
        const styleSheet = document.createElement('style');
        styleSheet.innerHTML = `
            @keyframes ${animationName} {
                from { transform: scaleX(0); }
                to { transform: scaleX(1); }
            }
        `;
        document.head.appendChild(styleSheet);

        // Apply the animation
        progressBar.style.animation = `${animationName} ${randomDuration}ms linear forwards`;

        function checkProgress() {
            // Calculate the elapsed time
            const elapsedTime = (Date.now() - startTime);
            progress = Math.min(100, (elapsedTime / randomDuration) * 100);

            if (progress >= 100) {
                clearInterval(intervalId);
                setTimeout(() => {
                    actionButton.style.display = 'none';
                    if (!buttonClicked) {
                        failureMessage.style.display = 'flex';
                        failureMessage.classList.add('failure');
                        successMessage.style.display = 'none';
                        successMessage.classList.remove('success');
                        failureMessage.textContent = "Failure! You failed to click the button in time.";
                    }
                }, 1000);
            }
        }

        actionButton.addEventListener('click', () => {
            buttonClicked = true;
            if (progress < 100) {
                clearInterval(intervalId);
                progressBar.style.animationPlayState = 'paused'; // Pause the animation
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.textContent = "You clicked too early";
                actionButton.disabled = true;
            } else {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
                successMessage.textContent = "Success! Button was clicked after completion.";
            }
        });

        const startTime = Date.now();
        intervalId = setInterval(checkProgress, updateInterval);
    </script>
</body>
</html>
