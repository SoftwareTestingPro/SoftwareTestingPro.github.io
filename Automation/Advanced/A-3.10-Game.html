    <main class="card">
      <div class="card-content">
      <h1>Platformer Game Challenge</h1>
      <p class="lead">Use the spacebar and arrow keys to reach the top platform and verify the congratulations message.</p>

    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="message success" id="successMessage">Congratulations! You reached the top platform!</div>
  </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const successMessage = document.getElementById('successMessage');

    // Hide message on load
    successMessage.style.display = 'none';
    successMessage.classList.remove('success');

    const gravity = 0.5;
    const friction = 0.9;
    let keys = {};

    const player = {
      x: 50,
      y: canvas.height - 70,
      width: 30,
      height: 30,
      speedX: 0,
      speedY: 0,
      color: 'blue',
      jumping: false,
      grounded: false
    };

    // Platform positions
    const platforms = [
      { x: 0, y: canvas.height - 10, width: canvas.width, height: 10, color: 'green' }, // Ground
      { x: canvas.width * 0.25, y: canvas.height - canvas.height * 0.25, width: 150, height: 10, color: 'purple' },
      { x: canvas.width * 0.50, y: canvas.height - canvas.height * 0.50, width: 150, height: 10, color: 'red' },
      { x: canvas.width * 0.80, y: canvas.height - canvas.height * 0.80, width: 150, height: 10, color: 'yellow', isTopPlatform: true }
    ];

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') e.preventDefault();
      keys[e.code] = true;
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    // Track previous Y position for better collision detection
    let previousPlayerY = player.y;

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (keys['ArrowLeft']) {
        player.speedX = -5;
      } else if (keys['ArrowRight']) {
        player.speedX = 5;
      } else {
        player.speedX *= friction;
      }

      if (keys['Space'] && !player.jumping && player.grounded) {
        player.speedY = -12;
        player.jumping = true;
        player.grounded = false;
      }

      player.speedY += gravity;
      player.x += player.speedX;
      previousPlayerY = player.y;
      player.y += player.speedY;

      player.grounded = false;
      let topPlatformReached = false;

      platforms.forEach(platform => {
        // Check horizontal overlap
        const horizontalOverlap = player.x + player.width > platform.x && player.x < platform.x + platform.width;

        // Check if player is falling (speedY >= 0) and landing on platform from above
        const wasAbovePlatform = previousPlayerY + player.height <= platform.y;
        const isNowAtPlatform = player.y + player.height >= platform.y;
        const isLandingOnPlatform = wasAbovePlatform && isNowAtPlatform && player.speedY >= 0;

        if (horizontalOverlap && isLandingOnPlatform) {
          player.y = platform.y - player.height;
          player.speedY = 0;
          player.jumping = false;
          player.grounded = true;
          if (platform.isTopPlatform) topPlatformReached = true;
        }
      });

      if (player.y > canvas.height - player.height) {
        player.y = canvas.height - player.height;
        player.speedY = 0;
        player.jumping = false;
        player.grounded = true;
      }

      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y, player.width, player.height);

      platforms.forEach(platform => {
        ctx.fillStyle = platform.color;
        ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
      });

      successMessage.style.display = topPlatformReached ? 'flex' : 'none';
      if (topPlatformReached) {
        successMessage.classList.add('success');
      } else {
        successMessage.classList.remove('success');
      }

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
