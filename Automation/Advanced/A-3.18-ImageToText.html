<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple HTML5 page with a container box, displaying an image and an input field below, with validation messages based on user input.">
    <title>Random Image Page</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Advanced/styles-A-3.18.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="A-3.17-SpeechToText.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="A-3.19-Spinner.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
            <h1>Image to Text Challenge</h1>
            <p class="lead">Extract the text from the image and enter it.</p>

                <label for="user-input">Fetch displayed text from below image:</label>
                <img src="../../img/shopping.jpg" alt="Image" id="Image">
                <input type="text" id="user-input" name="user-input" placeholder="Enter fetched text here...">
                <div id="successMessage" class="message success"></div>
                <div id="failureMessage" class="message failure"></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userInput = document.getElementById('user-input');
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');

            // Hide messages on load
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.classList.remove('failure');

            userInput.addEventListener('input', () => {
                const value = userInput.value.toLowerCase();

                if (value === 'amazon') {
                    successMessage.style.display = 'flex';
                    successMessage.classList.add('success');
                    failureMessage.style.display = 'none';
                    failureMessage.classList.remove('failure');
                    successMessage.textContent = 'Success! You entered "amazon".';
                } else if (value.trim() === '') {
                    successMessage.style.display = 'none';
                    failureMessage.style.display = 'none';
                    successMessage.classList.remove('success');
                    failureMessage.classList.remove('failure');
                } else {
                    successMessage.style.display = 'none';
                    successMessage.classList.remove('success');
                    failureMessage.style.display = 'flex';
                    failureMessage.classList.add('failure');
                    failureMessage.textContent = 'Failure! The entered text does not match.';
                }
            });
        });
    </script>
</body>
</html>
