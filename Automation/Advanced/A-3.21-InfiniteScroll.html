<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Scroll Challenge</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; }
        #instructions { text-align: center; } /* Center align the paragraph */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .image-container {
            width: 100%;
            padding-top: 75%; /* 4:3 Aspect Ratio */
            position: relative;
            background-color: #e0e0e0;
            border-radius: 8px;
        }
        img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        img.loaded {
            opacity: 1;
        }
        #loader {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #666;
        }
        #verification-area {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #verification-message {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
        .success { color: green; }
        .failure { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Infinite Scroll Challenge</h1>
        <p id="instructions">Scroll down to load all images, then enter the total count.</p>
        <div class="image-grid" id="image-grid"></div>
        <div id="loader">Loading...</div>
        <div id="verification-area" style="display: none;">
            <label for="image-count-input"><b>All images loaded. How many are there?</b></label>
            <br><br>
            <input type="number" id="image-count-input" placeholder="Enter count">
            <button id="verify-btn">Verify</button>
            <div id="verification-message"></div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const imageGrid = document.getElementById('image-grid');
            const loader = document.getElementById('loader');
            const verificationArea = document.getElementById('verification-area');
            const verifyBtn = document.getElementById('verify-btn');

            const BATCH_SIZE = 12;
            const minBatches = 4; // 4 * 12 = 48 images
            const maxBatches = 20; // 20 * 12 = 240 images
            const randomBatchCount = Math.floor(Math.random() * (maxBatches - minBatches + 1)) + minBatches;
            const MAX_IMAGES = randomBatchCount * BATCH_SIZE;

            let imageCounter = 0;
            let isLoading = false;

            const imageLazyLoader = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.addEventListener('load', () => img.classList.add('loaded'), { once: true });
                        img.src = img.dataset.src;
                        observer.unobserve(img);
                    }
                });
            });

            function loadMoreImages() {
                if (isLoading || imageCounter >= MAX_IMAGES) return;

                isLoading = true;
                loader.style.display = 'block';

                setTimeout(() => {
                    for (let i = 0; i < BATCH_SIZE; i++) {
                        if (imageCounter >= MAX_IMAGES) break;
                        imageCounter++;
                        const container = document.createElement('div');
                        container.className = 'image-container';
                        const img = document.createElement('img');
                        img.dataset.src = `https://picsum.photos/400/300?random=${imageCounter}`;
                        img.alt = `Image ${imageCounter}`;
                        container.appendChild(img);
                        imageGrid.appendChild(container);
                        imageLazyLoader.observe(img);
                    }

                    isLoading = false;

                    if (imageCounter >= MAX_IMAGES) {
                        loader.style.display = 'none';
                        verificationArea.style.display = 'block';
                        scrollObserver.disconnect();
                    }
                }, 500);
            }

            const scrollObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    loadMoreImages();
                }
            }, { threshold: 1.0 });

            verifyBtn.addEventListener('click', () => {
                const userInput = document.getElementById('image-count-input').value;
                const verificationMessage = document.getElementById('verification-message');
                const userCount = parseInt(userInput, 10);

                if (userCount === MAX_IMAGES) {
                    verificationMessage.textContent = 'Success! You entered the correct count.';
                    verificationMessage.className = 'success';
                } else {
                    verificationMessage.textContent = `Failure! Expected: ${MAX_IMAGES}, You entered: ${userCount || 0}.`;
                    verificationMessage.className = 'failure';
                }
            });

            loadMoreImages();
            scrollObserver.observe(loader);
        });
    </script>
</body>
</html>
