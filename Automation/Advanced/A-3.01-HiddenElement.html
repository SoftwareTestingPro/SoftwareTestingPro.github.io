    <main class="card">
        <div class="card-content">
        <h1>Hidden Element Challenge</h1>
        <p class="lead">A button will appear briefly after a countdown. Click it quickly to succeed.</p>
        <div id="countdown">Time remaining: 5 seconds</div>
            <div class="message success" id="successMessage" role="status" aria-live="polite" style="display: none;"><span>Congratulations! Well done!</span></div>
            <div class="message failure" id="failureMessage" role="status" aria-live="polite" style="display: none;"><span>Sorry, you missed clicking the button. Be fast!</span></div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var labelText = document.getElementById('labelText');
            var countdown = document.getElementById('countdown');
            var successMessage = document.getElementById('successMessage');
            var failureMessage = document.getElementById('failureMessage');
            var buttonClicked = false;
            var timeLeft = 5;

            // Hide messages on load
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.classList.remove('failure');

            // Countdown timer
            var countdownInterval = setInterval(function() {
                timeLeft--;
                countdown.textContent = `Time remaining: ${timeLeft} seconds`;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                }
            }, 1000);

            // After 5 seconds, hide the label and create the button
            setTimeout(function() {
                countdown.style.display = 'none';

                // Create the button element
                var button = document.createElement('button');
                button.id = 'showButton';
                button.className = 'button';
                button.textContent = 'Click Me';
                button.style.backgroundColor = '#007bff';
                const messageContainer = document.getElementById('messageContainer');
                document.querySelector('.card-content').insertBefore(button, messageContainer);

                // Show the button instantly
                button.style.display = 'block';

                // After 1 second, hide the button if not clicked
                setTimeout(function() {
                    if (!buttonClicked) {
                        button.style.display = 'none';
                        if (button.parentNode) {
                            button.parentNode.removeChild(button); // Remove button from DOM
                        }
                        failureMessage.style.display = 'flex';
                        failureMessage.classList.add('failure');
                        successMessage.style.display = 'none';
                        successMessage.classList.remove('success');
                    }
                }, 2000);

                // If the button is clicked, show the success message
                button.addEventListener('click', function() {
                    buttonClicked = true;
                    button.style.display = 'none';
                    if (button.parentNode) {
                        button.parentNode.removeChild(button); // Remove button from DOM
                    }
                    successMessage.style.display = 'flex';
                    successMessage.classList.add('success');
                    failureMessage.style.display = 'none';
                    failureMessage.classList.remove('failure');
                });

            }, 5000);
        });
    </script>
