<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiding Element</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="A-3.01-HiddenElement.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="A-3.02-Download.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
        <h1>Hidden Element Challenge</h1>
        <p class="lead">A button will appear briefly after a countdown. Click it quickly to succeed.</p>

        <div id="countdown">Time remaining: 5 seconds</div>

        <!-- Success and failure messages -->
        <div id="messageContainer">
            <div class="success-message" id="successMessage">Congratulations! Well done!</div>
            <div class="failure-message" id="failureMessage">Sorry, you missed it!</div>
        </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var labelText = document.getElementById('labelText');
            var countdown = document.getElementById('countdown');
            var successMessage = document.getElementById('successMessage');
            var failureMessage = document.getElementById('failureMessage');
            var buttonClicked = false;
            var timeLeft = 5;

            // Hide messages on load
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.classList.remove('failure');

            // Countdown timer
            var countdownInterval = setInterval(function() {
                timeLeft--;
                countdown.textContent = `Time remaining: ${timeLeft} seconds`;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                }
            }, 1000);

            // After 5 seconds, hide the label and create the button
            setTimeout(function() {
                labelText.style.display = 'none';
                countdown.style.display = 'none';

                // Create the button element
                var button = document.createElement('button');
                button.id = 'showButton';
                button.className = 'btn btn-primary btn-lg';
                button.textContent = 'Click Me';
                document.querySelector('.card-content').appendChild(button);

                // Show the button instantly
                button.style.display = 'block';

                // After 1 second, hide the button if not clicked
                setTimeout(function() {
                    if (!buttonClicked) {
                        button.style.display = 'none';
                        if (button.parentNode) {
                            button.parentNode.removeChild(button); // Remove button from DOM
                        }
                        failureMessage.style.display = 'flex';
                        failureMessage.classList.add('failure');
                        successMessage.style.display = 'none';
                        successMessage.classList.remove('success');
                    }
                }, 500);

                // If the button is clicked, show the success message
                button.addEventListener('click', function() {
                    buttonClicked = true;
                    button.style.display = 'none';
                    if (button.parentNode) {
                        button.parentNode.removeChild(button); // Remove button from DOM
                    }
                    successMessage.style.display = 'flex';
                    successMessage.classList.add('success');
                    failureMessage.style.display = 'none';
                    failureMessage.classList.remove('failure');
                });

            }, 5000);
        });
    </script>
</body>
</html>
