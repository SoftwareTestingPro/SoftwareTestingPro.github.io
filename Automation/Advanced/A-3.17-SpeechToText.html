<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech-to-Text</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Advanced/styles-A-3.17.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="A-3.16-ReadEmailContent.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="A-3.18-ImageToText.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
            <h1>Speech to Text Challenge</h1>
            <p class="lead">Listen to the audio and enter the spoken text.</p>

                <span class="label">Click icon to play audio</span>
                <i class="fas fa-play icon-button" id="iconButton"></i>
                <div class="input-container">
                    <input type="text" id="userInput" placeholder="Input what you heard...">
                </div>
                <div id="successMessage" class="message success"></div>
                <div id="failureMessage" class="message failure"></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const iconButton = document.getElementById('iconButton');
            const utterance = new SpeechSynthesisUtterance("The recording has been started");
            utterance.voice = speechSynthesis.getVoices().find(voice => voice.name.toLowerCase().includes('female'));
            const userInput = document.getElementById('userInput');
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');

            // Hide messages on load
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.classList.remove('failure');

            let isPlaying = false;

            iconButton.addEventListener('click', () => {
                if (!isPlaying) {
                    iconButton.classList.remove('fa-play');
                    iconButton.classList.add('fa-stop');
                    speechSynthesis.speak(utterance);
                    isPlaying = true;

                    utterance.onend = () => {
                        iconButton.classList.remove('fa-stop');
                        iconButton.classList.add('fa-play');
                        isPlaying = false;
                    };
                } else {
                    speechSynthesis.cancel();
                    iconButton.classList.remove('fa-stop');
                    iconButton.classList.add('fa-play');
                    isPlaying = false;
                }
            });

            userInput.addEventListener('input', () => {
                const inputText = userInput.value.trim().toLowerCase();
                const correctText = "the recording has been started";

                if (inputText === correctText) {
                    successMessage.style.display = 'flex';
                    successMessage.classList.add('success');
                    failureMessage.style.display = 'none';
                    failureMessage.classList.remove('failure');
                    successMessage.textContent = "Success! Speech to Text matches.";
                } else {
                    successMessage.style.display = 'none';
                    successMessage.classList.remove('success');
                    failureMessage.style.display = 'flex';
                    failureMessage.classList.add('failure');
                    failureMessage.textContent = "Failure! Speech to Text does not match.";
                }
            });
        });
    </script>
</body>
</html>
