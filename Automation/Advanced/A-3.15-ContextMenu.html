        <main class="card">
            <div class="card-content">
                <h1>Context Menu Challenge</h1>
                <p class="lead">Right-click the box and select the correct option from the menu.</p>

                <div id="instruction">Right-click the box and select: </div>
                <div id="target-area">
                    Right-Click Me
                </div>
                <div id="successMessage" class="message success"></div>
                <div id="failureMessage" class="message failure"></div>
            </div>
        </main>
    </div>

    <div id="context-menu">
        <ul>
            <li onclick="menuAction('Edit')">Edit</li>
            <li onclick="menuAction('Cut')">Cut</li>
            <li onclick="menuAction('Copy')">Copy</li>
            <li onclick="menuAction('Paste')">Paste</li>
            <li onclick="menuAction('Delete')">Delete</li>
        </ul>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const targetArea = document.getElementById('target-area');
        const contextMenu = document.getElementById('context-menu');
        const instructionDisplay = document.getElementById('instruction');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const menuOptions = ['Edit', 'Cut', 'Copy', 'Paste', 'Delete'];
        let targetOption = '';

        // Hide messages on load
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.classList.remove('failure');

        function initializeChallenge() {
            targetOption = menuOptions[Math.floor(Math.random() * menuOptions.length)];
            instructionDisplay.textContent = `Right-click the box and select: "${targetOption}"`;
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.classList.remove('failure');
        }

        targetArea.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            contextMenu.style.display = 'block';
            contextMenu.style.left = e.pageX + 'px';
            contextMenu.style.top = e.pageY + 'px';
        });

        document.addEventListener('click', () => {
            contextMenu.style.display = 'none';
        });

        function menuAction(selectedAction) {
            if (selectedAction === targetOption) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
                successMessage.textContent = 'Success! You selected the correct option.';
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                failureMessage.textContent = `Failure! You selected "${selectedAction}", but the correct option was "${targetOption}".`;
            }
            contextMenu.style.display = 'none';
        }

        window.addEventListener('load', initializeChallenge);
    </script>
