<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Odd One Out Game</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="../../components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="A-3.26-CharOddOneOut.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="A-3.28-DragAndDropWithFrames.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
        <h1>Audio Odd One Out</h1>
        <p class="lead">Listen to the sounds and select the odd one out.</p>

        <div class="buttons" id="buttonContainer"></div>
        <div id="successMessage" class="message success"></div>
        <div id="failureMessage" class="message failure"></div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

<script>
  const successMessage = document.getElementById('successMessage');
  const failureMessage = document.getElementById('failureMessage');

  // Hide messages on load
  successMessage.style.display = 'none';
  failureMessage.style.display = 'none';
  successMessage.classList.remove('success');
  failureMessage.classList.remove('failure');

  // Local sound files
  const sounds = [
    { name: 'Sound 1', file: '../../sounds/ghanta.mp3' },
    { name: 'Sound 2', file: '../../sounds/ghanta.mp3' },
    { name: 'Sound 3', file: '../../sounds/ghanta.mp3' },
    { name: 'Sound 4', file: '../../sounds/cuak.mp3' }
  ];

  // Function to shuffle an array
  function shuffleArray(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  // Prepare sound buttons array (3 normal, 1 odd)
  const normalSounds = sounds.slice(0, 3);
  const oddSound = sounds[3];
  const soundButtons = [...normalSounds, oddSound];
  shuffleArray(soundButtons); // Shuffle the buttons for randomness

  // Add buttons to the DOM
  const buttonContainer = document.getElementById('buttonContainer');
  soundButtons.forEach(sound => {
    const button = document.createElement('button');
    button.classList.add('sound-button');

    const playIcon = document.createElement('div');
    playIcon.classList.add('play-icon');
    playIcon.innerHTML = '▶️'; // Play icon for the button

    button.appendChild(playIcon);

    // Add click event listener to play sound when icon is clicked
    playIcon.onclick = (event) => {
      event.stopPropagation(); // Prevent the button click event from firing
      playSound(sound);
    };

    // Add click event listener to button to determine if it is the odd sound
    button.onclick = () => {
      if (sound === oddSound) {
        successMessage.style.display = 'flex';
        successMessage.classList.add('success');
        failureMessage.style.display = 'none';
        failureMessage.classList.remove('failure');
        successMessage.textContent = 'Success! You found the odd sound out!';
      } else {
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.style.display = 'flex';
        failureMessage.classList.add('failure');
        failureMessage.textContent = 'Failure! Try again.';
      }
    };

    buttonContainer.appendChild(button);
  });

  function playSound(sound) {
    const audio = new Audio(sound.file);
    audio.play();
  }
</script>

</body>
</html>
