<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Decode the QR Code and enter the value in the text field below to see if you are correct.">
    <meta name="keywords" content="QR Code, decode, input field, success message">
    <meta name="author" content="Your Name">
    <title>QR Code Decoder</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="A-3.03-Whiteboard.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="A-3.05-MultipleDragDrop.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
        <h1>QR Code Scanner</h1>
        <p class="lead">Scan the QR code using your camera and enter the decoded text.</p>

        <section class="image-container">
            <img id="qr" src="../../img/qr.jpg" alt="QR Code">        
        </section>
        <section class="input-container">
            <input type="text" id="user-input" name="user-input" placeholder="Decode above QR and enter the decoded text here">
            <div id="success-message" class="success-message" aria-live="polite"></div>
            <div id="failure-message" class="failure-message" aria-live="polite"></div>
        </section>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        const successMessage = document.getElementById('success-message');
        const failureMessage = document.getElementById('failure-message');

        // Hide messages on load
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';

        document.getElementById('user-input').addEventListener('input', function() {
            const correctValue = 'Congratulations... finally you did it'; // Replace with the actual decoded value
            const userInput = this.value;

            if (userInput === correctValue) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
                successMessage.textContent = 'Success! You entered the correct value.';
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                failureMessage.textContent = 'Failure! Incorrect value entered.';
            }
        });
    </script>
</body>
</html>
