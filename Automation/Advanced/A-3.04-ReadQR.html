<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Decode the QR Code and enter the value in the text field below to see if you are correct.">
    <meta name="keywords" content="QR Code, decode, input field, success message">
    <meta name="author" content="Your Name">
    <title>QR Code Decoder</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="A-3.03-Whiteboard.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="A-3.05-MultipleDragDrop.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
        <h1>QR Code</h1>
        <p class="lead">Fetch the value of QR code using your skills and enter the decoded text.</p>

        <section class="image-container">
            <img id="qr" src="../../img/qr.jpg" alt="QR Code">
        </section>
            <div class="input-group-parent">
                <div class="input-group-left">
                    <label for="user-input" class="label-left">Enter the scanned text:</label>
                </div>
                <div class="input-group-right">
                    <input type="text" id="user-input" name="user-input" placeholder="Decoded text">
                </div>
            </div>
            <div class="message" id="successMessage" role="status" aria-live="polite"><span>Correct — the entered text matches the source.</span></div>
            <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Does not match. <span style="color: black;">Expected:</span> <span id="expectedValue"></span> <span style="color: black;">Entered:</span> <span id="actualValue"></span></span></div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedValue = document.getElementById('expectedValue');
        const actualValue = document.getElementById('actualValue');

        // Hide messages on load
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';

        document.getElementById('user-input').addEventListener('input', function() {
            const correctValue = 'Congratulations... finally you did it'; // Replace with the actual decoded value
            const userInput = this.value;

            if (userInput === '') {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else if (userInput === correctValue) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                expectedValue.textContent = correctValue;
                actualValue.textContent = userInput;
            }
        });
    </script>
</body>
</html>
