<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Drag and Drop Between Frames</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Advanced/styles-A-3.28.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="A-3.27-AudioOddOneOut.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="A-3.29-DynamicProgressBar.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
        <h1>Drag and Drop with Frames</h1>
        <p class="lead">Drag the item from the left frame to the right frame.</p>

        <div class="iframe-container">
            <iframe id="frame1" srcdoc="
                <!DOCTYPE html>
                <html lang='en'>
                <head>
                    <link rel='stylesheet' href='../assets/css/Advanced/styles-A-3.28.css'>
                </head>
                <body class='frame-body'>
                    <div class='frame-container'>					
                        <div id='drag1' class='frame-draggable' draggable='true' ondragstart='parent.drag(event)'>Drag Me</div>
                    </div>
                </body>
                </html>
            "></iframe>
            <iframe id="frame2" srcdoc="
                <!DOCTYPE html>
                <html lang='en'>
                <head>
                    <link rel='stylesheet' href='../assets/css/Advanced/styles-A-3.28.css'>
                </head>
                <body class='frame-body'>
                    <div class='frame-container'>
                        <div id='dropContainer' class='frame-dropContainer' ondrop='parent.drop(event)' ondragover='parent.allowDrop(event)'>
                            Drop Here
                        </div>
                    </div>
                </body>
                </html>
            "></iframe>
        </div>
        <div id="successMessage" class="message success"></div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        const successMessage = document.getElementById('successMessage');

        // Hide message on load
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');

        // Drag and drop functionality (in the parent window to work between frames)
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
        }

        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            var draggedElement = document.getElementById('frame1').contentWindow.document.getElementById(data);
            var dropTarget = document.getElementById('frame2').contentWindow.document.getElementById('dropContainer');
            dropTarget.textContent = '';
            draggedElement.style.marginTop = '0';
            dropTarget.appendChild(draggedElement);

            // Display success message
            successMessage.style.display = 'flex';
            successMessage.classList.add('success');
            successMessage.textContent = "Element successfully dropped!";
        }
    </script>

</body>
</html>
