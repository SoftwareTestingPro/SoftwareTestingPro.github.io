<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop Image</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Advanced/styles-A-3.12.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="A-3.11-FileUpload.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous
            </a>
            <a href="A-3.13-SortableTable.html" class="nav-btn nav-btn-next">
                Next
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
            <h1>Drag and Drop Image</h1>
            <p class="lead">Drag the image to the drop zone.</p>

                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/Taj-Mahal.jpg/1200px-Taj-Mahal.jpg" id="draggableImage" draggable="true">
                <div id="dropBox">
                    <span id="dropBoxText">Drop Here</span>
                </div>
                <div id="successMessage" class="message success">Image dropped successfully!</div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const draggableImage = document.getElementById('draggableImage');
        const dropBox = document.getElementById('dropBox');
        const dropBoxText = document.getElementById('dropBoxText');
        const successMessage = document.getElementById('successMessage');

        // Hide message on load
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');

        draggableImage.addEventListener('dragstart', function(event) {
            event.dataTransfer.setData('text/plain', event.target.id);
        });

        dropBox.addEventListener('dragover', function(event) {
            event.preventDefault();
            dropBox.classList.add('over');
        });

        dropBox.addEventListener('dragleave', function(event) {
            dropBox.classList.remove('over');
        });

        dropBox.addEventListener('drop', function(event) {
            event.preventDefault();
            const data = event.dataTransfer.getData('text');
            const draggedElement = document.getElementById(data);
            dropBox.appendChild(draggedElement);
            dropBox.classList.remove('over');
            dropBoxText.style.display = 'none';
            successMessage.style.display = 'flex';
            successMessage.classList.add('success');
        });
    </script>
</body>
</html>
