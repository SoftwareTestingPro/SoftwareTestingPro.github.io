    <main class="card">
        <div class="card-content">
        <h1>Broken Images Detector</h1>
        <p class="lead">Master image validation! Identify and count all broken images among the displayed flags to prove your error detection skills.</p>

        <section class="images-container" id="images-container" aria-live="polite"></section>
            <div class="input-group-parent">
                <div class="input-group-left">
                    <label for="user-input" class="label-left">Enter count of broken images:</label>
                </div>
                <div class="input-group-right">
                    <input type="text" id="user-input" name="user-input" placeholder="Image Count">
                </div>
            </div>
            <div class="message" id="successMessage" role="status" aria-live="polite"><span>Correct — the entered text matches the source.</span></div>
            <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Does not match. <span style="color: black;">Expected:</span> <span id="expectedValue"></span> <span style="color: black;">Entered:</span> <span id="actualValue"></span></span></div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        const flagUrls = [
            'https://flagcdn.com/w320/us.png',  // USA
            'https://flagcdn.com/w320/ca.png',  // Canada
            'https://flagcdn.com/w320/mx.png',  // Mexico
            'https://flagcdn.com/w320/fr.png',  // France
            'https://flagcdn.com/w320/de.png',  // Germany
            'https://flagcdn.com/w320/jp.png',  // Japan
            'https://flagcdn.com/w320/gb.png',  // United Kingdom
            'https://flagcdn.com/w320/in.png',  // India
            'https://flagcdn.com/w320/br.png',  // Brazil
            'https://flagcdn.com/w320/ru.png'   // Russia
        ];

        const brokenImageUrls = [
            'https://flagcdn.com/w320/ab.png',  // Invalid
            'https://flagcdn.com/w320/ci.png',  // Invalid
            'https://flagcdn.com/w320/rp.png',  // Invalid
            'https://flagcdn.com/w320/rm.png',  // Invalid
            'https://flagcdn.com/w320/qp.png',  // Invalid
            'https://flagcdn.com/w320/zi.png'   // Invalid
        ];

        const totalImages = 6;
        const imagesContainer = document.getElementById('images-container');

        let brokenImageCount = 0;

        function createImage(src) {
            const imgContainer = document.createElement('div');
            imgContainer.className = 'image-container';

            const img = document.createElement('img');
            img.src = src;
            img.alt = 'Country Flag';
            img.onerror = () => {
                brokenImageCount++;
            };

            imgContainer.appendChild(img);
            imagesContainer.appendChild(imgContainer);
        }

        for (let i = 0; i < totalImages; i++) {
            if (Math.random() > 0.5) {
                createImage(flagUrls[Math.floor(Math.random() * flagUrls.length)]);
            } else {
                createImage(brokenImageUrls[Math.floor(Math.random() * brokenImageUrls.length)]);
            }
        }

        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        // Hide messages on load
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';

        document.getElementById('user-input').addEventListener('input', function() {
            const userInput = parseInt(this.value, 10);

            if (userInput === brokenImageCount) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
                successMessage.textContent = 'Success! You entered the correct value.';
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                document.getElementById('expectedValue').textContent = brokenImageCount.toString();
                document.getElementById('actualValue').textContent = userInput.toString();
            }
        });
    </script>
