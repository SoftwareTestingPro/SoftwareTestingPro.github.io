        <h1>File Download Challenge</h1>
        <p class="lead">Master file download automation! Download the test file and input the exact download duration to prove your file handling skills.</p>
        <a href="../assets/sample-100mb-file.zip" download class="download-btn">Click here to download a file</a>
        <div class="input-group-parent">
            <div class="input-group-left">
                <label for="user-input" class="label-left">Enter duration (In Seconds):</label>
            </div>

            <div class="input-group-right">
                <input type="text" id="user-input" name="user-input" placeholder="Duration in seconds" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
        </div>
        <div class="message success" id="successMessage" role="status" aria-live="polite" style="display: none;">
            <span>I cannot access your machine to verify it but expect you were able to fetch it.</span>
        </div>
        </div>
    </main>

<div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>

    <script>
        const input = document.getElementById('user-input');
        const successMessage = document.getElementById('successMessage');

        input.addEventListener('input', () => {
            if (input.value) {
                successMessage.style.display = 'flex';
            } else {
                successMessage.style.display = 'none';
            }
        });

        function disintegrate(button) {
            // Create a particle container
            const particleContainer = document.createElement('div');
            particleContainer.classList.add('particles');
            button.appendChild(particleContainer);

            // Create particles
            const particleCount = 100;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.left = `${Math.random() * 100}%`;
                particleContainer.appendChild(particle);
            }

            // Hide button text
            button.style.color = 'transparent';

            // Anime.js animation
            anime({
                targets: '.particle',
                translateX: () => anime.random(-200, 200),
                translateY: () => anime.random(-200, 200),
                scale: [1, 0],
                opacity: [1, 0],
                easing: 'easeOutExpo',
                duration: 2000
            });

            // Animate button fading and shrinking
            anime({
                targets: button,
                scale: [1, 0],
                opacity: [1, 0],
                easing: 'easeOutExpo',
                duration: 2000,
                complete: function() {
                    button.style.display = 'none'; // Remove the button after animation
                }
            });
        }
    </script>
