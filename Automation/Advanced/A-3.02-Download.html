<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download File</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="A-3.01-HiddenElement.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="A-3.03-Whiteboard.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
        <h1>File Download Challenge</h1>
        <p class="lead">Download the file and enter the time it took to complete in seconds.</p>
        <a href="https://sample-videos.com/zip/100mb.zip" class="download-link" download onclick="disintegrate(this)">Click here to download a file</a>
        <div class="input-container">
            <input type="text" id="user-input" name="user-input" placeholder="Enter duration in seconds" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>

    <script>
        function disintegrate(button) {
            // Create a particle container
            const particleContainer = document.createElement('div');
            particleContainer.classList.add('particles');
            button.appendChild(particleContainer);

            // Create particles
            const particleCount = 100;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.left = `${Math.random() * 100}%`;
                particleContainer.appendChild(particle);
            }

            // Hide button text
            button.style.color = 'transparent';

            // Anime.js animation
            anime({
                targets: '.particle',
                translateX: () => anime.random(-200, 200),
                translateY: () => anime.random(-200, 200),
                scale: [1, 0],
                opacity: [1, 0],
                easing: 'easeOutExpo',
                duration: 2000
            });

            // Animate button fading and shrinking
            anime({
                targets: button,
                scale: [1, 0],
                opacity: [1, 0],
                easing: 'easeOutExpo',
                duration: 2000,
                complete: function() {
                    button.style.display = 'none'; // Remove the button after animation
                }
            });
        }
    </script>
</body>
</html>
