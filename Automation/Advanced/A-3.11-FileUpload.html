<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Advanced/styles-A-3.11.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="A-3.10-Game.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="A-3.12-DragAndDropImg.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
        <h1>File Upload Challenge</h1>
        <p class="lead">Upload a file and verify the success message.</p>

        <input type="file" id="fileUpload" style="display: none">
        <div class="button-enabled">
            <button onclick="document.getElementById('fileUpload').click()">Upload File</button>
        </div>
        <div class="file-path" id="filePath"></div>
        <div class="message success" id="successMessage">File uploaded successfully!</div>
    </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        const successMessage = document.getElementById('successMessage');

        // Hide message on load
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');

        document.getElementById('fileUpload').addEventListener('change', function(event) {
            const filePath = document.getElementById('filePath');
            const file = event.target.files[0];

            if (file) {
                filePath.textContent = `File Path: ${file.name}`;
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
            } else {
                filePath.textContent = '';
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
            }
        });
    </script>
</body>
</html>
