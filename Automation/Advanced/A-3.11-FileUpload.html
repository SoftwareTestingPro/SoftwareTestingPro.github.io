        <h1>File Upload Challenge</h1>
        <p class="lead">Master file upload automation! Select and upload a file to demonstrate your file handling and form submission skills.</p>

        <input type="file" id="fileUpload" style="display: none">
        <div class="button-enabled">
            <button onclick="document.getElementById('fileUpload').click()">Upload File</button>
        </div>
        <div class="file-path" id="filePath"></div>
        <div class="message success" id="successMessage">File uploaded successfully!</div>
    </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        const successMessage = document.getElementById('successMessage');

        // Hide message on load
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');

        document.getElementById('fileUpload').addEventListener('change', function(event) {
            const filePath = document.getElementById('filePath');
            const file = event.target.files[0];

            if (file) {
                filePath.textContent = `File Path: ${file.name}`;
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
            } else {
                filePath.textContent = '';
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
            }
        });
    </script>
