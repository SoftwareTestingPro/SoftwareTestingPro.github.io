<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Action</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="card">
        <h1>Click Action</h1>
        <p class="lead">Click the button below to complete this task.</p>

        <div class="button-group">
            <button id="clickButton" type="button">Click Me</button>
        </div>

        <div class="message" id="successMessage" role="status" aria-live="polite">
            <span class="icon">✓</span>
            <span>Success! You clicked the button.</span>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const clickButton = document.getElementById('clickButton');
        const successMessage = document.getElementById('successMessage');

        // Hide success message initially
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');

        clickButton.addEventListener('click', function() {
            successMessage.style.display = 'flex';
            successMessage.classList.add('success');
        });
    </script>
</body>
</html>
