<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Action</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="B-1.00-Overview.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous
        </a>
        <a href="B-1.02-Input.html" class="nav-btn nav-btn-next">
            Next
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Click Action</h1>
            <p class="lead">Click the button below to complete this task.</p>

            <div class="button-group">
                <button id="clickButton" type="button">Click Me</button>
            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite">
                <span class="icon">✓</span>
                <span>Success! You clicked the button.</span>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

<script>
    const clickButton = document.getElementById('clickButton');
    const successMessage = document.getElementById('successMessage');

    // Hide success message initially
    successMessage.style.display = 'none';
    successMessage.classList.remove('success');

    clickButton.addEventListener('click', function() {
        successMessage.style.display = 'flex';
        successMessage.classList.add('success');
    });
</script>
</body>
</html>
