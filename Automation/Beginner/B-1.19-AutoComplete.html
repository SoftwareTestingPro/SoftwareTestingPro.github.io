        <main class="card">
            <div class="card-content">
                <h1>Autocomplete Challenge</h1>
                <p class="lead" id="labelText"></p>

                <div style="position: relative;">
                    <div class="input-group-parent">
                        <div class="input-group-left">
                            <label for="searchInput" class="label-left">Enter search term:</label>
                        </div>
                        <div class="input-group-right">
                            <input type="text" class="input-field" id="searchInput" onkeyup="displayResults()" placeholder="Start typing...">
                        </div>
                    </div>
                    <div id="results" class="dropdown"></div>
                </div>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>You successfully selected the auto-complete suggestion.</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Selection does not match. <span style="color: black;">Expected:</span> <span id="expectedValue"></span> <span style="color: black;">Entered:</span> <span id="actualValue"></span></span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const items = [
            'Apple', 'Banana', 'Orange', 'Pineapple', 'Strawberry',
            'Blueberry', 'Grapes', 'Watermelon', 'Peach', 'Mango'
        ];

        let randomItem;

        function selectRandomItem() {
            randomItem = items[Math.floor(Math.random() * items.length)];
            document.getElementById('labelText').textContent = `Master autocomplete precision! Type and select '${randomItem}' from the dynamic list below:`;
        }

        function displayResults() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const resultsDiv = document.getElementById('results');

            if (input.length === 0) {
                resultsDiv.innerHTML = '';
                resultsDiv.style.display = 'none';
                return;
            }

            const filteredItems = items.filter(item => item.toLowerCase().includes(input));

            if (filteredItems.length > 0) {
                resultsDiv.innerHTML = filteredItems.map(item => `<div class="dropdown-item">${item}</div>`).join('');
                resultsDiv.style.display = 'block';
                resultsDiv.style.zIndex = '9999';
                const itemDivs = resultsDiv.querySelectorAll('.dropdown-item');
                itemDivs.forEach((div, index) => {
                    div.addEventListener('click', () => selectItem(filteredItems[index]));
                });
            } else {
                resultsDiv.innerHTML = '<div>No matching results</div>';
                resultsDiv.style.display = 'block';
                resultsDiv.style.zIndex = '9999';
            }
        }

        function selectItem(item) {
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');
            const expectedValue = document.getElementById('expectedValue');
            const actualValue = document.getElementById('actualValue');

            if (item === randomItem) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                expectedValue.textContent = randomItem;
                actualValue.textContent = item;
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
            }

            document.getElementById('searchInput').value = item;
            document.getElementById('results').innerHTML = '';
            document.getElementById('results').style.display = 'none';
        }

        document.addEventListener('click', function(event) {
            const resultsDiv = document.getElementById('results');
            if (!resultsDiv.contains(event.target) && event.target.id !== 'searchInput') {
                resultsDiv.innerHTML = '';
                resultsDiv.style.display = 'none';
            }
        });

        selectRandomItem();
        // Hide messages initially
        document.getElementById('successMessage').style.display = 'none';
        document.getElementById('failureMessage').style.display = 'none';
    </script>
