<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Autocomplete Challenge - Type and select a specific item from a list.">
    <title>Autocomplete Challenge</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="card">
        <h1>Autocomplete Challenge</h1>
        <p class="lead" id="labelText"></p>

        <div class="input-group">
            <input type="text" class="input-field" id="searchInput" onkeyup="displayResults()" placeholder="Start typing...">
            <div id="results" class="dropdown"></div>
        </div>

        <div class="message success" id="successMessage" role="status" aria-live="polite">
            <span class="icon">✓</span>
            <span id="successText"></span>
        </div>

        <div class="message failure" id="failureMessage" role="status" aria-live="polite">
            <div class="message-row">
                <span class="icon">✕</span>
                <strong id="failureText"></strong>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const items = [
            'Apple', 'Banana', 'Orange', 'Pineapple', 'Strawberry',
            'Blueberry', 'Grapes', 'Watermelon', 'Peach', 'Mango'
        ];

        let randomItem;

        function selectRandomItem() {
            randomItem = items[Math.floor(Math.random() * items.length)];
            document.getElementById('labelText').textContent = `Type and Select '${randomItem}' from the list below:`;
        }

        function displayResults() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const resultsDiv = document.getElementById('results');

            if (input.length === 0) {
                resultsDiv.innerHTML = '';
                resultsDiv.style.display = 'none';
                return;
            }

            const filteredItems = items.filter(item => item.toLowerCase().includes(input));

            if (filteredItems.length > 0) {
                resultsDiv.innerHTML = filteredItems.map(item => `<div onclick="selectItem('${item}')">${item}</div>`).join('');
                resultsDiv.style.display = 'block';
            } else {
                resultsDiv.innerHTML = '<div>No matching results</div>';
                resultsDiv.style.display = 'block';
            }
        }

        function selectItem(item) {
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');
            const successText = document.getElementById('successText');
            const failureText = document.getElementById('failureText');

            if (item === randomItem) {
                successText.textContent = `Congratulations! You selected the correct item: ${item}.`;
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else {
                failureText.textContent = `Sorry, ${item} is not the correct item. Please select ${randomItem}.`;
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
            }

            document.getElementById('searchInput').value = item;
            document.getElementById('results').innerHTML = '';
            document.getElementById('results').style.display = 'none';
        }

        document.addEventListener('click', function(event) {
            const resultsDiv = document.getElementById('results');
            if (!resultsDiv.contains(event.target) && event.target.id !== 'searchInput') {
                resultsDiv.innerHTML = '';
                resultsDiv.style.display = 'none';
            }
        });

        selectRandomItem();
        // Hide messages initially
        document.getElementById('successMessage').style.display = 'none';
        document.getElementById('failureMessage').style.display = 'none';
    </script>
</body>
</html>
