<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Odd One Out Game</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Beginner/styles-B-1.23.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="B-1.22-ImagePath.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous Task
            </a>
            <a href="B-1.24-MathOddOneOut.html" class="nav-btn nav-btn-next">
                Next Task
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Color Odd One Out Game</h1>
                <p class="lead">Select the tile with the different color. Three tiles will have the same color, while one will be different.</p>
                <div class="buttons" id="buttonContainer"></div>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>Correct! You found the odd colored tile.</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Incorrect! That's not the odd one out. Try again.</span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // Function to generate a random color in hex format
        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        // Create the color options (3 similar and 1 odd)
        const normalColor = getRandomColor(); // This will be the common color for 3 buttons
        const oddColor = getRandomColor();    // This will be the odd one out color
        while (normalColor === oddColor) {    // Ensure the odd color is actually different
            oddColor = getRandomColor();
        }

        // Generate 3 normal color buttons
        const colorButtons = [normalColor, normalColor, normalColor, oddColor];
        // Shuffle buttons randomly
        colorButtons.sort(() => Math.random() - 0.5);

        // Add buttons to the DOM
        const buttonContainer = document.getElementById('buttonContainer');
        colorButtons.forEach((color, index) => {
            const button = document.createElement('button');
            button.style.backgroundColor = color;
            button.onclick = () => checkOddOneOut(color === oddColor);
            buttonContainer.appendChild(button);
        });

        function checkOddOneOut(isOddOneOut) {
            if (isOddOneOut) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
            }
        }
    </script>
</body>
</html>
