        <main class="card">
            <div class="card-content">
                <h1>Dynamic Progress Bar Challenge</h1>
                <p class="lead">Wait for the progress bar to reach 100%, then click the button. Clicking too early will result in a failure.</p>
                <div id="status">0%</div>
                <div id="progress-bar-container">
                    <div id="progress-bar"></div>
                </div>
                <div class="button-enabled">
                    <button id="action-button">Click Me After 100%!</button>
                </div>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>Success! Button was clicked after completion..</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Oops.. Looks like you You clicked too early.</span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const statusDisplay = document.getElementById('status');
        const actionButton = document.getElementById('action-button');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        let width = 0;
        let intervalId;

        function frame() {
            if (width >= 100) {
                clearInterval(intervalId);
                statusDisplay.textContent = "Complete!";
            } else {
                width++;
                progressBar.style.width = width + '%';
                statusDisplay.textContent = width + '%';
            }
        }

        actionButton.addEventListener('click', () => {
            if (width < 100) {
                clearInterval(intervalId);
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                actionButton.disabled = true;
            } else {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            }
        });

        // Hide messages initially
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.style.display = 'none';
        failureMessage.classList.remove('failure');

        intervalId = setInterval(frame, 50);
    </script>
