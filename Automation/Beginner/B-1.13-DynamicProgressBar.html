<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dynamic Progress Bar - Click a button after a progress bar reaches 100%.">
    <title>Dynamic Progress Bar Challenge</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <nav class="task-navigation">
        <a href="B-1.12-FetchURL.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous Task
        </a>
        <a href="B-1.14-Keystroke.html" class="nav-btn nav-btn-next">
            Next Task
            <span class="nav-icon">→</span>
        </a>
    </nav>

    <main class="card">
        <h1>Dynamic Progress Bar Challenge</h1>
        <p class="lead">Wait for the progress bar to reach 100%, then click the button. Clicking too early will result in a failure.</p>

        <div id="status">0%</div>
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>

        <div class="button-group">
            <button id="action-button">Click Me After 100%!</button>
        </div>

        <div class="message" id="successMessage" role="status" aria-live="polite">
            <span class="icon">✓</span>
            <span>Success! Button was clicked after completion.</span>
        </div>

        <div class="message" id="failureMessage" role="status" aria-live="polite">
            <div class="message-row">
                <span class="icon">✕</span>
                <strong>Failure</strong>
            </div>
            <div class="message-row">
                <span>You clicked too early.</span>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const statusDisplay = document.getElementById('status');
        const actionButton = document.getElementById('action-button');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        let width = 0;
        let intervalId;

        function frame() {
            if (width >= 100) {
                clearInterval(intervalId);
                statusDisplay.textContent = "Complete!";
            } else {
                width++;
                progressBar.style.width = width + '%';
                statusDisplay.textContent = width + '%';
            }
        }

        actionButton.addEventListener('click', () => {
            if (width < 100) {
                clearInterval(intervalId);
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                actionButton.disabled = true;
            } else {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            }
        });

        // Hide messages initially
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.style.display = 'none';
        failureMessage.classList.remove('failure');

        intervalId = setInterval(frame, 50);
    </script>
</body>
</html>
