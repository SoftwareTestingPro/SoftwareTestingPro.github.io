<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Title</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="B-1.10-RightClick.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous Task
            </a>
            <a href="B-1.12-FetchURL.html" class="nav-btn nav-btn-next">
                Next Task
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Match Title</h1>
                <p class="lead">Enter the exact title of this webpage. Your input will be compared against the actual page title.</p>

                <div class="input-group-parent">
                    <div class="input-group-left">
                        <label for="titleInput" class="label-left">Enter the title of this webpage:</label>
                    </div>

                    <div class="input-group-right">
                        <input
                            type="text"
                            id="titleInput"
                            placeholder="Enter the page title here"
                            aria-describedby="titleMessage"
                        >
                    </div>
                </div>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>Correct — the entered text matches the source.</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Does not match. <span style="color: black;">Expected:</span> <span id="expectedTitle"></span> <span style="color: black;">Entered:</span> <span id="actualTitle"></span></span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const inputField = document.getElementById('titleInput');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedTitleDisplay = document.getElementById('expectedTitle');
        const actualTitleDisplay = document.getElementById('actualTitle');

        const pageTitle = document.title;

        // Display expected title on load
        expectedTitleDisplay.textContent = pageTitle;

        function validateInput() {
            const userInput = inputField.value.trim();

            if (userInput === '') {
                // Clear messages if input is empty
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
                actualTitleDisplay.textContent = '';
            } else if (userInput === pageTitle) {
                // Success case
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                // Failure case
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                actualTitleDisplay.textContent = userInput;
            }
        }

        inputField.addEventListener('input', validateInput);
        inputField.addEventListener('blur', validateInput);
    </script>
</body>
</html>
