<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Title</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --muted: #6b7280;
            --accent: #6b21a8;
            --success: #16a34a;
            --danger: #dc2626;
            --border: #e6e9ef;
            --radius: 12px;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            color: #111827;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            padding: 24px;
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 18px;
            margin: 0 0 8px;
            color: #111827;
        }

        p.lead {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        label {
            font-size: 13px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"] {
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: #9fb7ff;
            box-shadow: 0 4px 12px rgba(60, 120, 255, 0.08);
        }

        .message {
            display: none;
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid;
        }

        .message.success {
            display: flex;
            background-color: #e6f7ea;
            color: #155724;
            border-color: #81e6b0;
            align-items: center;
            gap: 8px;
        }

        .message.failure {
            display: flex;
            background-color: #fff0f0;
            color: #6b1220;
            border-color: #f5b5ba;
            flex-direction: column;
            gap: 8px;
        }

        .message-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .value-box {
            background: rgba(0, 0, 0, 0.03);
            padding: 6px 10px;
            border-radius: 4px;
            font-family: Menlo, Monaco, monospace;
            font-size: 12px;
            color: #1b1b1b;
            word-break: break-word;
        }

        .icon {
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .visually-hidden {
            position: absolute !important;
            height: 1px;
            width: 1px;
            overflow: hidden;
            clip: rect(1px, 1px, 1px, 1px);
            white-space: nowrap;
        }

        @media (max-width: 420px) {
            .card {
                padding: 16px;
            }

            .message-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Web Page Title</h1>
        <p class="lead">Enter the exact title of this webpage. Your input will be compared against the actual page title.</p>

        <div class="input-group">
            <label for="titleInput">Enter the title of this webpage:</label>
            <input
                type="text"
                id="titleInput"
                placeholder="Enter the page title here"
                aria-describedby="titleMessage"
            >
        </div>

        <div class="message success" id="successMessage" role="status" aria-live="polite">
            <span class="icon">✓</span>
            <span>Correct — title matches exactly.</span>
        </div>

        <div class="message failure" id="failureMessage" role="status" aria-live="polite">
            <div class="message-row">
                <span class="icon">✕</span>
                <strong>Does not match</strong>
            </div>
            <div class="message-row">
                <div>
                    <span style="color: inherit; font-size: 12px;">Expected:</span>
                    <div class="value-box" id="expectedTitle"></div>
                </div>
                <div>
                    <span style="color: inherit; font-size: 12px;">Entered:</span>
                    <div class="value-box" id="actualTitle"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const inputField = document.getElementById('titleInput');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedTitleDisplay = document.getElementById('expectedTitle');
        const actualTitleDisplay = document.getElementById('actualTitle');

        const pageTitle = document.title;

        // Initialize: hide all messages on page load
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';

        // Display expected title on load
        expectedTitleDisplay.textContent = pageTitle;

        function validateInput() {
            const userInput = inputField.value.trim();

            if (userInput === '') {
                // Clear messages if input is empty
                successMessage.style.display = 'none';
                failureMessage.style.display = 'none';
                actualTitleDisplay.textContent = '';
            } else if (userInput === pageTitle) {
                // Success case
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else {
                // Failure case
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
                actualTitleDisplay.textContent = userInput;
            }
        }

        inputField.addEventListener('input', validateInput);
        inputField.addEventListener('blur', validateInput);
    </script>
</body>
</html>
