<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Validation</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<nav class="task-navigation">
    <a href="B-1.01-Click.html" class="nav-btn nav-btn-prev">
        <span class="nav-icon">←</span>
        Previous Task
    </a>
    <a href="B-1.03-Radio.html" class="nav-btn nav-btn-next">
        Next Task
        <span class="nav-icon">→</span>
    </a>
</nav>
<div class="content-wrapper">
    <main class="card">
        <h1>Input Action</h1>
        <p class="lead">Please Fill Out the Following Information.</p>

        <div class="input-group">
            <label for="user-input-name">Enter your first name:</label>
            <input type="text" id="user-input-name" name="user-input-name" placeholder="Type your name..." class="form-control">

            <div class="message success" id="nameSuccessMessage" role="status" aria-live="polite">
                <span class="icon">✓</span>
                <span>Name is valid!</span>
            </div>

            <div class="message failure" id="nameFailureMessage" role="status" aria-live="polite">
                <span class="icon">✕</span>
                <span>Please enter letters only</span>
            </div>
        </div>

        <div class="input-group">
            <label for="user-input-age">Enter your age:</label>
            <input type="text" id="user-input-age" name="user-input-age" maxlength="2" placeholder="Enter Your Age" class="form-control">

            <div class="message success" id="ageSuccessMessage" role="status" aria-live="polite">
                <span class="icon">✓</span>
                <span>Age is valid!</span>
            </div>

            <div class="message failure" id="ageFailureMessage" role="status" aria-live="polite">
                <span class="icon">✕</span>
                <span>Please enter digits only</span>
            </div>
        </div>

        <div class="input-group">
            <label for="text-input">Enter "text within double quotes" in the input field:</label>
            <input type="text" id="text-input" class="form-control" placeholder="Enter label text within quotes">

            <div class="message success" id="textSuccessMessage" role="status" aria-live="polite">
                <span class="icon">✓</span>
                <span>Text is valid!</span>
            </div>

            <div class="message failure" id="textFailureMessage" role="status" aria-live="polite">
                <span class="icon">✕</span>
                <span>Please enter: "text within double quotes"</span>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

<script>
    // Function to validate individual input and show appropriate message
    function validateInput(inputId, regex, successId, failureId) {
        const input = document.getElementById(inputId);
        const successMessage = document.getElementById(successId);
        const failureMessage = document.getElementById(failureId);

        if (input.value === '') {
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.style.display = 'none';
            failureMessage.classList.remove('failure');
        } else if (regex.test(input.value)) {
            successMessage.style.display = 'flex';
            successMessage.classList.add('success');
            failureMessage.style.display = 'none';
            failureMessage.classList.remove('failure');
        } else {
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.style.display = 'flex';
            failureMessage.classList.add('failure');
        }
    }

    // Add event listeners for each input
    document.getElementById('user-input-name').addEventListener('input', function() {
        validateInput('user-input-name', /^[A-Za-z]+$/, 'nameSuccessMessage', 'nameFailureMessage');
    });

    document.getElementById('user-input-age').addEventListener('input', function() {
        validateInput('user-input-age', /^\d+$/, 'ageSuccessMessage', 'ageFailureMessage');
    });

    document.getElementById('text-input').addEventListener('input', function() {
        validateInput('text-input', /^text within double quotes$/, 'textSuccessMessage', 'textFailureMessage');
    });

    // Hide messages initially (following B-1.11 pattern)
    document.getElementById('nameSuccessMessage').style.display = 'none';
    document.getElementById('nameFailureMessage').style.display = 'none';
    document.getElementById('ageSuccessMessage').style.display = 'none';
    document.getElementById('ageFailureMessage').style.display = 'none';
    document.getElementById('textSuccessMessage').style.display = 'none';
    document.getElementById('textFailureMessage').style.display = 'none';
</script>
</body>
</html>
