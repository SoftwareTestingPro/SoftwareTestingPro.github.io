<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Odd One Out Game</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Beginner/styles-B-1.24.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="B-1.23-ColorOddOneOut.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous Task
            </a>
            <a href="B-1.25-HighlightText.html" class="nav-btn nav-btn-next">
                Next Task
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Math Odd One Out Game</h1>
                <p class="lead">Select the equation that is mathematically incorrect. Three equations will be correct, while one will have the wrong answer.</p>
                <div class="math-buttons" id="buttonContainer"></div>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>Correct! You found the incorrect equation.</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Incorrect! That equation is actually correct. Try again.</span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        // Function to generate a correct equation
        function generateCorrectEquation() {
            const a = Math.floor(Math.random() * 10) + 1;
            const b = Math.floor(Math.random() * 10) + 1;
            return `${a} + ${b} = ${a + b}`;
        }

        // Function to generate an incorrect equation
        function generateIncorrectEquation() {
            const a = Math.floor(Math.random() * 10) + 1;
            const b = Math.floor(Math.random() * 10) + 1;
            const incorrectSum = (a + b) + Math.floor(Math.random() * 10) + 1; // Ensures incorrect result
            return `${a} + ${b} = ${incorrectSum}`;
        }

        // Generate 3 correct equations and 1 incorrect equation
        const correctEquations = [generateCorrectEquation(), generateCorrectEquation(), generateCorrectEquation()];
        const incorrectEquation = generateIncorrectEquation();

        // Combine and shuffle equations
        const equations = [...correctEquations, incorrectEquation];
        function shuffleArray(array) {
            return array.sort(() => Math.random() - 0.5);
        }
        const shuffledEquations = shuffleArray(equations);

        // Add buttons to the DOM
        const buttonContainer = document.getElementById('buttonContainer');
        shuffledEquations.forEach(equation => {
            const button = document.createElement('button');
            button.classList.add('math-button');
            button.textContent = equation;
            button.style.width = '200px';
            button.style.height = '80px';
            button.style.fontSize = '18px';
            button.style.whiteSpace = 'nowrap';
            button.style.margin = '10px';
            button.style.border = '2px solid #ccc';
            button.style.backgroundColor = '#f9f9f9';
            button.style.color = '#333';

            // Check if this is the incorrect equation
            button.onclick = () => {
                if (equation === incorrectEquation) {
                    successMessage.style.display = 'flex';
                    successMessage.classList.add('success');
                    failureMessage.style.display = 'none';
                    failureMessage.classList.remove('failure');
                } else {
                    successMessage.style.display = 'none';
                    successMessage.classList.remove('success');
                    failureMessage.style.display = 'flex';
                    failureMessage.classList.add('failure');
                }
            };

            buttonContainer.appendChild(button);
        });
    </script>
</body>
</html>
