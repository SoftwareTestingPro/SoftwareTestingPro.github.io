<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Count Challenge</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .container { text-align: center; padding: 20px; border: 1px solid #ccc; border-radius: 8px; background-color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 90%; max-width: 500px; }
        h2 { margin-top: 0; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            resize: vertical;
        }
        #input-area {
            margin-top: 20px;
        }
        #input-area label {
            font-size: 16px;
            margin-right: 10px;
        }
        #input-area input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 80px;
        }
        #message-display {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            min-height: 20px;
        }
        .success { color: green; }
        .failure { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Character Count Challenge</h2>
        <p>A random quote is displayed below. Enter the number of alphabetic characters (a-z, A-Z) in the quote:</p>
        <textarea id="text-input" rows="5" cols="50" readonly disabled></textarea>

        <div id="input-area">
            <label for="character-count">Character Count:</label>
            <input type="number" id="character-count" name="character-count">
            <button id="verify-button">Verify</button>
        </div>

        <div id="message-display"></div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const characterCountInput = document.getElementById('character-count');
        const verifyButton = document.getElementById('verify-button');
        const messageDisplay = document.getElementById('message-display');

        const quotes = [
            "The only way to do great work is to love what you do.",
            "Innovation distinguishes between a leader and a follower.",
            "Strive not to be a success, but rather to be of value.",
            "The mind is everything. What you think you become.",
            "Your time is limited, don't waste it living someone else's life."
        ];

        function setRandomQuote() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            textInput.value = randomQuote;
        }

        function checkAnswer() {
            // Use regex to remove non-alphabetic characters and get the length
            const characterCount = textInput.value.replace(/[^a-zA-Z]/g, '').length;
            const userGuess = parseInt(characterCountInput.value);

            if (isNaN(userGuess)) {
                messageDisplay.textContent = "Please enter a number.";
                messageDisplay.className = "failure";
            } else if (userGuess === characterCount) {
                messageDisplay.textContent = "Success! You entered the correct character count.";
                messageDisplay.className = "success";
            } else {
                messageDisplay.textContent = `Incorrect. The quote has ${characterCount} alphabetic characters.`;
                messageDisplay.className = "failure";
            }
        }

        window.addEventListener('load', setRandomQuote);

        verifyButton.addEventListener('click', checkAnswer);
    </script>
</body>
</html>
