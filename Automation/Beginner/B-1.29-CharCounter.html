<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Count Challenge</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="B-1.28-OrderConfirmation.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous Task
            </a>
            <a href="B-1.30-VideoPlayer.html" class="nav-btn nav-btn-next">
                Next Task
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Character Count Challenge</h1>
                <p class="lead">A random quote is displayed below. Enter the number of alphabetic characters (a-z, A-Z) in the quote:</p>
                
                <textarea id="text-input" rows="5" readonly disabled style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; background: var(--bg);"></textarea>

                <div class="input-group">
                    <label for="character-count">Character Count:</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="number" id="character-count" name="character-count" placeholder="Enter count" style="width: 120px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px;">
                        <button id="verify-button" style="padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s ease;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(107,33,168,0.3)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'">Verify</button>
                    </div>
                </div>

                <div class="message" id="successMessage" role="status" aria-live="polite">
                    <span class="icon">✓</span>
                    <span>Correct! You counted the characters accurately.</span>
                </div>

                <div class="message" id="failureMessage" role="status" aria-live="polite">
                    <span class="icon">✕</span>
                    <div>
                        <strong>Incorrect!</strong>
                        <div style="margin-top: 8px; font-size: 13px; opacity: 0.9;">
                            <div style="margin-bottom: 4px;">
                                <span style="color: inherit;">Expected:</span>
                                <span class="value-box" id="expectedCount" style="margin-left: 8px;"></span>
                            </div>
                            <div>
                                <span style="color: inherit;">You entered:</span>
                                <span class="value-box" id="actualCount" style="margin-left: 8px;"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const quotes = [
            "The quick brown fox jumps over the lazy dog.",
            "To be or not to be, that is the question.",
            "All that glitters is not gold.",
            "A journey of a thousand miles begins with a single step.",
            "The early bird catches the worm."
        ];

        const textInput = document.getElementById('text-input');
        const characterCountInput = document.getElementById('character-count');
        const verifyButton = document.getElementById('verify-button');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedCountDisplay = document.getElementById('expectedCount');
        const actualCountDisplay = document.getElementById('actualCount');

        // Function to count alphabetic characters only
        function countAlphabeticChars(text) {
            return (text.match(/[a-zA-Z]/g) || []).length;
        }

        // Function to set random quote
        function setRandomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            const selectedQuote = quotes[randomIndex];
            textInput.value = selectedQuote;
            return selectedQuote;
        }

        // Function to verify character count
        function verifyCount() {
            const quote = textInput.value;
            const actualCount = countAlphabeticChars(quote);
            const userCount = parseInt(characterCountInput.value);

            // Hide messages initially
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.style.display = 'none';
            failureMessage.classList.remove('failure');

            if (userCount === actualCount) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
            } else {
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                
                // Populate expected and actual values
                expectedCountDisplay.textContent = actualCount;
                actualCountDisplay.textContent = isNaN(userCount) ? '0' : userCount;
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            setRandomQuote();
            
            // Add event listeners
            verifyButton.addEventListener('click', verifyCount);
            characterCountInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    verifyCount();
                }
            });

            // Hide messages initially
            successMessage.style.display = 'none';
            successMessage.classList.remove('success');
            failureMessage.style.display = 'none';
            failureMessage.classList.remove('failure');
        });
    </script>
</body>
</html>
