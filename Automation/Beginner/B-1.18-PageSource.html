<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page Source Validation - Paste the page's HTML source to validate.">
    <title>Page Source Validation</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <nav class="task-navigation">
        <a href="B-1.17-Tooltip.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous Task
        </a>
        <a href="B-1.19-AutoComplete.html" class="nav-btn nav-btn-next">
            Next Task
            <span class="nav-icon">→</span>
        </a>
    </nav>

    <main class="card">
        <h1>Page Source Validation</h1>
        <p class="lead">Copy and paste the HTML source code of this page into the text area below to complete the task.</p>

        <div class="input-group">
            <label for="textInput">Enter HTML Page Source Code:</label>
            <textarea id="textInput" placeholder="Input HTML page source code here..." style="height: 150px;"></textarea>
        </div>

        <div class="message success" id="successMessage" role="status" aria-live="polite">
            <span class="icon">✓</span>
            <span>Success! Page source entered.</span>
        </div>

        <div class="message failure" id="failureMessage" role="status" aria-live="polite">
            <div class="message-row">
                <span class="icon">✕</span>
                <strong>Failure</strong>
            </div>
            <div class="message-row">
                <span>This is not the correct page source.</span>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const textInput = document.getElementById('textInput');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        textInput.addEventListener('input', function() {
            const inputValue = textInput.value;
            // A simple check. A more robust check would be to compare the entire source.
            if (inputValue.includes('<html lang="en">') && inputValue.includes('Page Source Validation')) {
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
            }
        });

        // Hide messages initially
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
    </script>
</body>
</html>
