        <main class="card">
            <div class="card-content">
                <h1>Page Source Validation</h1>
                <p class="lead">Master page source extraction! Capture and input the complete HTML source code to prove your automation can read page structure.</p>
                <div class="input-group">
                    <label for="textInput">Enter HTML Page Source Code:</label>
                    <textarea id="textInput" placeholder="Input HTML page source code here..." style="height: 150px;"></textarea>
                </div>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>You successfully entered page source.</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Oops.. Looks like this is not the correct page source</span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const textInput = document.getElementById('textInput');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        textInput.addEventListener('input', function() {
            const inputValue = textInput.value;
            // A simple check. A more robust check would be to compare the entire source.
            if (inputValue.includes('<html lang="en">') && inputValue.includes('Page Source Validation')) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
            }
        });

        // Hide messages initially
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
    </script>
