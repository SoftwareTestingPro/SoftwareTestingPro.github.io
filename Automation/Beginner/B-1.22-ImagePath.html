<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image URL Verification</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="card">
        <h1>Image Source URL</h1>
        <p class="lead">Enter the exact source URL of the image displayed below. Your input will be compared against the actual image source.</p>

        <img id="image" src="" alt="Random Image" style="display: block; margin: 0 auto 20px auto;">

        <div class="input-group">
            <label for="imageURL">Enter the source URL of this image:</label>
            <input
                type="text"
                id="imageURL"
                placeholder="Enter the image URL here"
                aria-describedby="imageMessage"
            >
        </div>

        <div class="message" id="successMessage" role="status" aria-live="polite">
            <span class="icon">✓</span>
            <span>Correct — URL matches exactly.</span>
        </div>

        <div class="message" id="failureMessage" role="status" aria-live="polite">
            <div class="message-row">
                <span class="icon">✕</span>
                <strong>Does not match</strong>
            </div>
            <div class="message-row">
                <div>
                    <span style="color: inherit; font-size: 12px;">Expected:</span>
                    <div class="value-box" id="expectedUrl"></div>
                </div>
                <div>
                    <span style="color: inherit; font-size: 12px;">Entered:</span>
                    <div class="value-box" id="actualUrl"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const imageElement = document.getElementById('image');
        const urlInput = document.getElementById('imageURL');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedUrlDisplay = document.getElementById('expectedUrl');
        const actualUrlDisplay = document.getElementById('actualUrl');

        const imageUrls = [
            'https://picsum.photos/250/250',
            'https://picsum.photos/250/251',
            'https://picsum.photos/250/252',
            'https://picsum.photos/250/253',
            'https://picsum.photos/250/254'
        ];

        function setRandomImage() {
            const randomIndex = Math.floor(Math.random() * imageUrls.length);
            const randomImageUrl = imageUrls[randomIndex];
            imageElement.src = randomImageUrl;
            imageElement.dataset.src = randomImageUrl;
            expectedUrlDisplay.textContent = randomImageUrl;
        }

        function validateInput() {
            const inputUrl = urlInput.value.trim();
            const correctUrl = imageElement.dataset.src;

            if (inputUrl === '') {
                // Clear messages if input is empty
                successMessage.style.display = 'none';
                failureMessage.style.display = 'none';
                actualUrlDisplay.textContent = '';
            } else if (inputUrl === correctUrl) {
                // Success case
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                // Failure case
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                actualUrlDisplay.textContent = inputUrl;
            }
        }

        urlInput.addEventListener('input', validateInput);
        urlInput.addEventListener('blur', validateInput);
        window.addEventListener('load', setRandomImage);
    </script>

</body>
</html>
