<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image URL Verification</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="B-1.21-CompareText.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous Task
            </a>
            <a href="B-1.23-ColorOddOneOut.html" class="nav-btn nav-btn-next">
                Next Task
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Image URL Verification</h1>
                <p class="lead">Enter the exact source URL of the image displayed below. Your input will be compared against the actual image source.</p>

                <img id="image" src="" alt="Random Image" style="display: block; margin: 0 auto 20px auto;">

                <div class="input-group-parent">
                    <div class="input-group-left">
                        <label for="imageURL" class="label-left">Enter the source URL of this image:</label>
                    </div>

                    <div class="input-group-right">
                        <input type="text" id="imageURL" placeholder="Enter the image URL here" aria-describedby="imageMessage">
                    </div>
                </div>

                <div class="message" id="successMessage" role="status" aria-live="polite"><span>Source URL Successfully verified.</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Source URL Does not match. <span style="color: black;">Expected:</span> <span id="expectedUrl"></span> <span style="color: black;">Entered:</span> <span id="actualUrl"></span></span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const imageElement = document.getElementById('image');
        const urlInput = document.getElementById('imageURL');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedUrlDisplay = document.getElementById('expectedUrl');
        const actualUrlDisplay = document.getElementById('actualUrl');

        const imageUrls = [
            'https://picsum.photos/250/250',
            'https://picsum.photos/250/251',
            'https://picsum.photos/250/252',
            'https://picsum.photos/250/253',
            'https://picsum.photos/250/254'
        ];

        function setRandomImage() {
            const randomIndex = Math.floor(Math.random() * imageUrls.length);
            const randomImageUrl = imageUrls[randomIndex];
            imageElement.src = randomImageUrl;
            imageElement.dataset.src = randomImageUrl;
            expectedUrlDisplay.textContent = randomImageUrl;
        }

        function validateInput() {
            const inputUrl = urlInput.value.trim();
            const correctUrl = imageElement.dataset.src;

            if (inputUrl === '') {
                // Clear messages if input is empty
                successMessage.style.display = 'none';
                failureMessage.style.display = 'none';
                actualUrlDisplay.textContent = '';
            } else if (inputUrl === correctUrl) {
                // Success case
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                // Failure case
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                actualUrlDisplay.textContent = inputUrl;
            }
        }

        urlInput.addEventListener('input', validateInput);
        urlInput.addEventListener('blur', validateInput);
        window.addEventListener('load', setRandomImage);
    </script>
</body>
</html>
