<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Input Value Matching - Copy text from one field to another to validate.">
    <title>Input Value Matching</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="B-1.05-Checkboxes.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous Task
        </a>
        <a href="B-1.07-RadioList.html" class="nav-btn nav-btn-next">
            Next Task
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Input Value Matching</h1>
            <p class="lead">Copy the randomly generated text from the first field into the second field to complete the task.</p>

            <div class="input-group">
                <label for="sourceInput">Source Text (Read-Only):</label>
                <input type="text" id="sourceInput" readonly>
            </div>

            <div class="input-group">
                <label for="destinationInput">Enter the text here:</label>
                <input type="text" id="destinationInput" placeholder="Enter the text from the field above">
            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite">
                <span class="icon">✓</span>
                <span>Correct — the entered text matches the source.</span>
            </div>

            <div class="message" id="failureMessage" role="status" aria-live="polite">
                <div class="message-row">
                    <span class="icon">✕</span>
                    <strong>Does not match</strong>
                </div>
                <div class="message-row">
                    <div>
                        <span style="color: inherit; font-size: 12px;">Expected:</span>
                        <div class="value-box" id="expectedValue"></div>
                    </div>
                    <div>
                        <span style="color: inherit; font-size: 12px;">Entered:</span>
                        <div class="value-box" id="actualValue"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

    <div id="footer-placeholder"></div>

    <script>
        const sourceInput = document.getElementById('sourceInput');
        const destinationInput = document.getElementById('destinationInput');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedValueDisplay = document.getElementById('expectedValue');
        const actualValueDisplay = document.getElementById('actualValue');

        // Generate and set random text
        const randomText = Math.random().toString(36).substring(3);
        sourceInput.value = randomText;
        expectedValueDisplay.textContent = randomText;

        // Hide messages on page load
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';

        function validateInput() {
            const userInput = destinationInput.value;

            if (userInput === '') {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
                actualValueDisplay.textContent = '';
            } else if (userInput === randomText) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                actualValueDisplay.textContent = userInput;
            }
        }

        destinationInput.addEventListener('input', validateInput);
        destinationInput.addEventListener('blur', validateInput);
    </script>
</body>
</html>
