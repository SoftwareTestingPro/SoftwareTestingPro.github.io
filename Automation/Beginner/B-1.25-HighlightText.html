<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Highlight Example</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <nav class="task-navigation">
        <a href="B-1.24-MathOddOneOut.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous Task
        </a>
        <a href="B-1.26-CaseValidation.html" class="nav-btn nav-btn-next">
            Next Task
            <span class="nav-icon">→</span>
        </a>
    </nav>

    <main class="card">
        <h1>Text Highlight</h1>
        <p class="lead">Execute JavaScript code to highlight the second text element with the same yellow background as the first one.</p>

        <div class="text-section">
            <span class="highlight-text">This is Highlighted text.</span>
        </div>

        <div class="text-section">
            <span id="textToHighlight">Highlight this text same as above.</span>
        </div>

        <div class="message" id="successMessage" role="status" aria-live="polite">
            <span class="icon">✓</span>
            <span>Success! The text has been highlighted.</span>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        // Function to highlight text - to be called by automation script
        function highlightSecondText() {
            var textToHighlight = document.getElementById("textToHighlight");
            var successMessage = document.getElementById("successMessage");
            
            textToHighlight.classList.add("highlight-text");
            successMessage.style.display = "flex";
            successMessage.classList.add("success");
        }

        // Hide message on page load
        document.addEventListener('DOMContentLoaded', function() {
            var successMessage = document.getElementById("successMessage");
            successMessage.style.display = "none";
            successMessage.classList.remove("success");
        });
    </script>
</body>
</html>
