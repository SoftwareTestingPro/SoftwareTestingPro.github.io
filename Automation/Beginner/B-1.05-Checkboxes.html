<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Action</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="B-1.04-Color.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous Task
            </a>
            <a href="B-1.06-ValueInput.html" class="nav-btn nav-btn-next">
                Next Task
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Select Hobbies</h1>
                <p id="message">Select "Music" and the 3rd option from the shuffled list below. This task checks that your selection logic can find "Music" and the 3rd option in a randomized list.</p>

                <div class="checkbox-group" id="checkboxGroup">
                    <!-- Checkboxes will be inserted here by JavaScript -->
                </div>

                <div class="message" id="successMessage" role="status" aria-live="polite"><span>Correct — the entered text matches the source.</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Does not match. <span style="color: black;">Expected:</span> <span id="expectedValue"></span> <span style="color: black;">Selected:</span> <span id="actualValue"></span></span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const checkboxesData = [
            { value: "Reading", label: "Reading" },
            { value: "Travelling", label: "Travelling" },
            { value: "Music", label: "Music" },
            { value: "Gaming", label: "Gaming" }
        ];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function createCheckboxes() {
            // Create a copy of the data and ensure "Music" is not in the 3rd position
            let data = [...checkboxesData];
            const musicIndex = data.findIndex(item => item.value === 'Music');
            
            // Remove "Music" from the list and prepare for reinsertion
            const Music = data.splice(musicIndex, 1)[0];

            // Shuffle the remaining data
            shuffleArray(data);

            // Insert "Music" back into one of the first two positions
            const insertPosition = Math.floor(Math.random() * 2);
            data.splice(insertPosition, 0, Music);

            // Ensure "Music" is not in the 3rd position
            if (data[2].value === 'Music') {
                data.splice(insertPosition, 1);
                data.splice(2, 0, Music);
            }

            const checkboxGroup = document.getElementById('checkboxGroup');
            checkboxGroup.innerHTML = '';

            data.forEach(item => {
                const label = document.createElement('label');
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.name = 'hobbies';
                checkbox.value = item.value;
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(item.label));
                checkboxGroup.appendChild(label);
            });
        }

        function updateHobbyCount() {
            const checkboxes = document.querySelectorAll('input[name="hobbies"]');
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');
            const selectedHobbies = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
            
            // Get the value of the 3rd option
            const thirdOptionValue = document.querySelectorAll('input[name="hobbies"]')[2].value;

            if (selectedHobbies.includes('Music') && selectedHobbies.includes(thirdOptionValue) &&
                selectedHobbies.length === 2) {
                successMessage.classList.add('success');
                successMessage.style.display = 'flex';
                failureMessage.classList.remove('failure');
                failureMessage.style.display = 'none';
            } else {
                successMessage.classList.remove('success');
                successMessage.style.display = 'none';
                failureMessage.classList.add('failure');
                failureMessage.style.display = 'flex';
                
                // Populate expected and actual values
                const expectedValue = document.getElementById('expectedValue');
                const actualValue = document.getElementById('actualValue');
                expectedValue.textContent = `"Music" and "${thirdOptionValue}" (2 items)`;
                actualValue.textContent = selectedHobbies.length > 0 ? 
                    selectedHobbies.map(h => `"${h}"`).join(', ') + ` (${selectedHobbies.length} items)` : 
                    'None selected';
            }
        }

        // Initialize: hide messages initially
        function initializeMessages() {
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';
        }

        createCheckboxes();
        initializeMessages();
        document.getElementById('checkboxGroup').addEventListener('change', updateHobbyCount);
    </script>
</body>
</html>
