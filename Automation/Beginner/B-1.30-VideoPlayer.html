    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="../../components.js"></script>

<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="B-1.29-CharCounter.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous Task
            </a>
            <a href="B-1.31-Overview.html" class="nav-btn nav-btn-next">
                Next Task
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Using Video Player controls</h1>
                <p class="lead">Play the video, pause it, seek through the timeline, change playback speed, adjust volume, and toggle fullscreen. Watch the entire video to see the success message.</p>
                <video id="player" controls style="width: 100%; height: 50vh;">
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>You've watched the entire video successfully!</span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
    const player = new Plyr('#player');
    const successMessage = document.getElementById('successMessage');

    player.on('ended', () => {
        successMessage.style.display = 'flex';
        successMessage.className = 'message success';
    });
</script>
</body>
