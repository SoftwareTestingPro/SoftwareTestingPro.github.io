<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Gender</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
<div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="B-1.02-Input.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous Task
        </a>
        <a href="B-1.04-Color.html" class="nav-btn nav-btn-next">
            Next Task
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Select Gender</h1>
            <p class="lead">Select the "Male" radio button to complete this task.</p>

            <div class="radio-list">
                <label class="radio-label">
                    <input type="radio" name="gender" value="male">
                    <span class="radio-custom"></span>
                    Male
                </label>
                <label class="radio-label">
                    <input type="radio" name="gender" value="female">
                    <span class="radio-custom"></span>
                    Female
                </label>
                <label class="radio-label">
                    <input type="radio" name="gender" value="other">
                    <span class="radio-custom"></span>
                    Other
                </label>
            </div>

            <div class="message" id="successMessage" role="status" aria-live="polite">
                <span>Correct! You selected the right option.</span>
            </div>

            <div class="message" id="failureMessage" role="status" aria-live="polite">
                <span>Expected: Male, Selected: <span id="actualValue"></span></span>
            </div>
        </div>
    </main>
</div>

    <div id="footer-placeholder"></div>

    <script>
        const radioOptions = document.querySelectorAll('input[name="gender"]');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const actualValue = document.getElementById('actualValue');

        // Hide messages initially
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.style.display = 'none';
        failureMessage.classList.remove('failure');

        radioOptions.forEach(radio => {
            radio.addEventListener('change', function() {
                const selected = this.value;
                if (selected === 'male') {
                    successMessage.style.display = 'flex';
                    successMessage.classList.add('success');
                    failureMessage.style.display = 'none';
                    failureMessage.classList.remove('failure');
                    actualValue.textContent = '';
                } else {
                    successMessage.style.display = 'none';
                    successMessage.classList.remove('success');
                    failureMessage.style.display = 'flex';
                    failureMessage.classList.add('failure');
                    actualValue.textContent = selected;
                }
            });
        });
    </script>
</body>
</html>
