<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="URL Matching - Enter the current page's URL to validate.">
    <title>URL Matching</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <nav class="task-navigation">
        <a href="B-1.11-PageTitle.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous Task
        </a>
        <a href="B-1.13-DynamicProgressBar.html" class="nav-btn nav-btn-next">
            Next Task
            <span class="nav-icon">→</span>
        </a>
    </nav>

    <main class="card">
        <h1>URL Matching</h1>
        <p class="lead">Enter the full URL of this webpage in the input field below to complete the task.</p>

        <div class="input-group">
            <label for="urlInput">Enter the URL of this webpage:</label>
            <input type="text" id="urlInput" placeholder="Enter URL here">
        </div>

        <div class="message" id="successMessage" role="status" aria-live="polite">
            <span class="icon">✓</span>
            <span>Correct — the entered URL matches the current page's URL.</span>
        </div>

        <div class="message" id="failureMessage" role="status" aria-live="polite">
            <div class="message-row">
                <span class="icon">✕</span>
                <strong>Does not match</strong>
            </div>
            <div class="message-row">
                <div>
                    <span style="color: inherit; font-size: 12px;">Expected:</span>
                    <div class="value-box" id="expectedValue"></div>
                </div>
                <div>
                    <span style="color: inherit; font-size: 12px;">Entered:</span>
                    <div class="value-box" id="actualValue"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const inputField = document.getElementById('urlInput');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedValueDisplay = document.getElementById('expectedValue');
        const actualValueDisplay = document.getElementById('actualValue');

        const currentUrl = window.location.href;
        expectedValueDisplay.textContent = currentUrl;

        function validateInput() {
            const userInput = inputField.value.trim();

            if (userInput === '') {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
                actualValueDisplay.textContent = '';
            } else if (userInput === currentUrl) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                actualValueDisplay.textContent = userInput;
            }
        }

        inputField.addEventListener('input', validateInput);
        inputField.addEventListener('blur', validateInput);
    </script>
</body>
</html>
