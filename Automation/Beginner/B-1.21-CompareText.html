<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Text Comparison - Compare two pieces of text and determine if they are the same.">
    <title>Text Comparison</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="card">
        <h1>Text Comparison</h1>
        <p class="lead">Are the two texts below the same? Click "Yes" or "No" to answer.</p>

        <div class="text-container">
            <div class="text-item">
                <div class="text-label">Text 1:</div>
                <div id="text1" class="value-box"></div>
            </div>
            <div class="text-item">
                <div class="text-label">Text 2:</div>
                <div id="text2" class="value-box"></div>
            </div>
        </div>

        <div class="button-container">
            <button onclick="checkAnswer(true)">Yes</button>
            <button onclick="checkAnswer(false)">No</button>
        </div>

        <div class="message success" id="successMessage" role="status" aria-live="polite">
            <span class="icon">✓</span>
            <span>Correct!</span>
        </div>

        <div class="message failure" id="failureMessage" role="status" aria-live="polite">
            <span class="icon">✕</span>
            <span>Incorrect!</span>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const text1Element = document.getElementById('text1');
        const text2Element = document.getElementById('text2');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        const texts = ["Hello", "World", "Text", "Example", "Random", "Comparison"];

        function setRandomTexts() {
            const randomText1 = texts[Math.floor(Math.random() * texts.length)];
            const randomText2 = Math.random() > 0.5 ? randomText1 : texts[Math.floor(Math.random() * texts.length)];
            text1Element.textContent = randomText1;
            text2Element.textContent = randomText2;
        }

        function checkAnswer(isTrueSelected) {
            const text1 = text1Element.textContent;
            const text2 = text2Element.textContent;
            const isSuccess = (text1 === text2 && isTrueSelected) || (text1 !== text2 && !isTrueSelected);

            if (isSuccess) {
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
            }
        }

        setRandomTexts();
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
    </script>
</body>
</html>
