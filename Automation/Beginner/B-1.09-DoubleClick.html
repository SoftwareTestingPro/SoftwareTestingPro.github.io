        <main class="card">
            <div class="card-content">
                <h1>Double Click Button</h1>
                <p class="lead">Double-click the button below to complete this task.</p>
                <div class="button-enabled">
                    <button id="clickButton" type="button">Click Me</button>
                </div>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>You successfully double-clicked the button.</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Oops.. Looks like you single clicked the button</span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const clickButton = document.getElementById('clickButton');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        let clickTimeout;

        clickButton.addEventListener('click', () => {
            // Handle double-click logic
            clearTimeout(clickTimeout);
            clickTimeout = setTimeout(() => {
                // If not double-clicked, show failure message
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
                successMessage.style.display = 'none'; // Hide success message
                successMessage.classList.remove('success');
            }, 250);
        });

        clickButton.addEventListener('dblclick', () => {
            clearTimeout(clickTimeout);
            successMessage.style.display = 'flex';
            successMessage.classList.add('success');
            failureMessage.style.display = 'none'; // Hide failure message
            failureMessage.classList.remove('failure');
        });

        //Hide messages initially
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.style.display = 'none';
        failureMessage.classList.remove('failure');
    </script>
</body>
