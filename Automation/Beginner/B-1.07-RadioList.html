<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Radio List Selection - Select India from a shuffled list of countries.">
    <title>Radio List</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

<div class="content-wrapper">
    <div class="card-nav">
        <a href="B-1.06-ValueInput.html" class="nav-btn nav-btn-prev">
            <span class="nav-icon">←</span>
            Previous Task
        </a>
        <a href="B-1.08-DropDown.html" class="nav-btn nav-btn-next">
            Next Task
            <span class="nav-icon">→</span>
        </a>
    </div>

    <main class="card">
        <div class="card-content">
            <h1>Radio Button Selection</h1>
            <p class="lead">Choose India from the shuffled list below. This task checks that your selection logic can find India in a randomized list.</p>

            <fieldset role="radiogroup">
                <ul id="radioList" class="radio-list">
                    <!-- Radio buttons generated by JavaScript -->
                </ul>
            </fieldset>

            <div class="message" id="successMessage" role="status" aria-live="polite"><span>Correct — the entered text matches the source.</span></div>
            <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Does not match. <span style="color: black;">Expected:</span> <span> India</span> <span style="color: black;">Selected:</span> <span id="selectedCountry"></span></span></div>
        </div>
    </main>
</div>

    <div id="footer-placeholder"></div>

    <script>
        const countriesBase = [
            'China', 'India', 'Kazakhstan', 'Saudi Arabia', 'Iran', 'Namibia', 'Isreal', 'Sri Lanka'
        ];

        const state = {
            countries: [],
        };

        // Fisher-Yates shuffle
        function shuffle(array){
            const a = array.slice();
            for(let i = a.length - 1; i > 0; i--){
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function renderList(items){
            const ul = document.getElementById('radioList');
            ul.innerHTML = '';
            items.forEach((name, idx) => {
                const li = document.createElement('li');
                li.className = 'radio-item';

                const input = document.createElement('input');
                input.type = 'radio';
                input.name = 'country';
                input.id = 'country-' + idx;
                input.value = name;
                input.setAttribute('aria-label', name);

                const label = document.createElement('label');
                label.htmlFor = input.id;
                label.textContent = name;

                li.appendChild(input);
                li.appendChild(label);
                ul.appendChild(li);
            });
        }

        function clearMessages(){
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('successMessage').classList.remove('success');
            document.getElementById('failureMessage').style.display = 'none';
            document.getElementById('failureMessage').classList.remove('failure');
            document.getElementById('selectedCountry').textContent = '';
        }

        function handleChange(){
            const radio = document.querySelector('input[name="country"]:checked');
            if(!radio) {
                clearMessages();
                return;
            }
            const name = radio.value;
            document.getElementById('selectedCountry').textContent = name;

            if(name === 'India'){
                document.getElementById('successMessage').style.display = 'flex';
                document.getElementById('successMessage').classList.add('success');
                document.getElementById('failureMessage').style.display = 'none';
                document.getElementById('failureMessage').classList.remove('failure');
            } else {
                document.getElementById('successMessage').style.display = 'none';
                document.getElementById('successMessage').classList.remove('success');
                document.getElementById('failureMessage').style.display = 'flex';
                document.getElementById('failureMessage').classList.add('failure');
            }
        }

        function init(){
            state.countries = shuffle(countriesBase);
            renderList(state.countries);

            const form = document.getElementById('radioList');
            form.addEventListener('change', handleChange);

            document.getElementById('shuffleBtn').addEventListener('click', () => {
                clearMessages();
                state.countries = shuffle(countriesBase);
                renderList(state.countries);
                const first = document.querySelector('input[name="country"]');
                if(first) first.focus();
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                const checked = document.querySelector('input[name="country"]:checked');
                if(checked) checked.checked = false;
                clearMessages();
            });

            // Keyboard: arrow keys navigate radio group
            const ul = document.getElementById('radioList');
            ul.addEventListener('keydown', (ev) => {
                const radios = Array.from(document.querySelectorAll('input[name="country"]'));
                const idx = radios.findIndex(r => r === document.activeElement || r.checked);
                if(idx === -1) return;
                if(ev.key === 'ArrowDown' || ev.key === 'ArrowRight'){
                    ev.preventDefault();
                    const next = radios[(idx + 1) % radios.length];
                    next.focus();
                    next.checked = true;
                    handleChange();
                } else if(ev.key === 'ArrowUp' || ev.key === 'ArrowLeft'){
                    ev.preventDefault();
                    const prev = radios[(idx - 1 + radios.length) % radios.length];
                    prev.focus();
                    prev.checked = true;
                    handleChange();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
