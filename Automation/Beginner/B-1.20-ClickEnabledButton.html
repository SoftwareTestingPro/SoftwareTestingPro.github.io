<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Click Enabled Button - Identify and click the single enabled button among several disabled ones.">
    <title>Enabled/Disabled Buttons</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="B-1.19-AutoComplete.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous Task
            </a>
            <a href="B-1.21-CompareText.html" class="nav-btn nav-btn-next">
                Next Task
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Enabled/Disabled Buttons</h1>
                <p class="lead">Select the enabled button from the group below to complete the task.</p>

                <div class="button-container" id="buttonContainer">
                    <!-- Buttons will be inserted here by JavaScript -->
                </div>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>You clicked the enabled button.</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>You clicked the disabled button.</span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        function generateRandomString(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function setupButtons() {
            const buttonContainer = document.getElementById('buttonContainer');
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');
            const buttonCount = 5;
            const enabledIndex = Math.floor(Math.random() * buttonCount);

            for (let i = 0; i < buttonCount; i++) {
                const buttonWrapper = document.createElement('div');
                buttonWrapper.style.display = 'inline-block';
                buttonWrapper.style.margin = '5px';

                const button = document.createElement('button');
                button.textContent = `Button ${i + 1}`;
                button.id = generateRandomString(8);
                button.className = generateRandomString(5);
                button.name = generateRandomString(6);
                button.disabled = i !== enabledIndex;
                if (button.disabled) {
                    button.style.pointerEvents = 'none';
                }

                buttonWrapper.appendChild(button);

                buttonWrapper.addEventListener('click', function() {
                    if (!button.disabled) {
                        successMessage.style.display = 'flex';
                        successMessage.classList.add('success');
                        failureMessage.style.display = 'none';
                        failureMessage.classList.remove('failure');
                    } else {
                        successMessage.style.display = 'none';
                        successMessage.classList.remove('success');
                        failureMessage.style.display = 'flex';
                        failureMessage.classList.add('failure');
                    }
                });

                buttonContainer.appendChild(buttonWrapper);
            }
        }

        // Initialize buttons and hide message
        setupButtons();
        document.getElementById('successMessage').style.display = 'none';
        document.getElementById('failureMessage').style.display = 'none';
    </script>
</body>
</html>
