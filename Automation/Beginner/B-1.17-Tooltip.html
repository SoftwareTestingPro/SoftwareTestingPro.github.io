<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tooltip Validation - Hover over text to reveal a tooltip and validate its content.">
    <title>Tooltip Validation</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/Beginner/styles-B-1.17.css">
    <script src="../assets/components/components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="content-wrapper">
        <div class="card-nav">
            <a href="B-1.16-CaptureScreeshot.html" class="nav-btn nav-btn-prev">
                <span class="nav-icon">←</span>
                Previous Task
            </a>
            <a href="B-1.18-PageSource.html" class="nav-btn nav-btn-next">
                Next Task
                <span class="nav-icon">→</span>
            </a>
        </div>

        <main class="card">
            <div class="card-content">
                <h1>Tooltip Validation</h1>
                <p class="lead">Hover over the rainbow text below to reveal a tooltip, then enter the tooltip's text into the input field.</p>

                <div style="text-align: center; margin-bottom: 20px;">
                    <div class="rainbow-text" data-tooltip="I am a Tooltip">
                        Hover Me For Tooltip
                    </div>
                </div>

                <div class="input-group-parent">
                    <div class="input-group-left">
                        <label for="inputField" class="label-left">Enter the title of this webpage:</label>
                    </div>

                    <div class="input-group-right">
                        <input type="text" id="inputField" placeholder="Enter the tooltip text here">
                    </div>
                </div>
                <div class="message" id="successMessage" role="status" aria-live="polite"><span>Tooltip matched.</span></div>
                <div class="message" id="failureMessage" role="status" aria-live="polite"><span>Tooltip does not match. <span style="color: black;">Expected:</span> <span id="expectedValue"></span> <span style="color: black;">Entered:</span> <span id="actualValue"></span></span></div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const inputField = document.getElementById('inputField');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedValueDisplay = document.getElementById('expectedValue');
        const actualValueDisplay = document.getElementById('actualValue');

        const tooltipText = document.querySelector('.rainbow-text').getAttribute('data-tooltip');
        expectedValueDisplay.textContent = tooltipText;

        inputField.addEventListener('input', function() {
            const userInput = inputField.value;
            actualValueDisplay.textContent = userInput;

            if (userInput === tooltipText) {
                successMessage.style.display = 'flex';
                successMessage.classList.add('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            } else if (userInput) {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'flex';
                failureMessage.classList.add('failure');
            } else {
                successMessage.style.display = 'none';
                successMessage.classList.remove('success');
                failureMessage.style.display = 'none';
                failureMessage.classList.remove('failure');
            }
        });

        // Hide messages initially
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
    </script>
</body>
</html>
