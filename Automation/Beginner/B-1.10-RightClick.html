<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Right Click Action - Right click the button to complete this task.">
    <title>Right Click Action</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../../components.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="card">
        <h1>Right Click Action</h1>
        <p class="lead">Right click on the button below to complete the task.</p>

        <div class="button-group">
            <button id="clickButton" type="button">Click Me</button>
        </div>

        <div class="message" id="successMessage" role="status" aria-live="polite">
            <span class="icon">✓</span>
            <span>Success! You right-clicked the button.</span>
        </div>

        <div class="message" id="failureMessage" role="status" aria-live="polite">
            <div class="message-row">
                <span class="icon">✕</span>
                <strong>Incorrect</strong>
            </div>
            <div class="message-row">
                <span>Ha Ha! You left-clicked the button.</span>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const clickButton = document.getElementById('clickButton');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        clickButton.addEventListener('click', (event) => {
            // Show failure message for left-click
            failureMessage.style.display = 'flex';
            failureMessage.classList.add('failure');
            successMessage.style.display = 'none'; // Hide success message
            successMessage.classList.remove('success');

            // Add laughing emojis flying across the screen
            for (let i = 0; i < 30; i++) {
                const emoji = document.createElement('div');
                emoji.className = 'emoji';
                emoji.textContent = '😂';
                emoji.style.left = `${Math.random() * 100}vw`;
                emoji.style.top = `${Math.random() * 100}vh`;
                emoji.style.fontSize = `${Math.random() * 50 + 20}px`; // Random size between 20px and 70px
                document.body.appendChild(emoji);

                // Remove emoji after animation ends
                emoji.addEventListener('animationend', () => {
                    emoji.remove();
                });
            }
        });

        clickButton.addEventListener('contextmenu', (event) => {
            event.preventDefault(); // Prevent the default right-click menu
            successMessage.style.display = 'flex';
            successMessage.classList.add('success');
            failureMessage.style.display = 'none'; // Hide failure message
            failureMessage.classList.remove('failure');
        });

        //Hide messages initially
        successMessage.style.display = 'none';
        successMessage.classList.remove('success');
        failureMessage.style.display = 'none';
        failureMessage.classList.remove('failure');
    </script>
</body>
</html>
