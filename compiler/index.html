<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCompiler - Multi-Language Online IDE</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Cache-Control Meta Tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- Main Style Sheet with Dynamic Cache Busting -->
    <script>
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'styles.css?v=' + Date.now();
        document.head.appendChild(link);
    </script>
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    <!-- TypeScript Compiler for Browser-side compiling -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.0.4/typescript.min.js"></script>
    <!-- Pyodide for Browser-side Python compiling -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <!-- Header and Footer CSS -->
    <link rel="stylesheet" href="/automation/assets/css/header.css">
    <link rel="stylesheet" href="/automation/assets/css/footer.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="app-container">
        <!-- Premium Navigation Header -->
        <header class="app-header">
            <div class="logo">
                <i class="fa-solid fa-terminal logo-icon"></i>
                <span class="logo-text">DevCompiler</span>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label for="language-select"><i class="fa-solid fa-code"></i> Language</label>
                    <select id="language-select">
                        <option value="" disabled selected>Select</option>
                        <option value="javascript">JavaScript</option>
                        <option value="typescript">TypeScript</option>
                        <option value="python">Python 3</option>
                        <option value="html">HTML / CSS / JS</option>
                        <option value="java">Java (OpenJDK Compiler)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="theme-select"><i class="fa-solid fa-palette"></i> Theme</label>
                    <select id="theme-select">
                        <option value="vs-dark">Dark Theme</option>
                        <option value="vs-light">Light Theme</option>
                        <option value="hc-black">High Contrast</option>
                    </select>
                </div>

                <div class="action-buttons">
                    <button id="run-btn" class="btn btn-run">
                        <i class="fa-solid fa-play"></i> Run Code
                    </button>
                    <button id="clear-btn" class="btn btn-secondary" title="Clear Console">
                        <i class="fa-solid fa-trash-can"></i> Clear
                    </button>
                    <button id="reset-btn" class="btn btn-secondary" title="Reset Code Template">
                        <i class="fa-solid fa-rotate-left"></i> Reset
                    </button>
                </div>
            </div>
        </header>

        <!-- Split IDE Layout -->
        <main class="ide-layout">
            <!-- Left Panel: Code Editor -->
            <section class="editor-pane">
                <div class="pane-header">
                    <span class="pane-title"><i class="fa-solid fa-file-code"></i> Source Editor</span>
                    <span id="editor-status" class="status-indicator">Ready</span>
                </div>
                <div id="monaco-editor-container" class="editor-body"></div>
            </section>

            <!-- Resizer Handle -->
            <div class="pane-resizer" id="pane-resizer"></div>

            <!-- Right Panel: Output Console -->
            <section class="output-pane">
                <div class="pane-header output-tabs">
                    <button class="tab-btn active" data-tab="console-tab">
                        <i class="fa-solid fa-terminal"></i> Console Output
                    </button>
                    <button class="tab-btn" data-tab="preview-tab" id="preview-tab-btn">
                        <i class="fa-solid fa-chart-line"></i> Live Preview
                    </button>
                    <span id="exec-time" class="exec-time"></span>
                </div>
                
                <div class="pane-body">
                    <!-- Tab 1: Console Logs -->
                    <div id="console-tab" class="tab-content active">
                        <div id="console-logs" class="console-output">
                            <div class="log-entry system"><span class="prefix">[system]</span> DevCompiler initialized. Ready to execute code.</div>
                        </div>
                    </div>

                    <!-- Tab 2: HTML Live Preview Frame -->
                    <div id="preview-tab" class="tab-content">
                        <iframe id="preview-frame" sandbox="allow-scripts" title="Preview Frame"></iframe>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Core App Logic with Dynamic Cache Busting -->
    <script>
        const script = document.createElement('script');
        script.src = 'app.js?v=' + Date.now();
        document.body.appendChild(script);
    </script>
    <div id="footer-placeholder"></div>
    <script src="/automation/assets/components/components.js"></script>
</body>
</html>
