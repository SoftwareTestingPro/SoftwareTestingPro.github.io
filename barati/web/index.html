<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Connect with a supportive community for your big day. Find family members, relatives, and friends to perform wedding rituals and make your celebration memorable.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Barati">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://SoftwareTestingPro.github.io/barati/app/">
  <meta property="og:title" content="Barati - Your Chosen Wedding Family">
  <meta property="og:description" content="Don't feel alone on your big day. Find supportive family and friends for your wedding rituals.">
  <meta property="og:image" content="assets/images/hero_bg.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://SoftwareTestingPro.github.io/barati/app/">
  <meta property="twitter:title" content="Barati - Your Chosen Wedding Family">
  <meta property="twitter:description" content="Don't feel alone on your big day. Find supportive family and friends for your wedding rituals.">
  <meta property="twitter:image" content="assets/images/hero_bg.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Barati - Your Chosen Wedding Family</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading-indicator">
    <style>
      body {
        background: radial-gradient(circle at center, #FDF5E6 0%, #faecd5 100%);
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #loading-indicator {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
      }
      .loader {
        position: relative;
        width: 80px;
        height: 80px;
        margin-bottom: 30px;
      }
      .loader:before, .loader:after {
        content: '';
        border-radius: 50%;
        position: absolute;
        inset: 0;
        box-shadow: 0 0 20px 5px rgba(139, 0, 0, 0.3) inset;
      }
      .loader:after {
        box-shadow: 0 5px 0 #8B0000 inset;
        animation: rotate 2s linear infinite;
      }
      @keyframes rotate {
        0% { transform: rotate(0); }
        100% { transform: rotate(360deg); }
      }
      .pulse {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        background-color: #8B0000;
        border-radius: 50%;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
        50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
      }
      .loading-text {
        font-family: 'Playfair Display', serif;
        color: #8B0000;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 2px;
        animation: fade 2s ease-in-out infinite;
      }
      @keyframes fade {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
    <div class="loader">
      <div class="pulse"></div>
    </div>
    <div class="loading-text">BARATI</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
