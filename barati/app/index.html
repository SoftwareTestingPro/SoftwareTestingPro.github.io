<!DOCTYPE html>
<html>
<head>
  <base href="/barati/app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Connect with a supportive community for your big day. Find family members, relatives, and friends to perform wedding rituals and make your celebration memorable.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Barati">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://SoftwareTestingPro.github.io/barati/app/">
  <meta property="og:title" content="Barati - Your Chosen Wedding Family">
  <meta property="og:description" content="Don't feel alone on your big day. Find supportive family and friends for your wedding rituals.">
  <meta property="og:image" content="assets/images/hero_bg.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://SoftwareTestingPro.github.io/barati/app/">
  <meta property="twitter:title" content="Barati - Your Chosen Wedding Family">
  <meta property="twitter:description" content="Don't feel alone on your big day. Find supportive family and friends for your wedding rituals.">
  <meta property="twitter:image" content="assets/images/hero_bg.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Barati - Your Chosen Wedding Family</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading-indicator">
    <style>
      body {
        background-color: #FDF5E6;
        margin: 0;
        padding: 0;
      }
      #loading-indicator {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #8B000022;
        border-top: 5px solid #8B0000;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-text {
        font-family: 'Playfair Display', serif;
        color: #8B0000;
        font-size: 24px;
        font-weight: bold;
      }
    </style>
    <div class="spinner"></div>
    <div class="loading-text">Barati</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
