<header class="site-header">
    <div class="header-content">
        <a href="../index.html" class="home-link" title="Home">
            <svg class="home-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            <span class="home-text">Home</span>
        </a>
        <button class="hamburger" onclick="toggleMenu()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </div>
</header>

<script>
// Update home link to project root index.html
document.addEventListener('DOMContentLoaded', function() {
    const homeLink = document.querySelector('.home-link');
    const pathSegments = window.location.pathname.split('/').filter(segment => segment);
    const upLevels = pathSegments.length;
    homeLink.href = '../'.repeat(upLevels) + 'index.html';
});
</script>
