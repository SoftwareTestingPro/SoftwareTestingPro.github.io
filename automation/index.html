<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We've Moved! - Software Testing Pro</title>
    <!-- Automatic redirect after 5 seconds -->
    <meta http-equiv="refresh" content="5;url=https://automation.futurelab.co.in">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #a855f7;
            --accent-hover: #c084fc;
            --accent-glow: rgba(168, 85, 247, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1.5rem;
            position: relative;
        }

        /* Decorative background elements */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 30rem;
            height: 30rem;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
        }
        body::before {
            background: #6366f1;
            top: -10rem;
            left: -10rem;
        }
        body::after {
            background: #d946ef;
            bottom: -10rem;
            right: -10rem;
        }

        .container {
            width: 100%;
            max-width: 540px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3),
                        0 0 50px rgba(168, 85, 247, 0.1);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 2.5rem;
            color: var(--accent);
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.1);
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #e2e8f0, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 2.25rem;
        }

        .highlight {
            color: var(--accent-hover);
            font-weight: 600;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            color: white;
            text-decoration: none;
            padding: 1.125rem 2.25rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 10px 25px var(--accent-glow);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(168, 85, 247, 0.5);
            background: linear-gradient(135deg, #b55fe6 0%, #8b5cf6 100%);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        .countdown-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        #countdown {
            font-weight: 700;
            color: var(--accent-hover);
            display: inline-block;
            min-width: 12px;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 8px 20px rgba(168, 85, 247, 0.1);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 8px 30px rgba(168, 85, 247, 0.3);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 2.5rem 1.5rem;
                border-radius: 24px;
            }
            h1 {
                font-size: 1.85rem;
            }
            p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon-container">
                🚀
            </div>
            <h1>We've Relocated!</h1>
            <p>Our automation practice platform has moved to a brand new home at <span class="highlight">automation.futurelab.co.in</span> for a faster, more reliable experience.</p>
            
            <a href="https://automation.futurelab.co.in" class="cta-button" id="redirect-btn">
                Go to New Website
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </a>

            <div class="countdown-container">
                <div class="spinner"></div>
                <span>Redirecting automatically in <span id="countdown">5</span> seconds...</span>
            </div>
        </div>
    </div>

    <script>
        const targetUrl = "https://automation.futurelab.co.in";
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');

        const interval = setInterval(() => {
            seconds--;
            if (countdownEl) {
                countdownEl.textContent = seconds;
            }
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = targetUrl;
            }
        }, 1000);

        // Fallback safety to ensure redirect runs
        setTimeout(() => {
            window.location.href = targetUrl;
        }, 5500);
    </script>
</body>
</html>
