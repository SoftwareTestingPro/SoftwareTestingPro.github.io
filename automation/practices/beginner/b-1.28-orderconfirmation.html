    <main class="card">
        <div class="card-content">
            <h1>Order Confirmation</h1>
            <p class="lead">Master data extraction! Locate and input the exact order number from randomly displayed details to prove your information gathering skills.</p>
            <!-- Order details will be populated here by JavaScript -->
            <div id="orderSummary"></div>
            <div class="horizontal-form">
                <label for="orderInput">Enter Order Number:</label>
                <input type="text" id="orderInput" name="orderInput" placeholder="Order Number" aria-describedby="orderMessage">
            </div>
            <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! Order number matches.</div>
            <div class="message failure" id="failureMessage" role="status" aria-live="polite">
                Incorrect! Order number does not match.
                <div class="detail">Expected: <span id="expectedValue"></span> | Entered: <span id="actualValue"></span></div>
            </div>
        </div>
    </main>
</div>

    <div id="footer-placeholder"></div>

<script>
    // Function to generate a random 10-digit number
    function generateRandomNumber() {
        return Math.floor(1000000000 + Math.random() * 9000000000);
    }

    // Function to generate a random cost between $50 and $500
    function generateRandomCost() {
        return "$" + (50 + Math.random() * 450).toFixed(2);
    }

    // Function to generate a random alphanumeric ID
    function generateRandomId() {
        return Math.random().toString(36).substr(2, 10); // 10-character random string
    }

    // List of random product names
    const productNames = ["Wireless Mouse", "Bluetooth Headphones", "USb-C Cable", "Laptop Stand", "Smartwatch"];
    
    // Function to shuffle the display order of items
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // Function to populate order summary
    let orderNumber;  // Declare a global variable to store the order number
    function populateOrderSummary() {
        orderNumber = generateRandomNumber();
        const orderCost = generateRandomCost();
        const productName = productNames[Math.floor(Math.random() * productNames.length)];

        const orderItems = [
            `<tr>
                <td><span class="field-chip">Order Number</span></td>
                <td id="orderNumberVal">${orderNumber}</td>
             </tr>`,
            `<tr>
                <td><span class="field-chip">Order Total</span></td>
                <td>${orderCost}</td>
             </tr>`,
            `<tr>
                <td><span class="field-chip">Product Name</span></td>
                <td>${productName}</td>
             </tr>`
        ];

        shuffle(orderItems);

        const tableHtml = `
            <div class="table-responsive">
                <table class="data-table compact">
                    <thead>
                        <tr>
                            <th>Field Name</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${orderItems.join("")}
                    </tbody>
                </table>
            </div>
        `;

        document.getElementById("orderSummary").innerHTML = tableHtml;
    }

    // Function to check if the input matches the order number
    document.getElementById("orderInput").addEventListener("input", function () {
        const input = document.getElementById("orderInput").value;
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedValue = document.getElementById('expectedValue');
        const actualValue = document.getElementById('actualValue');

        if (input == orderNumber) {
            successMessage.style.display = 'flex';
            failureMessage.style.display = 'none';
        } else if (input === "") {
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';
        } else {
            expectedValue.textContent = orderNumber;
            actualValue.textContent = input;
            successMessage.style.display = 'none';
            failureMessage.style.display = 'flex';
        }
    });

    // Populate the order summary on page load
    window.onload = populateOrderSummary;
</script>
