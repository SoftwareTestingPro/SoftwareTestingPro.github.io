        <main class="card">
            <div class="card-content">
                <h1>Image URL Verification</h1>
                <p class="lead">Master image attribute extraction! Capture and input the exact source URL of the displayed image to prove your element inspection mastery.</p>

                <img id="image" src="" alt="Random Image" style="display: block; margin: 0 auto 20px auto;">

                <div class="horizontal-form">
                    <label for="imageURL">Enter the source URL of this image:</label>
                    <input type="text" id="imageURL" placeholder="Enter the image URL here" aria-describedby="imageMessage">
                </div>

                <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! Source URL successfully verified.</div>
                <div class="message failure" id="failureMessage" role="status" aria-live="polite">
                    Incorrect! Source URL does not match.
                    <div class="detail">Expected: <span id="expectedUrl"></span> | Entered: <span id="actualUrl"></span></div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const imageElement = document.getElementById('image');
        const urlInput = document.getElementById('imageURL');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedUrlDisplay = document.getElementById('expectedUrl');
        const actualUrlDisplay = document.getElementById('actualUrl');

        const imageUrls = [
            '../../img/img1.jpg',
            '../../img/img2.jpg',
            '../../img/img6.jpg',
            '../../img/img7.jpg',
            '../../img/img5.jpg'
        ];

        function setRandomImage() {
            const randomIndex = Math.floor(Math.random() * imageUrls.length);
            const randomImageUrl = imageUrls[randomIndex];
            imageElement.src = randomImageUrl;
            // Use the resolved absolute URL for matching to ensure consistency
            const resolvedUrl = imageElement.src;
            imageElement.dataset.src = resolvedUrl;
            expectedUrlDisplay.textContent = resolvedUrl;
        }

        function validateInput() {
            const inputUrl = urlInput.value.trim();
            const correctUrl = imageElement.dataset.src;

            if (inputUrl === '') {
                // Clear messages if input is empty
                successMessage.style.display = 'none';
                failureMessage.style.display = 'none';
                actualUrlDisplay.textContent = '';
            } else if (inputUrl === correctUrl) {
                // Success case
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else {
                // Failure case
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
                actualUrlDisplay.textContent = inputUrl;
            }
        }

        urlInput.addEventListener('input', validateInput);
        urlInput.addEventListener('blur', validateInput);
        window.addEventListener('load', setRandomImage);
    </script>
