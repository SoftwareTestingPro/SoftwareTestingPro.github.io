    <style>
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);

            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-size: 0.95rem;
            color: #1e293b;
            font-weight: 600;
        }

        .checkbox-group label:hover {
            background: white;
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .checkbox-group label input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #cbd5e1;
            margin: 0;
            cursor: pointer;
            display: grid;
            place-content: center;
            transition: all 0.2s ease;
            background-color: white;
            flex-shrink: 0;
            border-radius: 4px;
        }

        .checkbox-group label input[type="checkbox"]::before {
            content: "";
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
            transform: scale(0);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .checkbox-group label input[type="checkbox"]:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .checkbox-group label input[type="checkbox"]:checked::before {
            background-color: white;
            transform: scale(1);
        }

        .checkbox-group label:has(input:checked) {
            background: #f5f3ff;
            border-color: var(--accent);
        }
    </style>

    <div id="header-placeholder"></div>

    <div class="content-wrapper">

        <main class="card">
            <div class="card-content">
                <h1>Case Validation</h1>
                <p class="lead">Master case sensitivity validation! Identify and select all checkboxes containing pure uppercase strings to prove your pattern recognition skills.</p>
                <div class="checkbox-group" id="checkboxContainer">
                    <!-- Checkboxes will be generated here -->
                </div>
                <button class="validate-btn" onclick="validateSelection()">Validate Selection</button>
                <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! You selected all uppercase items correctly.</div>
                <div class="message failure" id="failureMessage" role="status" aria-live="polite">Incorrect! Please select only the uppercase items.</div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        function generateRandomName() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
            let name = "";
            for (let i = 0; i < 5; i++) {
                name += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return Math.random() < 0.5 ? name.toUpperCase() : name;
        }

        const checkboxContainer = document.getElementById('checkboxContainer');
        const checkboxData = [];

        for (let i = 0; i < 8; i++) {
            let name = generateRandomName();
            let isUpperCase = name === name.toUpperCase();
            checkboxData.push({ name, isUpperCase });

            const label = document.createElement('label');

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.setAttribute('data-index', i);
            checkbox.setAttribute('value', name);
            checkbox.setAttribute('title', name); // optional tooltip

            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(name));
            checkboxContainer.appendChild(label);
        }

        // Ensure at least one uppercase item exists
        if (!checkboxData.some(item => item.isUpperCase)) {
            checkboxData[0].name = checkboxData[0].name.toUpperCase();
            checkboxData[0].isUpperCase = true;
            const firstLabel = checkboxContainer.children[0];
            firstLabel.lastChild.textContent = checkboxData[0].name;
        }

        function validateSelection() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            let isValid = true;

            checkboxes.forEach(checkbox => {
                const index = parseInt(checkbox.getAttribute('data-index'));
                const isUpperCase = checkboxData[index].isUpperCase;

                if (isUpperCase && !checkbox.checked) {
                    isValid = false;
                } else if (!isUpperCase && checkbox.checked) {
                    isValid = false;
                }
            });

            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');
            
            if (isValid) {
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
            }
        }
    </script>
