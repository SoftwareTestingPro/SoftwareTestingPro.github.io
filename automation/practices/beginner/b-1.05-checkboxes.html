    <style>
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 180px;
            height: auto;
            min-height: 54px;
            box-sizing: border-box;
            flex-shrink: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-size: 0.95rem;
            color: #1e293b;
            font-weight: 600;
        }

        .checkbox-group label:hover {
            background: white;
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .checkbox-group label input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #cbd5e1;
            margin: 0;
            cursor: pointer;
            display: grid;
            place-content: center;
            transition: all 0.2s ease;
            background-color: white;
            flex-shrink: 0;
            border-radius: 4px;
        }

        .checkbox-group label input[type="checkbox"]::before {
            content: "";
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
            transform: scale(0);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .checkbox-group label input[type="checkbox"]:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .checkbox-group label input[type="checkbox"]:checked::before {
            background-color: white;
            transform: scale(1);
        }

        .checkbox-group label:has(input:checked) {
            background: #f5f3ff;
            border-color: var(--accent);
        }
    </style>

        <main class="card">
            <div class="card-content">
                <h1>Select Hobbies</h1>
                <p class="lead">Conquer checkbox selection challenges! Find and select "Music" plus the 3rd option from this dynamically shuffled list to prove your automation precision.</p>

                <div class="checkbox-group" id="checkboxGroup">
                    <!-- Checkboxes will be inserted here by JavaScript -->
                </div>

                <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! The required checkboxes are selected.</div>
                <div class="message failure" id="failureMessage" role="status" aria-live="polite">
                    Incorrect! Selection does not match.
                    <div class="detail">Expected: <span id="expectedValue"></span> | Selected: <span id="actualValue"></span></div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const checkboxesData = [
            { value: "Reading", label: "Reading" },
            { value: "Travelling", label: "Travelling" },
            { value: "Music", label: "Music" },
            { value: "Gaming", label: "Gaming" }
        ];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function createCheckboxes() {
            // Create a copy of the data and ensure "Music" is not in the 3rd position
            let data = [...checkboxesData];
            const musicIndex = data.findIndex(item => item.value === 'Music');
            
            // Remove "Music" from the list and prepare for reinsertion
            const Music = data.splice(musicIndex, 1)[0];

            // Shuffle the remaining data
            shuffleArray(data);

            // Insert "Music" back into one of the first two positions
            const insertPosition = Math.floor(Math.random() * 2);
            data.splice(insertPosition, 0, Music);

            // Ensure "Music" is not in the 3rd position
            if (data[2].value === 'Music') {
                data.splice(insertPosition, 1);
                data.splice(2, 0, Music);
            }

            const checkboxGroup = document.getElementById('checkboxGroup');
            checkboxGroup.innerHTML = '';

            data.forEach(item => {
                const label = document.createElement('label');
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.name = 'hobbies';
                checkbox.value = item.value;
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(item.label));
                checkboxGroup.appendChild(label);
            });
        }

        function updateHobbyCount() {
            const checkboxes = document.querySelectorAll('input[name="hobbies"]');
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');
            const selectedHobbies = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
            
            // Get the value of the 3rd option
            const thirdOptionValue = document.querySelectorAll('input[name="hobbies"]')[2].value;

            if (selectedHobbies.includes('Music') && selectedHobbies.includes(thirdOptionValue) &&
                selectedHobbies.length === 2) {
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
                
                // Populate expected and actual values
                const expectedValue = document.getElementById('expectedValue');
                const actualValue = document.getElementById('actualValue');
                expectedValue.textContent = `"Music" and "${thirdOptionValue}" (2 items)`;
                actualValue.textContent = selectedHobbies.length > 0 ? 
                    selectedHobbies.map(h => `"${h}"`).join(', ') + ` (${selectedHobbies.length} items)` : 
                    'None selected';
            }
        }

        // Initialize: hide messages initially
        function initializeMessages() {
            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';
        }

        createCheckboxes();
        initializeMessages();
        document.getElementById('checkboxGroup').addEventListener('change', updateHobbyCount);
    </script>
