    <main class="card">
        <div class="card-content">
        <h1>QR Code</h1>
        <p class="lead">Master QR code decoding! Extract and input the hidden text from the QR code to prove your image analysis skills.</p>

        <section class="qr-container">
            <img id="qr" src="../../img/qr.jpg" alt="QR Code">
        </section>
            <div class="horizontal-form">
                <label for="user-input">Enter the scanned text:</label>
                <input type="text" id="user-input" name="user-input" placeholder="Decoded text">
            </div>
            <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! The entered text matches the source.</div>
            <div class="message failure" id="failureMessage" role="status" aria-live="polite">
                Incorrect! The entered text does not match.
                <div class="detail">Expected: <span id="expectedValue"></span> | Entered: <span id="actualValue"></span></div>
            </div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedValue = document.getElementById('expectedValue');
        const actualValue = document.getElementById('actualValue');

        // Hide messages on load
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';

        document.getElementById('user-input').addEventListener('input', function() {
            const correctValue = 'Congratulations... you did it'; // Replace with the actual decoded value
            const userInput = this.value;

            if (userInput === '') {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'none';
            } else if (userInput === correctValue) {
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
                expectedValue.textContent = correctValue;
                actualValue.textContent = userInput;
            }
        });
    </script>
