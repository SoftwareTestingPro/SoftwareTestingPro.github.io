    <style>
        .list-container {
            list-style: none;

    <main class="card">
        <div class="card-content">
        <h1>Sortable List Challenge</h1>
        <p class="lead">Master drag-and-drop sorting! Arrange the items alphabetically by dragging them to demonstrate your advanced organization skills.</p>

        <ul id="animalList" class="list-container">
            <!-- List items will be inserted here by JavaScript -->
        </ul>
        <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! The list is sorted alphabetically.</div>
        <div class="message failure" id="failureMessage" role="status" aria-live="polite">Incorrect! The list is not yet sorted correctly. Keep trying!</div>
    </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <!-- Load SortableJS from the new CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const allItems = ["Elephant", "Tiger", "Zebra", "Giraffe", "Lion", "Monkey", "Panda", "Koala", "Kangaroo", "Penguin"];
            
            // Shuffle and select 5 random items
            const shuffledItems = allItems.sort(() => Math.random() - 0.5).slice(0, 5);
            
            // Create list items
            const list = document.getElementById('animalList');
            shuffledItems.forEach(item => {
                const li = document.createElement('li');
                li.className = 'list-item';
                li.innerHTML = `
                    <i class="fas fa-grip-vertical drag-handle"></i>
                    <span>${item}</span>
                `;
                list.appendChild(li);
            });

            const successMessage = document.getElementById('successMessage');
            const failureMessage = document.getElementById('failureMessage');
            let hasDragged = false;

            // Hide messages on load
            successMessage.style.display = 'none';
            failureMessage.style.display = 'none';

            // Initialize SortableJS
            const sortable = Sortable.create(list, {
                animation: 250,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                dragClass: 'sortable-drag',
                onEnd: function(evt) {
                    hasDragged = true;
                    
                    // Check if list is sorted
                    const items = Array.from(list.children).map(li => li.querySelector('span').textContent);
                    const sortedItems = [...items].sort();
                    if (JSON.stringify(items) === JSON.stringify(sortedItems)) {
                        successMessage.style.display = 'flex';
                        failureMessage.style.display = 'none';
                        sortable.option("disabled", true); // Disable dragging and sorting
                    } else {
                        // Show failure message only after first drag
                        if (hasDragged) {
                            failureMessage.style.display = 'flex';
                        }
                        successMessage.style.display = 'none';
                    }
                }
            });
        });
    </script>
